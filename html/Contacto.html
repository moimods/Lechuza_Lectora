<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Contacto</title>
    <link rel="icon" type="image/png" href="../Imagenes/logo.png">
    <link rel="stylesheet" href="../Estilos/Estilo1.css">
    
    <script src="../JS/Boton_Ini.js" defer></script>
    <script src="../JS/Boton_Inicio_Sesion_html.js" defer></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* ESTILOS DEL MENÚ HAMBURGUESA */
        .hamburger-btn {
            display: none; /* Oculto en PC */
            background: none;
            border: none;
            color: #5d4037;
            font-size: 1.8rem;
            cursor: pointer;
            order: 2;
        }

        /* AJUSTES RESPONSIVOS CRÍTICOS */
        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: space-between;
                height: auto !important;
                padding: 10px 20px !important;
            }

            .hamburger-btn {
                display: block; /* Aparece en móvil */
            }

            .logo-container { order: 1; }
            .auth-actions { order: 3; width: auto !important; margin: 0 !important; }

            .nav-links {
                display: none; /* Se oculta para el menú hamburguesa */
                flex-direction: column;
                width: 100%;
                order: 4;
                background: rgba(244, 236, 226, 0.98);
                padding: 15px 0;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                margin-top: 10px;
            }

            .nav-links.active {
                display: flex !important;
            }

            .nav-links a {
                padding: 12px;
                width: 100%;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }

            .contact-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 20px auto !important;
            }

            .contact-grid {
                grid-template-columns: 1fr !important;
                gap: 30px !important;
            }

            .map-wrapper { height: 300px !important; }
            .map-custom-marker { width: 45px !important; }
            input, textarea { font-size: 16px !important; }
        }

        /* Estabilización del Mapa y Fondo */
        .map-container-relative { position: relative; width: 100%; }
        .map-wrapper {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #5d4037;
        }

        .map-custom-marker {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -100%); 
            width: 65px;
            z-index: 10;
            pointer-events: none; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6));
            animation: bounce 2s infinite; 
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -100%); }
            50% { transform: translate(-50%, -115%); }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <header class="navbar detail-navbar">
        <div class="logo-container">
            <a href="../index.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
                <img src="../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
                <span class="site-name">LA LECHUZA LECTORA</span>
            </a>
        </div>

        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <nav class="nav-links" id="mobile-nav">
            <a href="Acerca_de.html">Acerca de</a>
            <a href="#" class="active-link">Contacto</a>
            <a href="Ayuda.html">Ayuda</a>
            <a href="Catalogo.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='../index.html'"><i class="fa-solid fa-house"></i></button>
            <button class="btn-primary" onclick="window.location.href='Inicio_sesion.html'" style="background: #5d4037; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Login</button>
        </div>
    </header>

    <main class="main-content contact-main">
        <div class="background-overlay"></div>

        <div class="contact-container" style="background: rgba(240, 231, 203, 0.95); border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 40px auto; max-width: 1100px; position: relative; z-index: 5;">
            <h1 class="page-title" style="color: #5d4037; text-align: center; margin-bottom: 10px;">Contáctanos</h1>
            <p class="page-subtitle" style="text-align: center; color: #8d6e63; margin-bottom: 40px;">Hablemos de libros. Utiliza el formulario o visítanos.</p>

            <div class="contact-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
                <div class="contact-form-wrapper" style="position: relative; background: white; padding: 25px; border-radius: 10px; border: 1px solid #ddd;">
                    <form class="contact-form" id="form-contacto">
                        <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Nombre</label>
                        <input type="text" name="nombre" placeholder="Tu nombre" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
                        
                        <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Correo</label>
                        <input type="email" name="email" placeholder="correo@ejemplo.com" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

                        <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Mensaje</label>
                        <textarea name="mensaje" placeholder="¿Cómo podemos ayudarte?" rows="5" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; resize: none;"></textarea>

                        <button type="submit" class="btn-send" style="background: #5d4037; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">Enviar</button>
                    </form>
                </div>

                <div class="social-info-card" style="background: white; padding: 25px; border-radius: 10px; border: 1px solid #ddd; height: fit-content;">
                    <h2 style="color: #5d4037; font-size: 1.2rem; margin-bottom: 15px;">Redes Sociales</h2>
                    <div class="social-icons-contact" style="display: flex; gap: 15px; margin-bottom: 20px; font-size: 1.5rem;">
                        <a href="#" style="color: #5d4037;"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="#" style="color: #5d4037;"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" style="color: #5d4037;"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                    <address style="font-style: normal; font-size: 0.9rem; line-height: 1.6; color: #666;">
                        <i class="fa-solid fa-location-dot" style="color: #5d4037;"></i> <strong>Campus Iztapalapa</strong><br>
                        Av Telecomunicaciones, CDMX.
                    </address>
                </div>
            </div>

            <section class="location-section" style="margin-top: 50px;">
                <h2 style="text-align: center; color: #5d4037; margin-bottom: 20px;">Ubicación</h2>
                <div class="map-container-relative">
                    <img src="../Imagenes/logo.png" alt="Marcador" class="map-custom-marker">
                    <div class="map-wrapper">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3763.5518210328225!2d-99.0573!3d19.38!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDIyJzQ4LjAiTiA5OcKwMDMnMjYuMyJX!5e0!3m2!1ses!2smx!4v1700000000000!5m2!1ses!2smx" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        // FUNCIÓN MENÚ HAMBURGUESA
        function toggleMobileMenu() {
            const nav = document.getElementById('mobile-nav');
            nav.classList.toggle('active');
        }

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', function(event) {
            const nav = document.getElementById('mobile-nav');
            const hamburger = document.getElementById('hamburger-btn');
            if (nav && hamburger && !hamburger.contains(event.target) && !nav.contains(event.target)) {
                nav.classList.remove('active');
            }
        });

        document.getElementById('form-contacto').onsubmit = function(e) {
            e.preventDefault();
            alert("¡Mensaje enviado con éxito!");
            this.reset();
        };
    </script>
</body>
</html>
