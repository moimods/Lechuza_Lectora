<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Dashboard</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Estilos rápidos para las tarjetas de stock que tu JS necesita */
        .stats-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; min-width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .stat-card h3 { color: #5d4037; margin-bottom: 10px; }
        .data-table { width: 100%; font-size: 1.5rem; font-weight: bold; color: #333; }
    </style>
</head>
<body class="dashboard-page">
    <header class="navbar dashboard-navbar">
        <div class="logo">🦉 La Lechuza Admin</div>
        
        <button class="hamburger" id="hamburger-btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="menu-items" id="menu-items">
            <a href="Gestion_de_inventario.html">Inventario</a>
            <a href="Reporte_de_ventas.html">Reportes</a>
            <a href="../../index.html" onclick="localStorage.clear()">Cerrar Sesión</a>
        </div>
    </header>

    <main class="main-content dashboard-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.6);"></div>

        <div class="dashboard-container">
            <h1 class="dashboard-title">Panel de Control de Inventario</h1>

            <div class="action-buttons-grid">
                <button class="action-button red-bg" onclick="location.href='Gestion_de_inventario.html'"><i class="fa-solid fa-list-ul"></i> Gestionar Inventario</button>
                <button class="action-button blue-bg" onclick="location.href='Gestion_productos.html'"><i class="fa-solid fa-box-open"></i> Adicionar Productos</button>
                <button class="action-button orange-bg" onclick="location.href='Reporte_de_compras.html'"><i class="fa-solid fa-truck"></i> Ver Pedidos</button>
                <button class="action-button lightblue-bg" onclick="location.href='Reporte_de_ventas.html'"><i class="fa-solid fa-chart-line"></i> Análisis de Ventas</button>
            </div>

            <div class="stats-container">
                <div class="stat-card stock-card">
                    <h3>Títulos en Catálogo</h3>
                    <div class="data-table"><table><tr><td>0</td></tr></table></div>
                </div>
                <div class="stat-card stock-card">
                    <h3>Piezas Totales</h3>
                    <div class="data-table"><table><tr><td>0</td></tr></table></div>
                </div>
                <div class="stat-card restock-card">
                    <h3>Libros por Agotarse</h3>
                    <div class="data-table"><table><tr><td>-</td><td>-</td><td>0</td></tr></table></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- LÓGICA DEL MENÚ HAMBURGUESA (CORREGIDA) ---
        const btnHamburguesa = document.getElementById('hamburger-btn');
        const menuDesplegable = document.getElementById('menu-items');

        btnHamburguesa?.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDesplegable.classList.toggle('show-menu');
        });

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', () => menuDesplegable.classList.remove('show-menu'));

        // --- LÓGICA DE DATOS ---
        async function cargarDashboard() {
            try {
                const respuesta = await fetch('/api/productos');
                const productos = await respuesta.json();

                if (productos && productos.length > 0) {
                    const totalLibros = productos.length;
                    const bajoStock = productos.filter(p => p.stock < 10).length;
                    const sumaPiezas = productos.reduce((acc, p) => acc + (parseInt(p.stock) || 0), 0);

                    // Actualizar tarjetas (seleccionando el TD correcto)
                    const celdas = document.querySelectorAll('.data-table td');
                    celdas[0].textContent = totalLibros;
                    celdas[1].textContent = sumaPiezas;
                    celdas[4].textContent = bajoStock; // Según tu estructura de tabla en JS
                }
            } catch (error) {
                console.error("Error al cargar datos:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', cargarDashboard);
    </script>
</body>
</html>
