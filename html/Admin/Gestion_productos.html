<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Gestión de Productos</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .form-container-admin {
            max-width: 600px;
            background-color: #fdf5e6; 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin: 20px auto;
            position: relative;
            z-index: 5;
        }

        
        @media (max-width: 600px) {
            .form-container-admin {
                width: 90%;
                padding: 20px;
                margin: 10px auto;
            }
            
            
            .responsive-grid {
                grid-template-columns: 1fr !important;
            }
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #5d4037;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px; 
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box; 
        }

        .btn-save-product {
            background-color: #5d4037;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            font-size: 1.1em;
        }

        .preview-box {
            width: 120px;
            height: 180px;
            border: 2px dashed #ccc;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            border-radius: 5px;
            overflow: hidden;
            background: #fff;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="dashboard-page">

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="panel_de_admin.html">Dashboard</a>
                <a href="Gestion_Inventario.html">Inventario</a>
                <a href="../../index.html">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <a href="panel_de_admin.html" style="text-decoration: none; color: inherit;">
                <i class="fa-solid fa-house"></i>
            </a>
            <span class="admin-label">Admin</span>
            <img src="../../Imagenes/miku.png.jpg" alt="Avatar Admin" class="avatar" style="object-fit: cover; border-radius: 50%;">
        </div>
    </header>

    <main class="main-content inventory-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.6);"></div>

        <div class="form-container-admin">
            <div class="inventory-header">
                <i class="fa-solid fa-arrow-left" onclick="location.href='panel_de_admin.html'" style="cursor: pointer;"></i>
                <h2 class="dashboard-title" style="font-size: 1.5rem;">Gestión de Libro</h2>
            </div>

            <form id="productForm">
                <div class="form-group">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" placeholder="Nombre del libro" required>
                </div>

                <div class="form-group">
                    <label for="autor">Autor:</label>
                    <input type="text" id="autor" placeholder="Nombre del autor" required>
                </div>

                <div class="form-group responsive-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label for="precio">Precio ($):</label>
                        <input type="number" id="precio" placeholder="0.00" step="0.01" required>
                    </div>
                    <div>
                        <label for="stock">Stock:</label>
                        <input type="number" id="stock" placeholder="Cantidad" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="imagen">Portada:</label>
                    <input type="file" id="imagen" accept="image/*" onchange="previewImage(event)" style="padding: 5px;">
                    <div class="preview-box" id="imagePreview">
                        <span>Sin imagen</span>
                    </div>
                </div>

                <button type="submit" class="btn-save-product">Guardar Producto</button>
            </form>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037;">
        © 2026 La Lechuza Lectora
    </footer>

    <script>
        // Previsualización de imagen
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('imagePreview');
                output.innerHTML = `<img src="${reader.result}">`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // Lógica del Menú Hamburguesa
        const btnHamburguesa = document.getElementById('hamburger-btn');
        const menuDesplegable = document.getElementById('menu-items');
        if (btnHamburguesa) {
            btnHamburguesa.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDesplegable.classList.toggle('show-menu');
            });
        }

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("¡Producto guardado exitosamente!");
            window.location.href = 'panel_de_admin.html';
        });
    </script>
</body>
</html>
