<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Reporte de Ventas</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sales-report-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr; 
            gap: 20px;
            margin-top: 20px;
        }

        .table-container-responsive {
            width: 100%;
            overflow-x: auto; 
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .report-data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px; 
        }

        .report-data-table th, .report-data-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        @media (max-width: 992px) {
            .sales-report-grid {
                grid-template-columns: 1fr; 
            }
            .chart-card.sales-chart {
                height: 450px; 
            }
        }
    </style>
</head>
<body class="dashboard-page">

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
        <div class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
            </button>
            <i class="fa-solid fa-bars"></i>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="panel_de_admin.html">Dashboard</a>
                <a href="Reporte_de_compras.html">Compras</a>
                <a href="../../index.html">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='panel_de_admin.html'">
                <i class="fa-solid fa-house"></i>
            </button>
            <span class="admin-label" id="admin-name">Admin</span>
            <img src="../../Imagenes/miku.png.jpg" alt="Avatar" class="avatar" style="object-fit: cover; border-radius: 50%;">
        </div>
    </header>

    <main class="main-content inventory-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.6);"></div>

        <div class="report-container large-report">
            <h1 class="report-title" style="text-align: center; color: #5d4037; margin-top: 20px;">Reporte de Ventas Anual</h1>

            <div class="sales-report-grid">
                <div class="table-container-responsive">
                    <table class="report-data-table">
                        <thead>
                            <tr style="background-color: #5d4037; color: white;">
                                <th>Mes</th>
                                <th>Ventas ($)</th>
                                <th>Crecimiento</th>
                            </tr>
                        </thead>
                        <tbody id="sales-table-body">
                            </tbody>
                    </table>
                </div>

                <div class="chart-card sales-chart" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h2 style="text-align: center; color: #5d4037;">Tendencia de Ventas</h2>
                    <div style="height: 350px; position: relative;">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px;">
        © Todos los derechos reservados 2026. La Lechuza Lectora
    </footer>

    

    <script>
        // DATOS MAESTROS: Solo edita aquí para actualizar todo el reporte
        const datosVentas = [
            { mes: 'Ene', monto: 1500, crecimiento: 500 },
            { mes: 'Feb', monto: 2000, crecimiento: 500 },
            { mes: 'Mar', monto: 2300, crecimiento: 300 },
            { mes: 'Abr', monto: 2200, crecimiento: -100 },
            { mes: 'May', monto: 2900, crecimiento: 700 },
            { mes: 'Jun', monto: 2500, crecimiento: 1600 },
            { mes: 'Jul', monto: 6500, crecimiento: 2000 },
            { mes: 'Ago', monto: 5000, crecimiento: -500 },
            { mes: 'Sep', monto: 7000, crecimiento: -1000 },
            { mes: 'Oct', monto: 7300, crecimiento: 300 },
            { mes: 'Nov', monto: 8000, crecimiento: 700 },
            { mes: 'Dic', monto: 6000, crecimiento: -2000 }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // Cargar datos de usuario
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            if (usuario && usuario.nombre) {
                document.getElementById('admin-name').innerText = usuario.nombre;
            }

            // Inicializar componentes
            llenarTabla();
            crearGrafica();
            initMenu();
        });

        function initMenu() {
            const btn = document.getElementById('hamburger-btn');
            const menu = document.getElementById('menu-items');
            if (btn && menu) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('show-menu');
                });
            }
        }

        function llenarTabla() {
            const tbody = document.getElementById('sales-table-body');
            tbody.innerHTML = ""; 

            datosVentas.forEach(item => {
                const colorC = item.crecimiento >= 0 ? 'green' : 'red';
                const simbolo = item.crecimiento >= 0 ? '▲ +' : '▼ ';

                const fila = `
                    <tr>
                        <td>${item.mes}</td>
                        <td>$${item.monto.toLocaleString()}</td>
                        <td style="color: ${colorC}; font-weight: bold;">${simbolo}${Math.abs(item.crecimiento)}</td>
                    </tr>
                `;
                tbody.innerHTML += fila;
            });
        }

        function crearGrafica() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            
            const etiquetas = datosVentas.map(item => item.mes);
            const valores = datosVentas.map(item => item.monto);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        label: 'Ventas Mensuales ($)',
                        data: valores,
                        borderColor: '#5d4037',
                        backgroundColor: 'rgba(93, 64, 55, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#5d4037'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            ticks: { callback: value => '$' + value }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
