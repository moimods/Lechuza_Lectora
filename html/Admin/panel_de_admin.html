<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Perfil Administrador</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        
        @media (max-width: 768px) {
            .admin-actions-grid {
                grid-template-columns: 1fr !important; 
                gap: 15px;
            }

            .profile-info-card {
                flex-direction: column; 
                text-align: center;
            }

            .profile-container {
                width: 90%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body class="admin-profile-page">

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="Gestion_de_inventario.html">Inventario</a>
                <a href="Gestion_productos.html">Productos</a>
                <a href="../../index.html">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='../../index.html'">
                <i class="fa-solid fa-house"></i>
            </button>
            <img src="../../Imagenes/miku.png.jpg" alt="Avatar Admin" class="avatar" style="object-fit: cover; border-radius: 50%;">
        </div>
    </header>

    <main class="main-content profile-main">
        <div class="background-overlay admin-profile-bg" style="filter: brightness(0.6);"></div>

        <div class="profile-container">
            <h1 class="profile-title" style="text-align: center; color: #5d4037; margin-bottom: 20px; font-size: 1.8rem;">Panel de Administrador</h1>

            <div class="profile-info-card" style="display: flex; align-items: center; gap: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Admin" class="profile-avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                <div class="profile-text">
                    <h2 style="margin: 0; color: #5d4037;">Admin Principal</h2>
                    <p style="margin: 5px 0 0; color: #888;">admin534@gmail.com</p>
                </div>
            </div>

            <div class="admin-actions-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px;">
                
                <div class="action-module" onclick="location.href='Gestion_de_inventario.html'" style="background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: transform 0.2s;">
                    <i class="fa-solid fa-warehouse" style="font-size: 40px; color: #5d4037;"></i>
                    <h3 style="margin: 10px 0 5px;">Almacén</h3>
                    <p style="font-size: 0.9rem; color: #666;">Inventario</p>
                </div>
                
                <div class="action-module" onclick="location.href='Reporte_de_ventas.html'" style="background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer;">
                    <i class="fa-solid fa-sack-dollar" style="font-size: 40px; color: #5d4037;"></i>
                    <h3 style="margin: 10px 0 5px;">Ventas</h3>
                    <p style="font-size: 0.9rem; color: #666;">Reportes mensuales</p>
                </div>

                <div class="action-module" onclick="location.href='Reporte_de_compras.html'" style="background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer;">
                    <i class="fa-solid fa-list-check" style="font-size: 40px; color: #5d4037;"></i>
                    <h3 style="margin: 10px 0 5px;">Compras</h3>
                    <p style="font-size: 0.9rem; color: #666;">Libros adquiridos</p>
                </div>

                <div class="action-module" onclick="location.href='Gestion_productos.html'" style="background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid #5d4037;">
                    <i class="fa-solid fa-book-medical" style="font-size: 40px; color: #5d4037;"></i>
                    <h3 style="margin: 10px 0 5px;">Productos</h3>
                    <p style="font-size: 0.9rem; color: #666;">Agregar libros</p>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 30px; margin-bottom: 30px;">
                <button class="btn-secondary" onclick="location.href='../../index.html'" style="padding: 12px 25px; cursor: pointer;">Cerrar Sesión Admin</button>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037;">
        © Todos los derechos reservados 2026. La Lechuza Lectora
    </footer>

    <script>
        const btnHamburguesa = document.getElementById('hamburger-btn');
        const menuDesplegable = document.getElementById('menu-items');

        if (btnHamburguesa && menuDesplegable) {
            btnHamburguesa.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDesplegable.classList.toggle('show-menu');
            });
        }

        document.addEventListener('click', () => {
            if (menuDesplegable && menuDesplegable.classList.contains('show-menu')) {
                menuDesplegable.classList.remove('show-menu');
            }
        });
    </script>
</body>
</html>
