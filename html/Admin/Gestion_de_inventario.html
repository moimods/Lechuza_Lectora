<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Gestión de Inventario</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="dashboard-page">

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
        <div class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="panel_de_admin.html">Panel Principal</a>
                <a href="Gestion_productos.html">Agregar Producto</a>
                <a href="Reporte_de_ventas.html">Reportes</a>
                <a href="../../index.html" onclick="localStorage.clear()">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <a href="panel_de_admin.html" class="home-icon">
                <i class="fa-solid fa-house"></i>
            </a>
            <span class="admin-label">Admin</span>
            <img src="../../Imagenes/miku.png.jpg" alt="Avatar Admin" class="avatar" style="object-fit: cover; border-radius: 50%; width: 40px; height: 40px;">
        </div>
    </header>

    <main class="main-content inventory-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.6);"></div>

        <div class="inventory-container">
            <div class="inventory-header">
                <i class="fa-solid fa-arrow-left" onclick="location.href='panel_de_admin.html'" style="cursor: pointer; color: white; font-size: 1.5rem; margin-right: 15px;"></i>
                <h1 class="dashboard-title">Control de Existencias</h1>
            </div>

            <div class="inventory-table-wrapper" style="overflow-x: auto; background: white; border-radius: 8px;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Libro / Producto</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 20px;">Cargando inventario...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="inventory-footer">
                <button class="btn-print" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> Generar Reporte PDF
                </button>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        © Todos los derechos reservados 2026. La Lechuza Lectora
    </footer>

    <script>
        // 1. SEGURIDAD: Verificar si es Admin
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario || usuario.rol !== 'admin') {
            alert("Acceso denegado.");
            window.location.href = '../Inicio_de_sesion/Inicio_sesion_admin.html';
        }

        // 2. Lógica del Menú Hamburguesa
        const btnHamburguesa = document.getElementById('hamburger-btn');
        const menuDesplegable = document.getElementById('menu-items');

        if (btnHamburguesa && menuDesplegable) {
            btnHamburguesa.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDesplegable.classList.toggle('show-menu');
            });
        }

        // 3. CARGAR DATOS REALES DESDE EL SERVIDOR
        async function cargarInventario() {
            try {
                const response = await fetch('http://localhost:3000/api/productos');
                const productos = await response.json();
                
                const tablaBody = document.getElementById('tabla-inventario');
                tablaBody.innerHTML = ''; 

                if (productos.length === 0) {
                    tablaBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay productos registrados</td></tr>';
                    return;
                }

                productos.forEach(prod => {
                    const stockVal = parseInt(prod.stock);
                    const claseEstado = stockVal > 5 ? 'available' : (stockVal > 0 ? 'low-stock' : 'sold-out');
                    const textoEstado = stockVal > 5 ? 'Disponible' : (stockVal > 0 ? 'Pocas unidades' : 'Agotado');
                    
                    tablaBody.innerHTML += `
                        <tr>
                            <td>#${prod.id_producto}</td>
                            <td style="font-weight: bold;">${prod.nombre}</td>
                            <td>${prod.categoria || 'Sin categoría'}</td>
                            <td>${prod.stock} unidades</td>
                            <td>$${prod.precio}</td>
                            <td><span class="status-tag ${claseEstado}">${textoEstado}</span></td>
                            <td>
                                <button class="btn-edit" onclick="location.href='Gestion_productos.html?id=${prod.id_producto}'">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('tabla-inventario').innerHTML = '<tr><td colspan="7" style="color:red; text-align:center;">Error al conectar con el servidor</td></tr>';
            }
        }

        window.onload = cargarInventario;
    </script>
</body>
</html>
