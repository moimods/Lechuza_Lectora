<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Reporte de Compras</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .key-metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .charts-and-table-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .key-metrics-grid { grid-template-columns: 1fr; }
            .charts-and-table-grid { grid-template-columns: 1fr; }
            .data-table-card { grid-column: span 1 !important; }
        }

        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .metric-card i {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #5d4037;
        }

        .report-data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            min-width: 600px; 
        }

        .report-data-table th, .report-data-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .chart-container { height: 300px; width: 100%; }

        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="dashboard-page">

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
        <div class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
            </button>
            <i class="fa-solid fa-bars"></i>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="panel_de_admin.html">Dashboard</a>
                <a href="Reporte_de_ventas.html">Ventas</a>
                <a href="../../index.html">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='panel_de_admin.html'">
                <i class="fa-solid fa-house"></i>
            </button>
            <img src="../../Imagenes/miku.png.jpg" alt="Avatar Admin" class="avatar" style="object-fit: cover; border-radius: 50%;">
        </div>
    </header>

    <main class="main-content inventory-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.6);"></div>
        
        <div class="report-container large-report">
            <h1 class="report-title" style="text-align: center; color: #5d4037; margin-bottom: 25px;">Reporte de Inversión y Compras</h1>

            <div class="key-metrics-grid">
                <div class="metric-card">
                    <i class="fa-solid fa-sack-dollar" style="color: #daa520;"></i>
                    <p>Inversión Total</p>
                    <strong id="total-inversion">$0</strong>
                </div>
                <div class="metric-card">
                    <i class="fa-solid fa-book" style="color: #388e3c;"></i>
                    <p>Libros Adquiridos</p>
                    <strong id="total-libros">0</strong>
                </div>
                <div class="metric-card">
                    <i class="fa-solid fa-calendar-check" style="color: #2196f3;"></i>
                    <p>Mes Mayor Gasto</p>
                    <strong id="mes-pico">-</strong>
                </div>
            </div>

            <div class="charts-and-table-grid">
                <div class="chart-card">
                    <h2>Inversión por Mes</h2>
                    <div class="chart-container">
                        <canvas id="ventasMesChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <h2>Nuevas Adquisiciones (Stock)</h2>
                    <div class="chart-container">
                        <canvas id="crecimientoChart"></canvas>
                    </div>
                </div>
                
                <div class="data-table-card" style="grid-column: span 2; background: white; padding: 20px; border-radius: 10px;">
                    <h2>Desglose Detallado de Adquisiciones</h2>
                    <div class="table-responsive">
                        <table class="report-data-table">
                            <thead>
                                <tr style="background-color: #5d4037; color: white;">
                                    <th>MES</th>
                                    <th>PRESUPUESTO</th>
                                    <th>INVERSIÓN REAL</th>
                                    <th>LIBROS NUEVOS</th>
                                    <th>ESTADO</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-compras">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DATOS MAESTROS DE COMPRAS
        const datosCompras = [
            { mes: 'Enero', presupuesto: 90000, real: 95000, libros: 45 },
            { mes: 'Febrero', presupuesto: 102000, real: 85000, libros: 30 },
            { mes: 'Marzo', presupuesto: 120000, real: 130000, libros: 65 }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            llenarMetricas();
            llenarTabla();
            crearGraficas();
        });

        function llenarMetricas() {
            const total = datosCompras.reduce((acc, curr) => acc + curr.real, 0);
            const libros = datosCompras.reduce((acc, curr) => acc + curr.libros, 0);
            const mayorGasto = [...datosCompras].sort((a,b) => b.real - a.real)[0];

            document.getElementById('total-inversion').innerText = `$${total.toLocaleString()}`;
            document.getElementById('total-libros').innerText = libros;
            document.getElementById('mes-pico').innerText = `${mayorGasto.mes} ($${mayorGasto.real.toLocaleString()})`;
        }

        function llenarTabla() {
            const tbody = document.getElementById('tabla-compras');
            tbody.innerHTML = "";

            datosCompras.forEach(item => {
                const dif = ((item.real - item.presupuesto) / item.presupuesto) * 100;
                const color = item.real <= item.presupuesto ? 'green' : 'red';
                const icono = item.real <= item.presupuesto ? '▲' : '▼';

                tbody.innerHTML += `
                    <tr>
                        <td>${item.mes}</td>
                        <td>$${item.presupuesto.toLocaleString()}</td>
                        <td>$${item.real.toLocaleString()}</td>
                        <td>${item.libros} uds.</td>
                        <td style="color: ${color}; font-weight: bold;">
                            ${icono} ${Math.abs(dif).toFixed(1)}%
                        </td>
                    </tr>
                `;
            });
        }

        function crearGraficas() {
            const labels = datosCompras.map(d => d.mes);
            
            // Gráfica de Barras (Inversión)
            new Chart(document.getElementById('ventasMesChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Gasto Real ($)',
                        data: datosCompras.map(d => d.real),
                        backgroundColor: '#5d4037'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Gráfica de Línea (Stock)
            new Chart(document.getElementById('crecimientoChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Libros Ingresados',
                        data: datosCompras.map(d => d.libros),
                        borderColor: '#fbc02d',
                        backgroundColor: 'rgba(251, 192, 45, 0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        const btn = document.getElementById('hamburger-btn');
        const menu = document.getElementById('menu-items');
        btn?.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('show-menu');
        });
    </script>
</body>
</html>
