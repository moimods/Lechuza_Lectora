<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Agregar Domicilio</title>
  
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* AJUSTES RESPONSIVOS CRÍTICOS */
        @media (max-width: 1024px) {
            .address-grid {
                grid-template-columns: 1fr 1fr !important; /* Dos columnas en tablets */
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .form-card.large-form-card {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 20px auto;
            }

            .address-grid {
                grid-template-columns: 1fr !important; /* Una sola columna en celulares */
                gap: 15px;
            }

            .form-actions-bottom {
                flex-direction: column !important; /* Botones apilados verticalmente */
                gap: 10px;
            }

            .btn-primary, .btn-cancel {
                width: 100% !important;
                padding: 12px !important;
                font-size: 1rem;
            }

            input, textarea {
                font-size: 16px !important; /* Evita el zoom automático en iPhone al enfocar campos */
            }
        }

        /* Estabilización del fondo */
        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #5d4037;
            text-align: left;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body class="form-page">
    
    <header class="navbar user-navbar">
        <div class="logo-container" onclick="window.location.href='../../index.html'" style="cursor: pointer;">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='../Logeado/perfil.html'"><i class="fa-solid fa-house"></i></button>
        </div>
    </header>

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card large-form-card" style="max-width: 1000px; background: rgba(245, 245, 245, 0.95); border-radius: 10px; padding: 40px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
            <h1 style="color: #5d4037; text-align: center; margin-bottom: 30px;">Agregar Nuevo Domicilio</h1>

            <form id="address-form" class="address-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div class="input-group">
                    <label for="direccion">Calle y Número</label>
                    <input type="text" id="direccion" name="direccion" required placeholder="Ej. Av. Universidad 123">
                </div>
                <div class="input-group">
                    <label for="cp">Código Postal</label>
                    <input type="text" id="cp" name="cp" required placeholder="5 dígitos">
                </div>
                <div class="input-group">
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" name="estado" required>
                </div>
                <div class="input-group">
                    <label for="municipio">Municipio o Alcaldía</label>
                    <input type="text" id="municipio" name="municipio" required>
                </div>
                <div class="input-group">
                    <label for="colonia">Colonia</label>
                    <input type="text" id="colonia" name="colonia" required>
                </div>
                <div class="input-group">
                    <label for="numero">Int / Depto (Opcional)</label>
                    <input type="text" id="numero" name="numero">
                </div>
                <div class="input-group">
                    <label for="tipo_domicilio">Tipo (Casa / Trabajo)</label>
                    <input type="text" id="tipo_domicilio" name="tipo_domicilio" required>
                </div>
                <div class="input-group">
                    <label for="nombre">Nombre de quien recibe</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="input-group">
                    <label for="telefono">Teléfono de contacto</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>
                <div class="input-group" style="grid-column: 1 / -1;">
                    <label for="indicaciones">Referencias o indicaciones adicionales (opcional)</label>
                    <textarea id="indicaciones" name="indicaciones" rows="3" style="width: 100%;"></textarea>
                </div>
            </form>

            <div class="form-actions-bottom" style="display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
                <button type="submit" form="address-form" class="btn-primary" style="background: #5d4037; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Guardar Domicilio
                </button>
                <button type="button" class="btn-cancel" onclick="window.history.back()" style="background: #555; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Cancelar y Regresar
                </button>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037; margin-top: auto;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <div id="custom-success-modal" class="modal-backdrop" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px;">
            <h2 id="custom-modal-title" style="color: #5d4037; margin-bottom: 10px;">¡Listo!</h2>
            <p id="custom-modal-message" style="margin-bottom: 20px;">Domicilio agregado con éxito.</p>
            <button id="btn-modal-accept-success" style="background: #5d4037; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer;">Aceptar</button>
        </div>
    </div>

    <script>
    document.getElementById('address-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        // 1. Obtener ID del usuario (asumiendo que lo guardaste en el login)
        // Si no tienes id_usuario, puedes buscarlo primero con el email
        const idUsuario = localStorage.getItem('userId'); 

        // 2. Recolectar datos del formulario
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.id_usuario = idUsuario; // Añadimos el ID necesario para la FK

        try {
            const response = await fetch('http://localhost:3000/api/direcciones/agregar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.success) {
                // Mostrar tu modal de éxito
                document.getElementById('custom-success-modal').style.display = 'flex';
            }
        } catch (error) {
            alert("Hubo un error al conectar con el servidor.");
        }
    });

    // Cerrar modal y regresar
    document.getElementById('btn-modal-accept-success').onclick = () => {
        window.location.href = 'perfil.html';
    };
</script>
</body>
</html>
