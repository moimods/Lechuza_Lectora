<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Catálogo</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="../../JS/userDropdown.js" defer></script>
    <script src="../../JS/productLoader.js" defer></script>
    <script src="../../JS/filterSidebar.js" defer></script>
    <script src="../../JS/cartManager.js" defer></script>

    <style>
        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column !important;
                height: auto !important;
                padding: 10px !important;
            }

            .search-bar.detail-search {
                width: 100% !important;
                margin: 10px 0 !important;
                order: 3; 
            }

            .nav-links {
                display: none; 
            }

            .auth-actions.user-actions {
                width: 100%;
                justify-content: space-around;
                margin-bottom: 5px;
            }

            .catalog-container {
                grid-template-columns: 1fr !important; 
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important;
                gap: 15px !important;
                padding: 10px !important;
            }

            .btn-filter-toggle {
                display: block !important; 
                width: 100%;
                margin-bottom: 15px;
            }

            .book-product-card img {
                height: 180px !important;
            }
        }

      
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999 !important; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }
        
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 0.9em;
            text-align: left;
        }

        .avatar {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #5d4037;
        }
    </style>
</head>
<body>
<header class="navbar detail-navbar">
    <div class="logo-container">
        <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo">
        <span class="site-name">LA LECHUZA LECTORA</span>
    </div>
    <div class="search-bar detail-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="main-search" placeholder="Buscar Libros...">
    </div>
    <nav class="nav-links">
        <a href="Acerca_de.html">Acerca de</a>
        <a href="Contacto.html">Contacto</a>
        <a href="Ayuda.html">Ayuda</a>
        <a href="#" class="active-link">Catálogo</a>
    </nav>

    <div class="auth-actions user-actions">
        <button class="icon-button" onclick="window.location.href='../../index.html'">
            <i class="fa-solid fa-house"></i>
        </button>
        <button class="icon-button cart-button" id="cart-icon-btn" onclick="window.location.href='carrito.html'">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cart-count">2</span>
        </button>
        <div class="avatar-dropdown-container" style="position: relative;">
            <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn" onclick="forceToggleMenu()">
            
            <div class="dropdown-menu" id="avatar-dropdown">
                <a href="perfil.html" id="profile-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                <a href="../../index.html" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
            </div>
        </div>
    </div>
</header>

<main class="main-content catalog-main">
    <div class="background-overlay" style="filter: brightness(0.8);"></div>
    
    <button id="filter-toggle" class="btn-filter-toggle" style="background: #5d4037; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin: 10px;">
        <i class="fa-solid fa-filter"></i> Ver Filtros
    </button>

    <div class="catalog-container" style="display: grid; grid-template-columns: 250px 1fr; gap: 20px; padding: 20px;">
        <aside class="filter-sidebar" id="filter-sidebar">
            <div class="sidebar-header">
                <h2>Filtros</h2>
                <button id="sidebar-close-btn" class="btn-close-sidebar"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="filter-section filter-genres">
                <h3>Género Principal</h3>
                <div class="filter-options">
                    <label><input type="checkbox" data-filter="Terror"> Terror</label><br>
                    <label><input type="checkbox" data-filter="Novela"> Novela Contemporánea</label>
                </div>
            </div>
        </aside>

        <section class="product-grid" id="products-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px;">
            </section>
    </div>

    <div class="carousel-nav catalog-pagination" style="text-align: center; padding: 30px;">
        <button id="prev-page-btn" class="btn-primary">← Anterior</button>
        <span class="pagination"></span>
        <button id="next-page-btn" class="btn-primary">Siguiente →</button>
    </div>
</main>

<footer class="site-footer" style="text-align: center; padding: 20px; background: rgba(44, 44, 44, 0.9); color: white;">
    <div class="copyright">© 2026 La Lechuza Lectora ©</div>
</footer>

<script>
function forceToggleMenu() {
    const menu = document.getElementById('avatar-dropdown');
    if (menu) {
        const isHidden = window.getComputedStyle(menu).display === 'none';
        menu.style.display = isHidden ? 'block' : 'none';
    }
}

document.addEventListener('click', function(event) {
    const menu = document.getElementById('avatar-dropdown');
    const btn = document.getElementById('avatar-btn');
    if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) {
        menu.style.display = 'none';
    }
});

// Lógica de carga de productos del localStorage (Simulación)
window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('products-container');
    if (container) {
        const misLibros = JSON.parse(localStorage.getItem('misLibros')) || [
            {titulo: "El Resplandor", autor: "Stephen King", precio: "350", imagen: "../../Imagenes/Libros/1.jpg"},
            {titulo: "Cien Años de Soledad", autor: "G. García Márquez", precio: "420", imagen: "../../Imagenes/Libros/2.jpg"}
        ];
        misLibros.forEach(libro => {
            const card = document.createElement('div');
            card.className = 'book-product-card';
            card.style.background = "white";
            card.style.padding = "15px";
            card.style.borderRadius = "8px";
            card.style.textAlign = "center";
            card.style.boxShadow = "0 4px 6px rgba(0,0,0,0.1)";
            card.innerHTML = `
                <img src="${libro.imagen}" alt="${libro.titulo}" style="width:100%; height:220px; object-fit:contain; margin-bottom:10px;">
                <h3 class="book-title-grid" style="font-size:1rem; color:#5d4037; height:40px; overflow:hidden;">${libro.titulo}</h3>
                <p style="font-size:0.8rem; color:#777;">${libro.autor}</p>
                <span class="book-price-grid" style="font-weight:bold; color:#d32f2f; display:block; margin:10px 0;">$${libro.precio}</span>
                <div class="product-actions" style="display:flex; gap:5px;">
                    <button class="btn-add-to-cart" style="flex:1; background:#5d4037; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">Añadir</button>
                    <button class="btn-buy-now" style="flex:1; background:#fbc02d; color:#5d4037; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">Comprar</button>
                </div>
            `;
            container.appendChild(card);
        });
    }
});
</script>
</body>
</html>
