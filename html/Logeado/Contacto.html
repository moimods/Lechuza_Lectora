<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Contacto</title>
    <link rel="icon" type="image/x-icon" href="../../Imagenes/logo.png">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <script src="../../JS/Boton_Ini.js" defer></script>
    <script src="../../JS/UserDropdown.js" defer></script>
    <script src="../../JS/cartManager.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* AJUSTES RESPONSIVOS CRÍTICOS */
        @media (max-width: 768px) {
            .contact-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 20px auto !important;
            }

            .page-title {
                font-size: 1.8rem !important;
            }

            .contact-grid {
                grid-template-columns: 1fr !important; /* Apila formulario e info social */
                gap: 30px !important;
            }

            .contact-form-wrapper {
                padding: 10px !important;
            }

            .large-logo-bg {
                width: 200px !important; /* Reduce el logo de fondo en móvil */
                opacity: 0.05 !important;
            }

            input, textarea {
                font-size: 16px !important; /* Evita zoom molesto en iPhone */
                padding: 12px !important;
            }

            .btn-send {
                width: 100% !important;
                padding: 15px !important;
                font-size: 1rem !important;
            }

            .social-info-card {
                text-align: center;
            }
        }

        /* Estabilización del menú desplegable */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999 !important; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }
        
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            text-align: left;
        }

        .avatar {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #5d4037;
        }
    </style>
</head>
<body>

    <header class="navbar detail-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <a href="Acerca_de.html">Acerca de</a>
            <a href="#" class="active-link">Contacto</a>
            <a href="Ayuda.html">Ayuda</a>
            <a href="Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <a href="carrito.html" class="icon-link cart-button" id="cart-icon-btn" style="position: relative; margin-right: 15px;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </a>
            
            <div class="avatar-dropdown-container" style="position: relative; display: inline-block;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn" onclick="forceToggleMenu()">
                
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="perfil.html" id="profile-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="../../index.html" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content contact-main">
        <div class="background-overlay contact-bg" style="filter: brightness(0.8);"></div>

        <div class="contact-container" style="background: rgba(240, 231, 203, 0.95); border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 40px auto; max-width: 1100px; position: relative; z-index: 5;">
            <h1 class="page-title" style="color: #5d4037; text-align: center; margin-bottom: 10px;">Contáctanos</h1>
            <p class="page-subtitle" style="text-align: center; color: #8d6e63; margin-bottom: 40px; max-width: 800px; margin-left: auto; margin-right: auto;">¿Tienes preguntas o sugerencias? Utiliza el formulario o nuestras redes sociales.</p>

            <div class="contact-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
                <div class="contact-form-wrapper" style="position: relative; background: white; padding: 30px; border-radius: 10px; border: 1px solid #ddd;">
                    <img src="../../Imagenes/logo.png" alt="Fondo" class="large-logo-bg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; opacity: 0.05; pointer-events: none;">

                    <form class="contact-form" style="position: relative; z-index: 2;">
                        <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Nombre</label>
                        <input type="text" placeholder="Tu nombre" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
                        
                        <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Correo Electrónico</label>
                        <input type="email" placeholder="ejemplo@correo.com" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

                        <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Mensaje</label>
                        <textarea placeholder="¿En qué podemos ayudarte?" rows="5" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; resize: none;"></textarea>

                        <button type="submit" class="btn-send" style="background: #5d4037; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">Enviar Mensaje</button>
                    </form>
                </div>

                <div class="social-info-card" style="background: white; padding: 30px; border-radius: 10px; border: 1px solid #ddd; height: fit-content;">
                    <h2 style="color: #5d4037; font-size: 1.2rem; margin-bottom: 20px;">Redes Sociales</h2>
                    <div class="social-icons-contact" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;">
                        <a href="#" style="font-size: 1.5rem; color: #5d4037;"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="#" style="font-size: 1.5rem; color: #5d4037;"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" style="font-size: 1.5rem; color: #5d4037;"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                    <address style="font-style: normal; color: #666; font-size: 0.9rem; line-height: 1.6;">
                        <i class="fa-solid fa-location-dot"></i> Av Telecomunicaciones, Iztapalapa, 09208 CDMX.<br><br>
                        <i class="fa-solid fa-phone"></i> <strong>Teléfono:</strong><br>
                        55-24-01-43-82
                    </address>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037; margin-top: auto;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <script>
        function forceToggleMenu() {
            const menu = document.getElementById('avatar-dropdown');
            if (menu) {
                const isHidden = window.getComputedStyle(menu).display === 'none';
                menu.style.display = isHidden ? 'block' : 'none';
            }
        }
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('avatar-dropdown');
            const btn = document.getElementById('avatar-btn');
            if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) {
                menu.style.display = 'none';
            }
        });
    </script>
</body>
</html>
