<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Ayuda</title>
    <link rel="icon" type="image/x-icon" href="../../Imagenes/logo.png">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <script src="../../JS/UserDropdown.js" defer></script>
    <script src="../../JS/cartManager.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* --- ESTILOS MENÚ HAMBURGUESA --- */
        .hamburger-btn {
            display: none; /* Oculto en PC */
            background: none;
            border: none;
            color: #5d4037;
            font-size: 1.8rem;
            cursor: pointer;
            order: 2;
        }

    
        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: space-between;
                height: auto !important;
                padding: 10px 20px !important;
            }

            .hamburger-btn {
                display: block; /* Visible en móviles */
            }

            .logo-container { order: 1; }
            .auth-actions.user-actions { order: 3; margin-left: 0; }

            /* Menú desplegable */
            .nav-links {
                display: none; 
                flex-direction: column;
                width: 100%;
                order: 4;
                background: rgba(244, 236, 226, 0.98);
                padding: 15px 0;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                margin-top: 10px;
                border-radius: 0 0 10px 10px;
            }

            .nav-links.active {
                display: flex !important;
            }

            .nav-links a {
                padding: 12px;
                width: 100%;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }

            .help-container {
                width: 95% !important;
                padding: 25px 15px !important;
                margin: 20px auto !important;
            }
            .help-title { font-size: 1.5rem !important; text-align: center; }
            .help-module { padding: 15px !important; }
            .fa-angle-right { display: none; }
        }

        /* --- DROPDOWN AVATAR --- */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 50px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999 !important; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }

        .dropdown-menu.show { display: block; }
        
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            text-align: left;
        }

        .avatar {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #5d4037;
        }
    </style>
</head>
<body>

    <header class="navbar detail-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <nav class="nav-links" id="mobile-nav">
            <a href="Acerca_de.html">Acerca de</a>
            <a href="Contacto.html">Contacto</a>
            <a href="#" class="active-link">Ayuda</a>
            <a href="Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='../../index.html'"><i class="fa-solid fa-house"></i></button>

            <a href="carrito.html" class="icon-link cart-button" id="cart-icon-btn" style="position: relative; margin-right: 15px;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">2</span>
            </a>
            
            <div class="avatar-dropdown-container" style="position: relative; display: flex; align-items: center;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="perfil.html" id="profile-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="../../index.html" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content help-main">
        <div class="background-overlay help-bg" style="filter: brightness(0.8);"></div>

        <div class="help-container" style="background: rgba(240, 231, 203, 0.95); border-radius: 10px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 40px auto; max-width: 800px; position: relative; z-index: 5;">
            <h1 class="help-title" style="color: #5d4037; margin-bottom: 25px;">¿Con qué podemos ayudarte?</h1>
            
            <div class="help-search-bar" style="background: white; padding: 12px; border-radius: 25px; display: flex; align-items: center; border: 1px solid #ccc; margin-bottom: 30px;">
                <i class="fa-solid fa-magnifying-glass" style="color: #999; margin-right: 10px;"></i>
                <input type="text" placeholder="Buscar en Ayuda" style="border: none; outline: none; width: 100%; font-size: 1rem;">
            </div>

            <div class="help-modules-grid" style="display: flex; flex-direction: column; gap: 15px;">
                <a href="#" class="help-module" style="background: white; padding: 15px 25px; border-radius: 10px; display: flex; align-items: center; text-decoration: none; border: 1px solid #ddd;">
                    <i class="fa-solid fa-file-invoice-dollar" style="color: #d32f2f; font-size: 1.8rem; margin-right: 20px;"></i>
                    <div class="module-text" style="flex-grow: 1;">
                        <h3 style="color: #5d4037; margin: 0;">Gestionar Compras</h3>
                        <p style="color: #666; font-size: 0.9rem;">Seguir o cancelar pedidos.</p>
                    </div>
                </a>

                <a href="perfil.html" class="help-module" style="background: white; padding: 15px 25px; border-radius: 10px; display: flex; align-items: center; text-decoration: none; border: 1px solid #ddd;">
                    <i class="fa-solid fa-user-circle" style="color: #5d4037; font-size: 1.8rem; margin-right: 20px;"></i>
                    <div class="module-text" style="flex-grow: 1;">
                        <h3 style="color: #5d4037; margin: 0;">Mi Perfil</h3>
                        <p style="color: #666; font-size: 0.9rem;">Configuración y datos personales.</p>
                    </div>
                </a>
            </div>

            <div class="contact-prompt" style="text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc;">
                <h2 style="color: #5d4037; margin-bottom: 15px;">¿Necesitas más ayuda?</h2>
                <button class="btn-primary" onclick="window.location.href='Contacto.html'" style="background: #5d4037; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;">Contáctanos</button>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037; margin-top: auto;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <script>
        // FUNCIÓN MENÚ HAMBURGUESA
        function toggleMobileMenu() {
            const nav = document.getElementById('mobile-nav');
            nav.classList.toggle('active');
        }

        // DROPDOWN USUARIO
        const avatarBtn = document.getElementById('avatar-btn');
        const dropdownMenu = document.getElementById('avatar-dropdown');

        if (avatarBtn && dropdownMenu) {
            avatarBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdownMenu.classList.toggle('show');
            });
        }

        // CERRAR AL TOCAR FUERA
        document.addEventListener('click', function(event) {
            const nav = document.getElementById('mobile-nav');
            const hamburger = document.getElementById('hamburger-btn');
            
            if (avatarBtn && !avatarBtn.contains(event.target) && !dropdownMenu.contains(event.target)) {
                dropdownMenu.classList.remove('show');
            }

            if (nav && hamburger && !hamburger.contains(event.target) && !nav.contains(event.target)) {
                nav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
