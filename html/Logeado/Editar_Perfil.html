<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - La Lechuza Lectora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <style>
        /* AJUSTES RESPONSIVOS */
        @media (max-width: 768px) {
            .edit-profile-container { width: 95% !important; padding: 20px 15px !important; }
            .form-actions { flex-direction: column !important; }
            .form-actions button { width: 100% !important; }
        }

        /* Dropdown Avatar */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }
        .avatar { border-radius: 50%; width: 40px; height: 40px; object-fit: cover; cursor: pointer; border: 2px solid #5d4037; }
    </style>
</head>
<body class="form-page">
    
    <header class="navbar detail-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <a href="Acerca_de.html">Acerca de</a>
            <a href="Contacto.html">Contacto</a>
            <a href="Ayuda.html">Ayuda</a>
            <a href="Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='perfil.html'"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn" onclick="forceToggleMenu()">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="../../index.html" onclick="localStorage.clear()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        <div class="background-overlay" style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed; background-size: cover; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div> 
        
        <div class="profile-main-wrapper" style="position: relative; z-index: 5; margin-top: 50px; padding-bottom: 50px;">
            <h1 style="color: #ffffff; text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Editar Mi Información</h1>

            <div class="edit-profile-container" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto;">
                <form id="edit-profile-form">
                    <div class="edit-photo-section" style="text-align: center; margin-bottom: 25px;">
                        <img src="../../Imagenes/miku.png.jpg" alt="Avatar actual" id="preview-avatar" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #5d4037;">
                        <div style="margin-top: 15px;">
                            <label for="file-upload" style="cursor: pointer; background: #5d4037; color: white; padding: 10px 20px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; display: inline-block;">
                                <i class="fas fa-camera"></i> Cambiar Foto
                            </label>
                            <input id="file-upload" type="file" style="display:none;" accept="image/*">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                        <label style="display: block; color: #5d4037; font-weight: bold; margin-bottom: 5px;">Nombre Completo</label>
                        <input type="text" id="edit-nombre" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: 25px; text-align: left;">
                        <label style="display: block; color: #5d4037; font-weight: bold; margin-bottom: 5px;">Correo Electrónico (No editable)</label>
                        <input type="email" id="edit-email" readonly style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; background: #f5f5f5; color: #777; cursor: not-allowed;">
                    </div>

                    <div class="form-actions" style="display: flex; gap: 15px; justify-content: flex-end;">
                        <button type="button" onclick="window.location.href='perfil.html'" style="background: #ccc; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #333;">Cancelar</button>
                        <button type="submit" style="background: #5d4037; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #ffffff;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <script>
        const userEmail = localStorage.getItem('userEmail');

        // Cargar datos actuales
        async function prellenarFormulario() {
            if (!userEmail) return;
            try {
                const respuesta = await fetch(`/api/usuario/${userEmail}`);
                const datos = await respuesta.json();
                if (datos) {
                    document.getElementById('edit-nombre').value = datos.nombre_completo;
                    document.getElementById('edit-email').value = datos.email;
                }
            } catch (error) {
                console.error("Error al obtener datos:", error);
            }
        }

        // Guardar cambios
        document.getElementById('edit-profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nuevoNombre = document.getElementById('edit-nombre').value;

            try {
                const respuesta = await fetch('/api/usuario/actualizar', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, nombre: nuevoNombre })
                });

                if (respuesta.ok) {
                    alert('¡Información actualizada!');
                    window.location.href = 'perfil.html';
                } else {
                    alert('Error al actualizar.');
                }
            } catch (error) {
                console.error("Error:", error);
            }
        });

        // Previsualización de imagen
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('preview-avatar').src = reader.result; }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // Menú Avatar
        function forceToggleMenu() {
            const menu = document.getElementById('avatar-dropdown');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        document.addEventListener('click', (e) => {
            if (!document.getElementById('avatar-btn').contains(e.target)) {
                document.getElementById('avatar-dropdown').style.display = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', prellenarFormulario);
    </script>
</body>
</html>
