<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Mi Perfil - La Lechuza Lectora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <script src="../../JS/UserDropdown.js" defer></script>
    <style>
        /* --- ESTILOS MENÚ HAMBURGUESA --- */
        .hamburger-btn {
            display: none; /* Oculto en PC */
            background: none;
            border: none;
            color: #5d4037;
            font-size: 1.8rem;
            cursor: pointer;
            order: 2;
        }

        /* AJUSTES RESPONSIVOS CRÍTICOS */
        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: space-between;
                height: auto !important;
                padding: 10px 20px !important;
            }

            .hamburger-btn {
                display: block; /* Visible en celulares */
            }

            .logo-container { order: 1; }
            .auth-actions { order: 3; margin-left: 0; }

            .search-bar.detail-search {
                width: 100% !important;
                margin: 10px 0 !important;
                order: 4;
            }

            .nav-links {
                display: none; 
                flex-direction: column;
                width: 100%;
                order: 5;
                background: rgba(244, 236, 226, 0.98);
                padding: 15px 0;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                margin-top: 10px;
                border-radius: 0 0 10px 10px;
            }

            .nav-links.active {
                display: flex !important;
            }

            .nav-links a {
                padding: 12px;
                width: 100%;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }

            /* Reajustes del Perfil en móvil */
            .profile-header-card {
                flex-direction: column !important;
                text-align: center;
                padding: 25px 15px !important;
            }
            .profile-avatar-custom {
                width: 100px !important;
                height: 100px !important;
                margin-bottom: 15px;
            }
            .profile-actions-grid-custom {
                grid-template-columns: 1fr !important;
                gap: 15px !important;
            }
            .action-module {
                padding: 20px !important;
                display: flex !important;
                align-items: center;
                gap: 15px;
                text-align: left !important;
            }
            .action-module i { margin-bottom: 0 !important; font-size: 1.5rem !important; }
            .action-module p { display: none; }
        }

        /* Menú de seguridad del avatar */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999 !important; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }

        .dropdown-menu.show { display: block; }
        
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            text-align: left;
        }

        .avatar {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #5d4037;
        }
    </style>
</head>
<body>
    
    <header class="navbar detail-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <div class="search-bar detail-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Buscar en el catálogo...">
        </div>
        
        <nav class="nav-links" id="mobile-nav">
            <a href="Acerca_de.html">Acerca de</a>
            <a href="Contacto.html">Contacto</a>
            <a href="Ayuda.html">Ayuda</a>
            <a href="Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button cart-button" onclick="window.location.href='carrito.html'">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">2</span>
            </button>
            <button class="icon-button" onclick="window.location.href='../../index.html'"><i class="fa-solid fa-house"></i></button>

            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn" onclick="forceToggleMenu()">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="perfil.html" id="profile-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="../../index.html" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        <div class="background-overlay" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed; background-size: cover; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div> 
        
        <div class="profile-main-wrapper" style="position: relative; z-index: 5;">
            <h1 class="profile-title-custom" style="color: #ffffff; text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Panel de Usuario</h1>

            <div class="profile-header-card" style="background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; display: flex; align-items: center; gap: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 0 auto; max-width: 800px;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar" class="profile-avatar-custom" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid #fbc02d;">
                <div class="profile-text-custom">
                    <h2 style="color: #5d4037; margin: 0;">Fernando Machorro</h2> 
                    <p class="email-text" style="color: #777; margin: 5px 0;">machorro29salvidar@gmail.com</p>
                    <a href="Editar_Perfil.html" class="btn-edit-profile" style="background-color: #5d4037; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold;">Editar Cuenta</a>
                </div>
            </div>

            <div class="profile-actions-grid-custom" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; max-width: 800px; margin-left: auto; margin-right: auto;">
                <a href="Informacion_Personal.html" class="action-module" style="background: white; padding: 25px; border-radius: 12px; text-decoration: none; border: 1px solid #ddd; transition: 0.3s; color: inherit;">
                    <i class="fas fa-id-card" style="font-size: 2rem; color: #5d4037;"></i>
                    <h3 style="color: #5d4037; margin: 0;">Información Personal</h3>
                </a>
                <a href="Direcciones.html" class="action-module" style="background: white; padding: 25px; border-radius: 12px; text-decoration: none; border: 1px solid #ddd; transition: 0.3s; color: inherit;">
                    <i class="fas fa-map-marker-alt" style="font-size: 2rem; color: #5d4037;"></i>
                    <h3 style="color: #5d4037; margin: 0;">Direcciones</h3>
                </a>
                <a href="Tarjetas.html" class="action-module" style="background: white; padding: 25px; border-radius: 12px; text-decoration: none; border: 1px solid #ddd; transition: 0.3s; color: inherit;">
                    <i class="fas fa-credit-card" style="font-size: 2rem; color: #5d4037;"></i>
                    <h3 style="color: #5d4037; margin: 0;">Métodos de Pago</h3>
                </a>
                <a href="../Inicio_de_sesion/Cambio_Contraseña.html" class="action-module" style="background: white; padding: 25px; border-radius: 12px; text-decoration: none; border: 1px solid #ddd; transition: 0.3s; color: inherit;">
                    <i class="fas fa-lock" style="font-size: 2rem; color: #5d4037;"></i>
                    <h3 style="color: #5d4037; margin: 0;">Seguridad</h3>
                </a>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #ffffff; margin-top: auto;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <script>
        // FUNCIÓN MENÚ HAMBURGUESA
        function toggleMobileMenu() {
            const nav = document.getElementById('mobile-nav');
            nav.classList.toggle('active');
        }

        // Función avatar dropdown
        function forceToggleMenu() {
            const menu = document.getElementById('avatar-dropdown');
            if (menu) { menu.classList.toggle('show'); }
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('avatar-dropdown');
            const btn = document.getElementById('avatar-btn');
            const nav = document.getElementById('mobile-nav');
            const hamburger = document.getElementById('hamburger-btn');

            if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.remove('show');
            }
            if (nav && hamburger && !hamburger.contains(event.target) && !nav.contains(event.target)) {
                nav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
