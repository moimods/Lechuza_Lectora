<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Método de Pago</title>
    <link rel="stylesheet" href="../../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes específicos para mejorar la experiencia móvil */
        @media (max-width: 768px) {
            .checkout-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 20px auto !important;
            }

            .checkout-title {
                font-size: 1.5rem !important;
            }

            .payment-option {
                padding: 15px !important;
                margin-bottom: 12px !important;
                display: flex !important;
                align-items: center !important;
                font-size: 0.95rem;
            }

            .payment-option i {
                font-size: 1.5rem !important;
                margin: 0 10px !important;
            }

            .add-payment-actions {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .navigation-actions {
                flex-direction: column !important;
                gap: 12px !important;
                margin-top: 30px !important;
            }

            .btn-primary, .btn-dark-action, .btn-secondary {
                width: 100% !important;
                padding: 12px !important;
            }
        }

        /* Estabilización del fondo de marca */
        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* Clase para resaltar la opción seleccionada */
        .payment-option.selected {
            border: 2px solid #fbc02d !important;
            background-color: #fff9e6 !important;
        }
    </style>
</head>
<body class="form-page">
    <main class="main-content cart-main">
        <div class="background-overlay"></div>

        <div class="checkout-container" style="background: rgba(245, 245, 245, 0.95); border-radius: 10px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 650px; margin: 40px auto;">
            <h1 class="checkout-title" style="color: #5d4037; text-align: center; margin-bottom: 30px;">3. Seleccionar Método de Pago</h1>
            
            <div class="checkout-step-content">
                <h2 style="font-size: 1.2rem; color: #5d4037; margin-bottom: 15px; border-bottom: 2px solid #fbc02d; padding-bottom: 5px;">Tus Opciones de Pago</h2>
                
                <div id="payment-options-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <label class="payment-option selected" style="background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                        <input type="radio" name="payment_method" value="paypal" checked onchange="updatePaymentSelection(this)">
                        <i class="fab fa-paypal" style="color: #0070ba; font-size: 24px;"></i> 
                        <span style="font-weight: bold; color: #5d4037;">PayPal</span> 
                        <span style="font-size: 0.9rem; color: #777;">(usuario@ejemplo.com)</span>
                    </label>

                    <label class="payment-option" style="background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                        <input type="radio" name="payment_method" value="card1" onchange="updatePaymentSelection(this)">
                        <i class="fas fa-credit-card" style="color: #333; font-size: 24px;"></i> 
                        <span style="font-weight: bold; color: #5d4037;">Tarjeta de Débito/Crédito</span> 
                        <span style="font-size: 0.9rem; color: #777;">•••• 1234</span>
                    </label>
                </div>

                <div class="add-payment-actions" style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="button" class="btn-secondary btn-add-payment" style="flex: 1; border: 1px solid #5d4037; color: #5d4037; background: transparent; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 0.85rem;">
                        <i class="fas fa-plus"></i> Añadir Tarjeta
                    </button>
                    <button type="button" class="btn-secondary btn-add-payment" style="flex: 1; border: 1px solid #5d4037; color: #5d4037; background: transparent; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 0.85rem;">
                        <i class="fab fa-paypal"></i> Añadir PayPal
                    </button>
                </div>
                
                <div class="navigation-actions" style="display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd;">
                    <button type="button" class="btn-dark-action btn-prev-step" onclick="window.history.back()" style="background: #555; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                        ← Regresar
                    </button>
                    <button type="button" id="btn-finalizar-compra" class="btn-primary" style="background: #5d4037; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                        Revisar y Pagar →
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; background: rgba(44, 44, 44, 0.9); color: white; margin-top: 40px;">
        <div class="copyright">
            © Todos los derechos reservados 2026. La Lechuza Lectora ©
        </div>
    </footer>

    <script src="../../../Js/checkoutManager.js"></script>
</body>
</html>
