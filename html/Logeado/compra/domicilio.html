<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Seleccionar Domicilio</title>

    <link rel="stylesheet" href="../../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="../../../JS/checkoutManager.js" defer></script>
    
    <style>
        @media (max-width: 768px) {
            .checkout-container { width: 95% !important; padding: 20px 15px !important; margin: 20px auto !important; }
            .address-option { padding: 20px !important; display: flex; align-items: center; gap: 10px; }
            .navigation-actions { flex-direction: column !important; gap: 12px !important; }
            .btn-next-step, .btn-prev-step, .btn-add-address { width: 100% !important; }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* Estilo para la opción seleccionada */
        .address-option.selected {
            border: 2px solid #fbc02d !important;
            background-color: #fffefb !important;
        }
    </style>
</head>
<body class="form-page">
    
    <main class="main-content cart-main">
        <div class="background-overlay"></div>

        <div class="checkout-container" style="background: rgba(245, 245, 245, 0.95); border-radius: 10px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 800px; margin: 40px auto;">
            <h1 class="checkout-title" style="color: #5d4037; text-align: center; margin-bottom: 30px;">2. Seleccionar Domicilio</h1>
            
            <div class="checkout-step-content">
                <h2 style="font-size: 1.2rem; color: #5d4037; margin-bottom: 15px; border-bottom: 2px solid #fbc02d; padding-bottom: 5px;">Direcciones Guardadas</h2>
                
                <div id="addresses-list-container" class="address-list" style="display: flex; flex-direction: column; gap: 15px;">
                    <p style="text-align: center; color: #666;">Cargando tus direcciones...</p>
                </div>

                <button class="btn-secondary btn-add-address" onclick="window.location.href='Agregar_domicilio.html'" style="margin-top: 20px; border: 1px solid #5d4037; color: #5d4037; background: transparent; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    <i class="fas fa-plus-circle"></i> Agregar Nuevo Domicilio
                </button>
                
                <div class="navigation-actions" style="display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd;">
                    <button class="btn-dark-action btn-prev-step" data-prev-step="resumen_compra" style="background: #555; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                        ← Regresar
                    </button>

                    <button class="btn-primary btn-next-step" data-next-step="pago" style="background: #5d4037; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                        Continuar a Método de Pago →
                    </button>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="site-footer" style="text-align: center; padding: 20px; background: rgba(44, 44, 44, 0.9); color: white;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

</body>
</html>
