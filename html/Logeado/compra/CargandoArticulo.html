<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando Pedido - La Lechuza Lectora</title>
    <link rel="icon" type="image/png" href="../Imagenes/logo.png">
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            /* Fondo optimizado para carga rápida */
            background: #d9c586 url('../Imagenes/Carrusel/5.jpg') no-repeat center center/cover;
            overflow: hidden;
        }

        .overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.75); 
            /* Desenfoque suave para resaltar el ticket */
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .ticket-card {
            background: #fffef9;
            padding: 30px; 
            border-radius: 12px; 
            text-align: center;
            z-index: 2; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 320px; 
            width: 85%; /* Responsivo para iPhone y Android */
            border-top: 8px solid #5d4037; 
            position: relative;
        }

        /* Spinner de carga estilizado */
        .loader-ring {
            display: inline-block; 
            width: 45px; 
            height: 45px;
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #5d4037;
            border-radius: 50%; 
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        h2 { 
            color: #5d4037; 
            margin: 0 0 12px 0; 
            font-size: 1.4rem;
        }

        p { 
            color: #8d6e63; 
            font-size: 0.95rem; 
            margin-bottom: 25px; 
            line-height: 1.4;
        }

        /* Barra de progreso infinita */
        .progress-line {
            height: 5px; 
            width: 100%; 
            background: #eee;
            position: relative; 
            overflow: hidden;
            border-radius: 10px;
        }

        .progress-line::after {
            content: ''; 
            position: absolute; 
            left: -100%;
            width: 100%; 
            height: 100%; 
            background: #5d4037;
            animation: move 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes move { 
            0% { left: -100%; }
            100% { left: 100%; } 
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-height: 450px) {
            .ticket-card { padding: 20px; }
            h2 { font-size: 1.1rem; }
            .loader-ring { width: 30px; height: 30px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="ticket-card">
        <div class="loader-ring"></div>
        <h2>Cargando Compra</h2>
        <p>La Lechuza está validando tu pedido en la estantería...</p>
        <div class="progress-line"></div>
    </div>

    <script>
        // Redirección suave al carrito después de la validación
        setTimeout(() => {
            window.location.href = "Carrito.html"; 
        }, 3500);
    </script>
</body>
</html>
