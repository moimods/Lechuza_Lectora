<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Pago - La Lechuza Lectora</title>
    <link rel="stylesheet" href="../../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .confirmation-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }
        .confirmation-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border-top: 8px solid #fbc02d; /* El amarillo de la lechuza */
        }
        .success-icon {
            font-size: 70px;
            color: #2e7d32;
            margin-bottom: 20px;
            animation: bounceIn 0.8s ease;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .order-id-badge {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            color: #5d4037;
            border: 1px solid #ddd;
            margin: 20px 0;
            display: inline-block;
        }
        .btn-home {
            background-color: #5d4037;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-home:hover {
            background-color: #4e342e;
            transform: translateY(-2px);
        }
        .print-link {
            display: block;
            margin-top: 15px;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .print-link:hover { text-decoration: underline; }

        @media print {
            .btn-home, .print-link { display: none; }
            .confirmation-card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body class="form-page">

    <main class="confirmation-page">
        <div class="confirmation-card">
            <i class="fa-solid fa-circle-check success-icon"></i>
            
            <h1 style="color: #5d4037; margin-bottom: 10px;">¡Pago Confirmado!</h1>
            <p style="color: #666; line-height: 1.6;">
                Hemos recibido tu pago correctamente. Un bibliotecario de <strong>La Lechuza Lectora</strong> ya está preparando tu paquete para el envío.
            </p>

            <div class="order-id-badge">
                ID de Transacción: <span id="paypal-id-display">Cargando...</span>
            </div>

            <p style="font-size: 0.85rem; color: #888;">
                Se ha enviado un comprobante detallado a tu correo electrónico asociado a PayPal.
            </p>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

            <div class="actions">
                <a href="../../../index.html" class="btn-home">
                    <i class="fa-solid fa-book-open me-2"></i> SEGUIR EXPLORANDO
                </a>
                <a href="#" onclick="window.print()" class="print-link">
                    <i class="fa-solid fa-print"></i> Imprimir comprobante
                </a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Recuperar el ID de PayPal guardado en la sesión
            const orderId = sessionStorage.getItem('lastOrderId');
            const displayElement = document.getElementById('paypal-id-display');

            if (orderId) {
                displayElement.textContent = orderId;
            } else {
                // Si el usuario llega aquí por error sin pagar
                displayElement.textContent = "N/A";
                console.warn("No se encontró ID de transacción.");
            }

            // 2. SEGURIDAD ADICIONAL: Limpiar el carrito (por si falló en el paso anterior)
            localStorage.removeItem('laLechuzaLectoraCart');
            localStorage.removeItem('laLechuzaCheckoutData');
            
            // 3. Opcional: Limpiar el ID de sesión después de mostrarlo para que no persista si recarga
            // sessionStorage.removeItem('lastOrderId'); 
        });
    </script>
</body>
</html>
