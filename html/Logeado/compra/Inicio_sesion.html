<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - La Lechuza Lectora</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Estilos críticos para asegurar que se vea bien mientras carga el CSS principal */
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 12px;
            color: #5d4037;
        }
        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #5d4037;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover { background: #fbc02d; color: #333; }
        #error-msg { color: #d32f2f; font-size: 0.85rem; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <i class="fas fa-owl" style="font-size: 3rem; color: #5d4037;"></i>
    <h2 style="color: #5d4037;">Bienvenido de nuevo</h2>
    <p>Ingresa tus datos para continuar</p>

    <div id="error-msg"></div>

    <form id="form-login">
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Correo electrónico" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn-login" id="btn-submit">
            <span id="btn-text">Entrar</span>
        </button>
    </form>

    <p style="margin-top: 20px; font-size: 0.9rem;">
        ¿Aún no tienes cuenta? <a href="Registro.html" style="color: #5d4037; font-weight: bold;">Regístrate</a>
    </p>
</div>

<script>
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const btnText = document.getElementById('btn-text');

        // Estado visual de carga
        btnText.innerText = "Verificando...";
        errorMsg.style.display = 'none';

        try {
            // Petición a la API que definimos en index.js
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                // GUARDADO ÓPTIMO: Guardamos el objeto usuario completo
                // Esto incluye el id_usuario necesario para la compra
                localStorage.setItem('usuario_logeado', JSON.stringify(data.user));
                
                // Redirección exitosa
                window.location.href = '../Logeado/Catalogo_Logeado.html';
            } else {
                errorMsg.innerText = data.error;
                errorMsg.style.display = 'block';
                btnText.innerText = "Entrar";
            }
        } catch (error) {
            console.error('Error:', error);
            errorMsg.innerText = "Error de conexión con el servidor.";
            errorMsg.style.display = 'block';
            btnText.innerText = "Entrar";
        }
    });
</script>

</body>
</html>
