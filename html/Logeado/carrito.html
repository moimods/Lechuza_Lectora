<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Carrito</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=MXN"></script>

    <script src="../../JS/userDropdown.js" defer></script>
    <script src="../../JS/cartManager.js" defer></script> 
    <script src="../../JS/paypalIntegration.js" defer></script>
    
    <style>
        /* --- ESTILOS MENÚ HAMBURGUESA --- */
        .hamburger-btn {
            display: none; /* Oculto en PC */
            background: none;
            border: none;
            color: #5d4037;
            font-size: 1.8rem;
            cursor: pointer;
            order: 2;
        }

        /* AJUSTES RESPONSIVOS CRÍTICOS */
        @media (max-width: 1024px) {
            .cart-container {
                flex-direction: column !important;
                align-items: center;
                width: 95% !important;
            }
            .cart-summary-wrapper {
                width: 100% !important;
                margin-top: 20px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: space-between;
                padding: 10px 20px !important;
                height: auto !important;
            }

            .hamburger-btn {
                display: block; /* Aparece en móvil */
            }

            .logo-container { order: 1; }
            .auth-actions.user-actions { order: 3; margin-left: 0; }

            /* Menú desplegable de navegación */
            .nav-links {
                display: none; 
                flex-direction: column;
                width: 100%;
                order: 4;
                background: rgba(244, 236, 226, 0.98);
                padding: 15px 0;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                margin-top: 10px;
                border-radius: 0 0 10px 10px;
            }

            .nav-links.active {
                display: flex !important;
            }

            .nav-links a {
                padding: 12px;
                width: 100%;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }

            .cart-title { font-size: 1.5rem !important; text-align: center; }
            .cart-items-list { padding: 15px !important; }
            .cart-item { flex-direction: column; text-align: center; gap: 15px; }
            .cart-item img { margin: 0 auto !important; }
        }

        /* Estabilización del dropdown de seguridad */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999 !important; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }

        .dropdown-menu.show { display: block; }
        
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            text-align: left;
        }

        .avatar {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #5d4037;
        }
    </style>
</head>
<body class="form-page">

    <header class="navbar user-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <nav class="nav-links" id="mobile-nav">
            <a href="Acerca_de.html">Acerca de</a>
            <a href="Contacto.html">Contacto</a>
            <a href="Ayuda.html">Ayuda</a>
            <a href="Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button cart-button" id="cart-icon-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span> 
            </button>
            
            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn" onclick="forceToggleMenu()">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="perfil.html" id="profile-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="../../index.html" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content cart-main">
        <div class="background-overlay" style="filter: brightness(0.8);"></div>

        <div class="cart-container" style="display: flex; gap: 30px; margin-top: 40px; justify-content: center; align-items: flex-start; position: relative; z-index: 5;">
            <div class="cart-items-list" style="background: rgba(240, 231, 203, 0.95); padding: 30px; border-radius: 10px; flex: 2; max-width: 800px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                <h1 class="cart-title" style="color: #5d4037; margin-bottom: 10px;">Productos de tu carrito</h1>
                <div id="cart-items-container"></div>
                <div id="empty-cart-message" style="text-align: center; color: #888; margin-top: 30px; display: none;">
                    Tu carrito está vacío. ¡Es hora de buscar nuevas historias!
                </div>
            </div>

            <div class="cart-summary-wrapper" style="flex: 1; min-width: 300px; max-width: 400px;">
                <div class="cart-summary" style="background: #2c2c2c; color: white; padding: 25px; border-radius: 10px;">
                    <div class="summary-line" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <p>Total productos</p>
                        <strong id="total-display" style="color: #fbc02d;">$0.00</strong>
                    </div>
                    <div id="paypal-button-container"></div>
                    <button class="btn-secondary" onclick="window.location.href='Catalogo_Logeado.html'" style="width: 100%; margin-top: 15px; border: 1px solid #fbc02d; color: #fbc02d; background: transparent; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">Seguir comprando</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037; margin-top: auto;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <script>
        // FUNCIÓN MENÚ HAMBURGUESA
        function toggleMobileMenu() {
            const nav = document.getElementById('mobile-nav');
            nav.classList.toggle('active');
        }

        function forceToggleMenu() {
            const menu = document.getElementById('avatar-dropdown');
            if (menu) {
                menu.classList.toggle('show');
            }
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('avatar-dropdown');
            const btn = document.getElementById('avatar-btn');
            const nav = document.getElementById('mobile-nav');
            const hamburger = document.getElementById('hamburger-btn');

            if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.remove('show');
            }

            if (nav && hamburger && !hamburger.contains(event.target) && !nav.contains(event.target)) {
                nav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
