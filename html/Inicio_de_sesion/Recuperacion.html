<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Recuperar Contraseña</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de responsividad para Recuperación */
        @media (max-width: 768px) {
            .form-card.recovery-card {
                width: 95% !important;
                padding: 25px 15px !important;
                margin: 20px auto;
            }

            .form-title {
                font-size: 1.6rem !important;
                margin-bottom: 20px !important;
            }

            .action-buttons-group {
                flex-direction: column !important;
                gap: 12px;
            }

            .btn-dark-action {
                width: 100% !important;
                padding: 12px !important;
            }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Prevenir desbordamiento de inputs */
        input {
            box-sizing: border-box;
        }
    </style>
</head>
<body class="form-page">

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card recovery-card" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <h1 class="form-title" style="color: #5d4037; text-align: center; margin-bottom: 25px; font-weight: bold; font-size: 1.8rem;">Recuperar Contraseña</h1>
            
            <form class="recovery-form" id="recoveryForm">
                <div class="input-group" style="margin-bottom: 15px;">
                    <label for="correo" style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Correo asociado:</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required 
                           style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                </div>

                <div class="input-group" style="margin-bottom: 25px;">
                    <label for="codigo" style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Código de verificación:</label>
                    <input type="text" id="codigo" placeholder="Introduce el código (1234)" 
                           style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
            </form>

            <div class="action-buttons-group" style="display: flex; gap: 10px; justify-content: center;">
                <button type="button" id="btn-enviar-codigo" class="btn-dark-action" 
                        style="flex: 1; padding: 10px; border-radius: 5px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer;">
                    Enviar código
                </button>
                <button type="button" id="btn-siguiente" class="btn-dark-action" 
                        style="flex: 1; padding: 10px; border-radius: 5px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer;">
                    Siguiente
                </button>
                <button type="button" id="btn-regresar" class="btn-dark-action" onclick="window.location.href='Inicio_sesion.html'"
                        style="flex: 1; padding: 10px; border-radius: 5px; border: none; background-color: #555; color: white; font-weight: bold; cursor: pointer;">
                    Regresar
                </button>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="background: rgba(44, 44, 44, 0.9); color: white; text-align: center; padding: 20px; margin-top: auto;">
        <div class="social-links" style="margin-bottom: 10px;">
            <a href="#" style="margin: 0 10px; font-size: 1.2rem; color: white;"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" style="margin: 0 10px; font-size: 1.2rem; color: white;"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" style="margin: 0 10px; font-size: 1.2rem; color: white;"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="copyright">
            © 2026 La Lechuza Lectora
        </div>
    </footer>

    <script>
        // Acción para enviar el código (Simulación de Backend)
        document.getElementById('btn-enviar-codigo').addEventListener('click', async () => {
            const email = document.getElementById('correo').value;
            if(!email) return alert("Por favor, ingresa tu correo para enviarte el código.");

            try {
                // Cambia esta URL por tu endpoint real si lo tienes implementado
                const response = await fetch('http://localhost:3000/api/solicitar-recuperacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                if (response.ok) {
                    alert("Código de verificación enviado. Revisa tu bandeja de entrada (Prueba: 1234)");
                } else {
                    alert("Simulación: Si el correo existe, se enviará el código 1234.");
                }
            } catch (error) {
                // Si el backend no está listo, permitimos la simulación para la escuela
                alert("Simulación activa: Se ha enviado el código 1234 a su correo.");
            }
        });

        // Acción para validar código y pasar al cambio de contraseña
        document.getElementById('btn-siguiente').addEventListener('click', () => {
            const codigo = document.getElementById('codigo').value;
            if(!codigo) return alert("Por favor, ingresa el código que recibiste.");

            if(codigo === "1234") { 
                alert("Código verificado con éxito.");
                window.location.href = 'Cambio_Contraseña.html';
            } else {
                alert("El código ingresado es incorrecto. Intenta con '1234'.");
            }
        });
    </script>
</body>
</html>
