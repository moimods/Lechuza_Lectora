<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Recuperar Contraseña</title>
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de responsividad para Recuperación */
        @media (max-width: 768px) {
            .form-card.recovery-card {
                width: 95% !important; /* Aprovechamos el ancho máximo en móvil */
                padding: 25px 15px !important;
                margin: 20px auto;
            }

            .form-title {
                font-size: 1.6rem !important;
                margin-bottom: 20px !important;
            }

            .action-buttons-group {
                display: flex;
                flex-direction: column !important; /* Botones en vertical para mejor ergonomía táctil */
                gap: 12px;
            }

            .btn-action {
                width: 100% !important; /* Botones a lo ancho de la tarjeta */
                padding: 12px !important;
                font-size: 1rem;
            }
        }

        /* Fondo consistente con el resto del sitio logeado */
        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="form-page">

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card recovery-card">
            <h1 class="form-title" style="color: #5d4037; text-align: center; margin-bottom: 25px; font-weight: bold;">Recuperar Contraseña</h1>
            
            <form class="recovery-form" id="recoveryForm">
                <div class="input-group" style="margin-bottom: 15px;">
                    <label for="correo" style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Correo asociado:</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required 
                           style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                </div>

                <div class="input-group" style="margin-bottom: 25px;">
                    <label for="codigo" style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 5px;">Código de verificación:</label>
                    <input type="text" id="codigo" placeholder="Introduce el código" 
                           style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
            </form>

            <div class="action-buttons-group" style="display: flex; gap: 10px; justify-content: center;">
                <button type="button" id="btn-enviar-codigo" class="btn-dark-action" 
                        style="flex: 1; padding: 10px; border-radius: 5px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer;">
                    Enviar código
                </button>
                <button type="button" id="btn-siguiente" class="btn-dark-action" 
                        style="flex: 1; padding: 10px; border-radius: 5px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer;">
                    Siguiente
                </button>
                <button type="button" id="btn-regresar" class="btn-dark-action" onclick="window.location.href='Inicio_sesion.html'"
                        style="flex: 1; padding: 10px; border-radius: 5px; border: none; background-color: #555; color: white; font-weight: bold; cursor: pointer;">
                    Regresar
                </button>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="background: rgba(44, 44, 44, 0.9); color: white; text-align: center; padding: 20px; margin-top: auto;">
        <div class="social-links" style="margin-bottom: 10px;">
            <a href="#" style="margin: 0 10px; font-size: 1.2rem; color: white;"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" style="margin: 0 10px; font-size: 1.2rem; color: white;"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" style="margin: 0 10px; font-size: 1.2rem; color: white;"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="copyright">
            © 2026 La Lechuza Lectora
        </div>
    </footer>

    <script src="../../JS/Redireccionamiento_Recuperacion.js"></script>
</body>
</html>
