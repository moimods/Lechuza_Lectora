<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Dirección - La Lechuza Lectora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <script src="../../JS/UserDropdown.js" defer></script>
    <style>
        /* Estilos para la selección de tarjeta */
        .address-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .address-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15) !important;
        }

        .address-card.selected {
            border-color: #fbc02d !important;
            background-color: #fffdf0 !important;
        }

        .select-badge {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fbc02d;
            font-size: 1.5rem;
        }

        .address-card.selected .select-badge {
            display: block;
        }

        #checkout-actions {
            position: sticky;
            bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            display: none; 
            z-index: 100;
        }

        @media (max-width: 768px) {
            .profile-main-wrapper { margin-top: 20px !important; padding: 10px !important; }
            .address-card > div { flex-direction: column !important; gap: 15px; }
            .btn-primary { width: 100% !important; margin-bottom: 20px; }
        }

        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999 !important; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }
        .dropdown-menu.show { display: block; }
        .avatar { border-radius: 50%; width: 40px; height: 40px; object-fit: cover; cursor: pointer; border: 2px solid #5d4037; }
    </style>
</head>
<body class="form-page">
    
    <header class="navbar detail-navbar">
        <div class="logo-container">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <a href="../Acerca_de.html">Acerca de</a>
            <a href="../Contacto.html">Contacto</a>
            <a href="../Ayuda.html">Ayuda</a>
            <a href="../Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn" onclick="forceToggleMenu()">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="../perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="../../index.html" onclick="localStorage.clear()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        <div class="background-overlay" style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed; background-size: cover; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div> 
        
        <div class="profile-main-wrapper" style="position: relative; z-index: 5; max-width: 900px; margin: 40px auto; padding: 20px;">
            <div id="status-msg" style="display:none; background: #fbc02d; color: #5d4037; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                <i class="fas fa-truck"></i> Paso 2: Selecciona el lugar de entrega para tu pedido
            </div>

            <h1 class="profile-title-custom" style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); text-align: center; margin-bottom: 30px;">Mis Direcciones</h1>

            <div class="address-container">
                <div style="margin-bottom: 25px; text-align: center;">
                    <button class="btn-primary" onclick="window.location.href='../Registro_Domicilio.html'" style="background: #fbc02d; color: #5d4037; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: auto;">
                        <i class="fas fa-plus"></i> Agregar Nueva Dirección
                    </button>
                </div>

                <div class="address-list" id="lista-direcciones" style="display: grid; gap: 20px;">
                    </div>
            </div>

            <div id="checkout-actions" style="margin-top: 40px; text-align: center;">
                <p style="color: #5d4037; margin-bottom: 15px; font-weight: bold;">Dirección seleccionada correctamente</p>
                <button class="btn-primary" onclick="confirmarYProcesar()" style="background: #2c2c2c; color: #fbc02d; border: none; padding: 15px 50px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1.2rem; width: auto;">
                    Continuar al Pago <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let direccionIdSeleccionada = null;

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = '../../index.html';
                return;
            }

            cargarDirecciones(user.id_usuario);
            
            if (localStorage.getItem('compra_en_progreso')) {
                document.getElementById('status-msg').style.display = 'block';
            }
        });

        async function cargarDirecciones(idUsuario) {
            const contenedor = document.getElementById('lista-direcciones');

            try {
                // Ajustado a la ruta del servidor optimizado
                const respuesta = await fetch(`/api/usuarios/${idUsuario}/direcciones`);
                const direcciones = await respuesta.json();

                if (direcciones.length === 0) {
                    contenedor.innerHTML = "<div style='background:white; padding:20px; border-radius:10px; text-align:center;'>No tienes direcciones guardadas. Agrega una para continuar.</div>";
                    return;
                }

                contenedor.innerHTML = direcciones.map(dir => `
                    <div class="address-card" id="dir-${dir.id_direccion}" onclick="seleccionar(${dir.id_direccion})" 
                         style="border-left: 6px solid ${dir.es_principal ? '#fbc02d' : '#ccc'};">
                        <div class="select-badge"><i class="fas fa-check-circle"></i></div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                ${dir.es_principal ? '<span style="background: #fdf5e6; color: #5d4037; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">Principal</span>' : ''}
                                <h3 style="margin: 10px 0 5px; color: #5d4037;">Domicilio</h3>
                                <p style="margin: 0; color: #666; font-size: 0.95rem; line-height: 1.6;">
                                    ${dir.calle_numero}<br>
                                    Col. ${dir.colonia}, C.P. ${dir.codigo_postal}<br>
                                    ${dir.ciudad_estado}
                                </p>
                            </div>
                            <div class="address-actions" onclick="event.stopPropagation()">
                                <button onclick="eliminarDireccion(${dir.id_direccion})" title="Eliminar" style="background: none; border: none; color: #d32f2f; cursor: pointer; font-size: 1.2rem;"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = "<p style='color:white; text-align:center;'>Error al cargar las direcciones.</p>";
            }
        }

        function seleccionar(id) {
            document.querySelectorAll('.address-card').forEach(el => el.classList.remove('selected'));
            const card = document.getElementById(`dir-${id}`);
            card.classList.add('selected');
            direccionIdSeleccionada = id;
            
            if(localStorage.getItem('compra_en_progreso')) {
                document.getElementById('checkout-actions').style.display = 'block';
                document.getElementById('checkout-actions').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function confirmarYProcesar() {
            if (!direccionIdSeleccionada) {
                alert("Por favor selecciona una dirección.");
                return;
            }
            localStorage.setItem('id_direccion_pedido', direccionIdSeleccionada);
            window.location.href = 'Checkout.html';
        }

        async function eliminarDireccion(id) {
            if(confirm('¿Estás seguro de eliminar esta dirección?')) {
                try {
                    const res = await fetch(`/api/direcciones/${id}`, { method: 'DELETE' });
                    if(res.ok) {
                        const user = JSON.parse(localStorage.getItem('user'));
                        cargarDirecciones(user.id_usuario);
                    }
                } catch (err) {
                    console.error("Error al eliminar");
                }
            }
        }

        function forceToggleMenu() {
            document.getElementById('avatar-dropdown').classList.toggle('show');
        }
    </script>
</body>
</html>
