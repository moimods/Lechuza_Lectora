<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - La Lechuza Lectora</title>
    <link rel="icon" type="image/x-icon" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <style>
        /* ESTILOS ESPECÍFICOS DE PEDIDOS */
        .order-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 6px solid #5d4037;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .order-card:hover { transform: translateY(-3px); }

        .order-info h3 { margin: 0 0 5px 0; color: #5d4037; font-size: 1.1rem; }
        .order-info p { margin: 2px 0; color: #777; font-size: 0.9rem; }

        .order-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-delivered { background: #e8f5e9; color: #2e7d32; }
        .status-pending { background: #fff3e0; color: #ef6c00; }
        .status-shipped { background: #e3f2fd; color: #1565c0; }

        .order-price { font-weight: bold; color: #5d4037; font-size: 1.2rem; }

        @media (max-width: 768px) {
            .order-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .order-actions { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        }

        /* Dropdown Avatar */
        .dropdown-menu {
            display: none; position: absolute; right: 0; top: 55px; 
            background: white; min-width: 180px; border-radius: 8px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1000; padding: 10px 0;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a { color: #5d4037 !important; padding: 12px 16px; display: block; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body class="form-page">
    
    <header class="navbar detail-navbar">
        <div class="logo-container" onclick="window.location.href='/html/Logeado/Catalogo_Logeado.html'" style="cursor:pointer;">
            <img src="../../Imagenes/logo.png" alt="Logo" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='/html/Logeado/perfil.html'"><i class="fa-solid fa-arrow-left"></i> Mi Perfil</button>
            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar" class="avatar" id="avatar-btn" style="border-radius: 50%; width: 40px; height: 40px; cursor: pointer; border: 2px solid #5d4037;">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="/html/Logeado/perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="/index.html" onclick="localStorage.clear()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        <div class="background-overlay" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed; background-size: cover; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div> 
        
        <div class="profile-main-wrapper" style="position: relative; z-index: 5; margin-top: 40px; padding: 0 20px 60px;">
            <h1 style="color: #ffffff; text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Mis Pedidos</h1>

            <div class="orders-container" style="max-width: 900px; margin: 0 auto; background: rgba(240, 231, 203, 0.95); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                <div id="orders-list"></div>
                <p id="orders-summary" style="text-align: center; color: #5d4037; font-size: 0.9rem; margin-top: 30px; opacity: 0.7;"></p>
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 25px; color: white;">
        © 2026 La Lechuza Lectora ©
    </footer>

    <script src="/JS/api.js"></script>
    <script>
        const avatarBtn = document.getElementById('avatar-btn');
        const dropdown = document.getElementById('avatar-dropdown');

        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        window.addEventListener('click', () => dropdown.classList.remove('show'));

        function formatDate(dateRaw) {
            const date = new Date(dateRaw);
            if (Number.isNaN(date.getTime())) return "Fecha no disponible";
            return date.toLocaleDateString("es-MX", {
                day: "2-digit",
                month: "short",
                year: "numeric"
            });
        }

        function statusClass(estado) {
            const key = String(estado || "").toLowerCase();
            if (key === "entregado" || key === "completado") return "status-delivered";
            if (key === "enviado") return "status-shipped";
            return "status-pending";
        }

        function statusLabel(estado) {
            const key = String(estado || "").toLowerCase();
            if (key === "completado") return "Completado";
            if (key === "enviado") return "En camino";
            if (key === "entregado") return "Entregado";
            if (key === "cancelado") return "Cancelado";
            return "Pendiente";
        }

        async function cargarPedidos() {
            const list = document.getElementById("orders-list");
            const summary = document.getElementById("orders-summary");

            try {
                const response = await API.get('/ventas/usuario?page=1&limit=50');
                const pedidos = Array.isArray(response.data) ? response.data : [];

                if (pedidos.length === 0) {
                    list.innerHTML = '<p style="text-align:center;color:#5d4037;">Aún no tienes pedidos registrados.</p>';
                    summary.textContent = "Realiza tu primera compra en el catálogo para verla aquí.";
                    return;
                }

                list.innerHTML = pedidos.map((p) => `
                    <div class="order-card">
                        <div class="order-info">
                            <h3>Pedido #LL-${p.id_venta}</h3>
                            <p><i class="fa-solid fa-calendar-days"></i> Realizado el: ${formatDate(p.fecha_venta)}</p>
                            <p><i class="fa-solid fa-box"></i> Estado actual del pedido.</p>
                        </div>
                        <div class="order-actions">
                            <span class="order-status ${statusClass(p.estado)}">${statusLabel(p.estado)}</span>
                            <div class="order-price">$${Number(p.total || 0).toFixed(2)} MXN</div>
                            <button onclick="window.location.href='/html/Ayuda/mis-compras.html'" style="background: none; border: 1px solid #5d4037; color: #5d4037; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-left: 10px;">Ver detalle</button>
                        </div>
                    </div>
                `).join('');

                summary.textContent = `Mostrando ${pedidos.length} pedido(s) de tu cuenta.`;
            } catch (err) {
                list.innerHTML = '<p style="text-align:center;color:#b00020;">No se pudieron cargar los pedidos. Inicia sesión de nuevo.</p>';
                summary.textContent = "";
            }
        }

        cargarPedidos();
    </script>
</body>
</html>
