<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Seleccionar Método de Pago</title>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* AJUSTES RESPONSIVOS CRÍTICOS */
        @media (max-width: 768px) {
            .payment-method-card {
                width: 95% !important;
                padding: 25px 15px !important;
                margin: 20px auto;
            }

            .payment-option {
                flex-direction: column !important; 
                padding: 20px !important;
                gap: 15px;
                text-align: center;
            }

            .icon-box {
                margin-right: 0 !important;
                width: 60px !important;
                height: 60px !important;
                font-size: 2em !important;
            }

            .btn-payment-action, .btn-return-cart {
                width: 100% !important;
                padding: 14px !important;
                font-size: 1rem;
            }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .payment-option {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            padding: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .payment-option:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-payment-action {
            flex: 1;
            background: #5d4037;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-payment-action:hover {
            background: #795548;
        }
    </style>
</head>
<body class="form-page">

    <header class="navbar-minimal" style="padding: 10px 20px; background: rgba(240, 231, 203, 0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
        <div class="logo-container" onclick="window.location.href='/html/Logeado/Catalogo_Logeado.html'" style="cursor: pointer; display: flex; align-items: center;">
            <img src="/Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo" style="height: 40px; margin-right: 10px;"> 
            <span class="site-name" style="font-weight: bold; color: #5d4037;">LA LECHUZA LECTORA</span>
        </div>
        <a href="/html/Logeado/carrito.html" style="color: #5d4037; font-size: 1.2rem;"><i class="fa-solid fa-xmark"></i></a>
    </header>

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card payment-method-card" style="background: rgba(245, 245, 245, 0.98); border-radius: 10px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 500px; margin: 80px auto; text-align: center;">
            <h1 style="color: #5d4037; margin-bottom: 10px;">Método de Pago</h1>
            <p style="color: #777; margin-bottom: 30px;">Selecciona cómo deseas pagar tu pedido</p>

            <div class="payment-option">
                <div class="icon-box" style="background: #0070ba; color: white; width: 50px; height: 50px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.5em; margin-right: 20px;">
                    <i class="fa-brands fa-paypal"></i>
                </div>
                <button class="btn-payment-action" onclick="window.location.href='/html/Logeado/Agregar_paypal.html'">
                    Agregar PayPal
                </button>
            </div>

            <div class="payment-option">
                <div class="icon-box" style="background: #444; color: white; width: 50px; height: 50px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.5em; margin-right: 20px;">
                    <i class="fa-solid fa-credit-card"></i>
                </div>
                <button class="btn-payment-action" onclick="window.location.href='/html/Logeado/Agregar_tarjeta.html'">
                    Agregar tarjeta crédito/débito
                </button>
            </div>

            <button class="btn-return-cart" onclick="window.location.href='/html/Logeado/carrito.html'" style="width: 100%; margin-top: 20px; background: transparent; border: 1px solid #5d4037; color: #5d4037; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                <i class="fa-solid fa-arrow-left"></i> Regresar al carrito
            </button>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: white; margin-top: auto;">
        <div class="copyright">
            © 2026 La Lechuza Lectora. Todos los derechos reservados.
        </div>
    </footer>

<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
