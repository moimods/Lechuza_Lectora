<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - La Lechuza Lectora</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .catalog-container {
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        .catalog-title {
            text-align: center;
            margin-bottom: 40px;
            color: #5d4037;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .book-product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .book-product-card:hover {
            transform: translateY(-5px);
        }

        .book-product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .book-product-card h3 {
            font-size: 0.9rem;
            color: #5d4037;
            height: 40px;
            overflow: hidden;
        }

        .price {
            font-weight: bold;
            color: #d32f2f;
            display: block;
            margin: 8px 0;
        }

        .btn-add {
            background: #5d4037;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
        }

        .btn-add:hover {
            background: #3e2723;
        }

        .top-bar {
            background: #5d4037;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .logout {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Barra superior -->
    <div class="top-bar">
        <div>
            <i class="fas fa-book"></i> La Lechuza Lectora
        </div>
        <div>
            <a href="carrito.html"><i class="fas fa-shopping-cart"></i> Carrito</a>
            <a href="#" id="logout-btn" class="logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </div>

    <!-- Catálogo -->
    <div class="catalog-container">
        <h2 class="catalog-title">
            <i class="fas fa-store"></i> Catálogo de Libros
        </h2>

        <div id="products-container" class="products-grid">
            <!-- Productos cargados dinámicamente -->
        </div>
    </div>

    <!-- SOLO carrito.js (necesario para agregarAlCarrito) -->
    <script src="../../JS/carrito.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const usuario = JSON.parse(localStorage.getItem('usuario_logeado'));

            if (!usuario) {
                alert("Debes iniciar sesión para acceder al catálogo.");
                window.location.href = '../Inicio_de_sesion/Inicio_sesion.html';
                return;
            }

            cargarProductos();
        });

        async function cargarProductos() {

            const container = document.getElementById('products-container');

            try {
                const response = await fetch('/api/productos');
                const productos = await response.json();

                container.innerHTML = "";

                productos.forEach(libro => {

                    const card = document.createElement('div');
                    card.className = 'book-product-card';

                    card.innerHTML = `
                        <img src="../../Imagenes/Libros/${libro.id_producto}.jpg"
                             onerror="this.src='../../Imagenes/Libros/default.jpg'">

                        <h3>${libro.titulo}</h3>

                        <span class="price">$${libro.precio}</span>

                        <button class="btn-add"
                            onclick="agregarAlCarrito(${libro.id_producto}, '${libro.titulo.replace(/'/g, "\\'")}', ${libro.precio})">
                            <i class="fas fa-cart-plus"></i> Añadir
                        </button>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Error cargando productos:", error);
                container.innerHTML = "<p>Error al conectar con el servidor.</p>";
            }
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('usuario_logeado');
            window.location.href = '../../index.html';
        });
    </script>

</body>
</html>
