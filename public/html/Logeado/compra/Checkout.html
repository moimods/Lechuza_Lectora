<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Compra - La Lechuza Lectora</title>
<link rel="stylesheet" href="/Estilos/Estilo1.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.checkout-container { 
    max-width: 600px; 
    margin: 60px auto; 
    padding: 30px; 
    background: rgba(255, 255, 255, 0.98); 
    border-radius: 15px; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
}
.producto-linea { display:flex; justify-content:space-between; margin-bottom:8px; }
.total-row { 
    display:flex; 
    justify-content:space-between; 
    font-size:1.6rem; 
    font-weight:bold; 
    margin-top:20px; 
    border-top:2px solid #fbc02d; 
    padding-top:15px;
}
.btn-pagar { 
    width:100%; 
    background:#27ae60; 
    color:white; 
    padding:18px; 
    border:none; 
    border-radius:8px; 
    font-size:1.3rem; 
    font-weight:bold;
    cursor:pointer; 
    margin-top:25px;
}
.btn-pagar:disabled { background:#ccc; cursor:not-allowed; }
</style>
</head>

<body>

<div class="checkout-container">
<h2 style="text-align:center;">Paso 3: Confirmar Pedido</h2>

<div id="resumen-productos"></div>

<div class="total-row">
    <span>Total final:</span>
    <span id="monto-total">$0.00</span>
</div>

<p id="direccion-texto" style="margin-top:15px;"></p>

<button class="btn-pagar" id="btn-finalizar" onclick="registrarVenta()">
Finalizar Compra
</button>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const carrito = JSON.parse(localStorage.getItem('laLechuzaLectoraCart')) || [];
    const usuario = JSON.parse(localStorage.getItem('usuario_logeado'));
    const idDireccion = localStorage.getItem('id_direccion_pedido');

    if(carrito.length === 0){
        alert("Carrito vacío.");
        window.location.href="../carrito.html";
        return;
    }

    if(!usuario){
        window.location.href="../../Inicio_de_sesion/Inicio_sesion.html";
        return;
    }

    if(!idDireccion){
        alert("No seleccionaste dirección.");
        window.location.href="Domicilio.html";
        return;
    }

    let total = 0;
    const container = document.getElementById("resumen-productos");

    carrito.forEach(item=>{
        const subtotal = parseFloat(item.price) * item.quantity;
        total += subtotal;

        container.innerHTML += `
        <div class="producto-linea">
            <span>${item.title} (x${item.quantity})</span>
            <span>$${subtotal.toFixed(2)}</span>
        </div>`;
    });

    document.getElementById("monto-total").innerText = `$${total.toFixed(2)}`;
    document.getElementById("direccion-texto").innerHTML =
        `<strong>Dirección ID:</strong> ${idDireccion}`;
});


async function registrarVenta(){

    const btn = document.getElementById("btn-finalizar");
    btn.disabled = true;
    btn.innerText = "Procesando...";

    const carrito = JSON.parse(localStorage.getItem('laLechuzaLectoraCart'));
    const usuario = JSON.parse(localStorage.getItem('usuario_logeado'));
    const idDireccion = localStorage.getItem('id_direccion_pedido');

    const totalVenta = carrito.reduce(
        (sum,item)=> sum + (parseFloat(item.price)*item.quantity),
        0
    );

    const datosVenta = {
        id_usuario: usuario.id_usuario,
        id_direccion: parseInt(idDireccion),
        total: totalVenta,
        id_metodo_pago: 1,
        productos: carrito.map(p=>({
            id_producto: p.id,
            cantidad: p.quantity,
            precio_unitario: p.price
        }))
    };

    try{

        const response = await fetch('http://localhost:3000/api/ventas/registrar',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(datosVenta)
        });

        const result = await response.json();

        if(response.ok){

            localStorage.removeItem('laLechuzaLectoraCart');
            localStorage.removeItem('id_direccion_pedido');

            btn.innerText = "¡Compra Exitosa!";

            setTimeout(()=>{
                window.location.href="Exito.html";
            },1500);

        }else{
            throw new Error(result.error);
        }

    }catch(error){
        alert("Error al registrar venta: "+error.message);
        btn.disabled=false;
        btn.innerText="Finalizar Compra";
    }
}
</script>

</body>
</html>
