<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando Pedido - La Lechuza Lectora</title>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">

    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #d9c586 url('/Imagenes/Carrusel/5.jpg') no-repeat center center/cover;
            overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .ticket-card {
            background: #fffef9;
            padding: 35px; 
            border-radius: 12px; 
            text-align: center;
            z-index: 2; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 320px; 
            width: 85%;
            border-top: 8px solid #5d4037; 
            position: relative;
        }

        .loader-ring {
            display: inline-block; 
            width: 45px; 
            height: 45px;
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #5d4037;
            border-radius: 50%; 
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        h2 { color: #5d4037; margin: 0 0 12px 0; font-size: 1.4rem; }
        p { color: #8d6e63; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }

        .progress-line {
            height: 5px; width: 100%; background: #eee;
            position: relative; overflow: hidden; border-radius: 10px;
        }

        .progress-line::after {
            content: ''; position: absolute; left: -100%;
            width: 100%; height: 100%; background: #5d4037;
            animation: move 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes move { 
            0% { left: -100%; }
            100% { left: 100%; } 
        }

        .error-btn {
            background: #5d4037; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            margin-top: 15px; display: none;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="ticket-card" id="main-card">
        <div class="loader-ring" id="loader"></div>
        <h2 id="status-title">Finalizando Compra</h2>
        <p id="status-text">La Lechuza está validando tu pedido en la estantería...</p>
        <div class="progress-line" id="progress"></div>
        <button class="error-btn" id="retry-btn" onclick="window.history.back()">Intentar de nuevo</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusTitle = document.getElementById('status-title');
            const statusText = document.getElementById('status-text');
            const loader = document.getElementById('loader');
            const progress = document.getElementById('progress');
            const retryBtn = document.getElementById('retry-btn');

            // 1. Obtener datos necesarios
            const userId = localStorage.getItem('userId');
            const idDireccion = localStorage.getItem('id_direccion_pedido');
            const carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const total = carrito.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // Validación de seguridad inicial
            if (!userId || !idDireccion || carrito.length === 0) {
                showError("Datos incompletos", "No pudimos encontrar la información de tu compra.");
                return;
            }

            const payload = {
                id_usuario: parseInt(userId),
                id_direccion: parseInt(idDireccion),
                total: total,
                productos: carrito.map(p => ({
                    id_producto: p.id,
                    cantidad: p.quantity,
                    precio_unitario: p.price
                }))
            };

            try {
                // 2. Enviar a la API
                const response = await fetch('/api/ventas/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    // 3. Éxito: Limpiar y redirigir
                    localStorage.removeItem('cart');
                    localStorage.removeItem('id_direccion_pedido');
                    
                    statusTitle.innerText = "¡Todo listo!";
                    statusText.innerText = "Pedido confirmado. Preparando tu recibo...";
                    
                    setTimeout(() => {
                        window.location.href = "/html/Logeado/compra/Exito.html";
                    }, 2000);
                } else {
                    throw new Error(result.error || "Error en el servidor");
                }

            } catch (error) {
                console.error("Error finalizando compra:", error);
                showError("Hubo un problema", error.message || "No pudimos conectar con el servidor.");
            }

            function showError(title, message) {
                statusTitle.innerText = title;
                statusTitle.style.color = "#d32f2f";
                statusText.innerText = message;
                loader.style.display = "none";
                progress.style.display = "none";
                retryBtn.style.display = "inline-block";
            }
        });
    </script>
</body>
</html>
