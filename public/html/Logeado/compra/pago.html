<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Método de Pago</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de responsividad */
        @media (max-width: 768px) {
            .checkout-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 20px auto !important;
            }
            .checkout-title { font-size: 1.5rem !important; }
            .payment-option { padding: 15px !important; font-size: 0.95rem; }
            .add-payment-actions { flex-direction: column; gap: 10px; }
            .navigation-actions { flex-direction: column-reverse !important; gap: 12px !important; }
            .btn-primary, .btn-dark-action { width: 100% !important; }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* Estilo para las opciones de pago */
        .payment-option {
            background: white;
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .payment-option:hover {
            border-color: #fbc02d;
        }

        /* Resaltado de la opción seleccionada */
        .payment-option.selected {
            border: 2px solid #fbc02d !important;
            background-color: #fffdf5 !important;
            box-shadow: 0 4px 10px rgba(251, 192, 45, 0.1);
        }

        input[type="radio"] {
            accent-color: #5d4037;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body class="form-page">
    <main class="main-content cart-main">
        <div class="background-overlay"></div>

        <div class="checkout-container" style="background: rgba(255, 255, 255, 0.98); border-radius: 12px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); max-width: 650px; margin: 60px auto;">
            
            <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px;">
                <span style="width: 40px; height: 10px; background: #27ae60; border-radius: 5px;"></span>
                <span style="width: 40px; height: 10px; background: #5d4037; border-radius: 5px;"></span>
                <span style="width: 40px; height: 10px; background: #eee; border-radius: 5px;"></span>
            </div>

            <h1 class="checkout-title" style="color: #5d4037; text-align: center; margin-bottom: 10px;">3. Método de Pago</h1>
            <p style="text-align: center; color: #888; margin-bottom: 30px;">Elige cómo deseas pagar tu pedido.</p>
            
            <div class="checkout-step-content">
                <div id="payment-options-list" style="display: flex; flex-direction: column; gap: 15px;">
                    
                    <label class="payment-option selected" id="label-mercadopago">
                        <input type="radio" name="payment_method" value="Mercado Pago" checked onchange="updatePaymentSelection()">
                        <i class="fa-solid fa-wallet" style="color: #009ee3; font-size: 24px;"></i>
                        <div style="flex-grow: 1;">
                            <span style="font-weight: bold; color: #5d4037; display: block;">Mercado Pago</span>
                            <span style="font-size: 0.85rem; color: #777;">Paga de forma segura con tu cuenta Mercado Pago</span>
                        </div>
                    </label>
                </div>
                
                <div class="navigation-actions" style="display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                    <button type="button" onclick="window.history.back()" style="background: #f0f0f0; color: #555; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        ← Regresar
                    </button>
                    <button type="button" onclick="goToConfirm()" style="background: #5d4037; color: white; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(93, 64, 55, 0.2);">
                        Revisar y Pagar →
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 25px; background: #2c2c2c; color: #999; font-size: 0.9rem;">
        © 2026 La Lechuza Lectora | Lectura para mentes curiosas
    </footer>

    <script>
        function usuarioActivo() {
            return JSON.parse(localStorage.getItem('usuario') || 'null');
        }

        function getCheckoutCart() {
            let cart = JSON.parse(localStorage.getItem('laLechuzaLectoraCart') || '[]');
            if (!cart.length) {
                const legacyCart = JSON.parse(localStorage.getItem('carrito') || '[]');
                cart = legacyCart.map((item) => ({
                    id: item.id_producto,
                    title: item.titulo,
                    price: Number(item.precio || 0),
                    quantity: Number(item.cantidad || 1),
                    image: item.imagen_url || `/Imagenes/Libros/${item.id_producto}.jpg`
                }));
                localStorage.setItem('laLechuzaLectoraCart', JSON.stringify(cart));
            }
            return cart;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const usuario = usuarioActivo();
            const cart = getCheckoutCart();

            if (!usuario) {
                localStorage.setItem('postLoginRedirect', '/html/Logeado/compra/pago.html');
                window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html';
                return;
            }

            if (!cart.length) {
                alert('Tu carrito está vacío.');
                window.location.href = '/html/Logeado/carrito.html';
                return;
            }

            if (!localStorage.getItem('id_direccion_pedido')) {
                alert('Selecciona una dirección para continuar.');
                window.location.href = '/html/Logeado/compra/domicilio.html';
                return;
            }
        });

        // Mantener una sola opción de pago estandarizada para este flujo.
        function updatePaymentSelection() {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('label-mercadopago').classList.add('selected');
            localStorage.setItem('metodo_pago', 'Mercado Pago');
        }

        // Inicializar selección al cargar la página
        window.onload = () => {
            localStorage.setItem('metodo_pago', 'Mercado Pago');
        };

        // Función para avanzar al siguiente paso
        function goToConfirm() {
            // Validamos que haya una dirección guardada del paso anterior
            if (!localStorage.getItem('id_direccion_pedido')) {
                alert("Por favor, selecciona una dirección de envío primero.");
                window.location.href = "/html/Logeado/compra/domicilio.html";
                return;
            }

            const cart = getCheckoutCart();
            if (!cart.length) {
                alert("Tu carrito está vacío.");
                window.location.href = "/html/Logeado/carrito.html";
                return;
            }

            localStorage.setItem('compra_en_progreso', '1');
            
            // Redirigir al paso 4 (Confirmar)
            window.location.href = "/html/Logeado/compra/Confirmar_Compra.html";
        }
    </script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
