<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Confirmar y Finalizar</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de responsividad */
        @media (max-width: 768px) {
            .checkout-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 20px auto !important;
            }
            .checkout-title { font-size: 1.4rem !important; margin-bottom: 20px !important; }
            .final-summary-area { padding: 15px !important; }
            .final-section h3 { font-size: 1rem !important; }
            .final-section p { font-size: 0.9rem !important; }
            .final-totals strong { font-size: 1.8rem !important; }
            .navigation-actions { flex-direction: column-reverse !important; gap: 12px !important; }
            .btn-primary, .btn-dark-action { width: 100% !important; padding: 14px !important; font-size: 1rem !important; }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .checkout-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 650px;
            margin: 60px auto;
        }

        .modal-backdrop {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 10000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white; 
            padding: 35px; 
            border-radius: 15px; 
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .btn-disabled {
            background: #ccc !important;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body class="form-page">
    
    <main class="main-content cart-main">
        <div class="background-overlay"></div>

        <div class="checkout-container">
            <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px;">
                <span style="width: 40px; height: 10px; background: #27ae60; border-radius: 5px;"></span>
                <span style="width: 40px; height: 10px; background: #27ae60; border-radius: 5px;"></span>
                <span style="width: 40px; height: 10px; background: #5d4037; border-radius: 5px;"></span>
            </div>

            <h1 class="checkout-title" style="color: #5d4037; text-align: center; margin-bottom: 10px;">4. Confirmar y Finalizar Compra</h1>
            <p style="text-align: center; color: #888; margin-bottom: 30px;">Revisa tu información antes de realizar el pago.</p>
            
            <div class="checkout-step-content">
                <div class="final-summary-area" style="background: #fdfdfd; padding: 25px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 30px;">
                    
                    <div class="final-section" style="margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px;">
                        <h3 style="color: #5d4037; font-size: 1.1rem; margin-bottom: 5px;"><i class="fas fa-map-marker-alt"></i> Dirección de Envío:</h3>
                        <p id="display-address" style="color: #666; margin: 0; font-style: italic;">Cargando dirección...</p>
                    </div>
                    
                    <div class="final-section" style="margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px;">
                        <h3 style="color: #5d4037; font-size: 1.1rem; margin-bottom: 5px;"><i class="fas fa-wallet"></i> Método de Pago:</h3>
                        <p id="display-payment" style="color: #666; margin: 0;">Cargando método...</p>
                    </div>
                    
                    <div class="final-section final-totals" style="padding-top: 15px; text-align: right;">
                        <h3 style="color: #5d4037; font-size: 1.1rem; margin-bottom: 5px;">Total a Pagar:</h3>
                        <strong id="display-total" style="color: #d32f2f; font-size: 2.5rem; display: block;">$0.00</strong>
                    </div>
                </div>
                
                <div class="navigation-actions" style="display: flex; justify-content: space-between; gap: 15px;">
                    <button class="btn-dark-action" onclick="window.history.back()" style="background: #777; color: white; border: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        ← REGRESAR
                    </button>

                    <button class="btn-primary" id="btn-finalizar-compra" onclick="ejecutarCompraFinal()" style="background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; flex-grow: 1; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(39,174,96,0.3);">
                        PAGAR Y FINALIZAR PEDIDO <i class="fas fa-lock" style="margin-left: 10px;"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="compra-success-modal" class="modal-backdrop"></div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 25px; background: rgba(44, 44, 44, 0.95); color: #bbb; margin-top: auto;">
        <div class="copyright">© 2026. La Lechuza Lectora | Todos los derechos reservados.</div>
    </footer>

    <script src="/JS/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Cargar datos del carrito y checkout
            let carrito = JSON.parse(localStorage.getItem('laLechuzaLectoraCart') || '[]');
            const carritoLegacy = JSON.parse(localStorage.getItem('carrito') || '[]');
            let usuario = null;
            const idDireccion = localStorage.getItem('id_direccion_pedido');
            const metodoPago = localStorage.getItem('metodo_pago') || 'Mercado Pago';
            const direccionEnvio = JSON.parse(localStorage.getItem('direccion_envio') || 'null');

            if (window.API?.requireSession) {
                usuario = await window.API.requireSession({
                    redirectToLogin: false,
                    rememberCurrentPath: true
                });
            } else {
                try {
                    usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
                } catch {
                    usuario = null;
                }
            }

            if(!carrito.length && carritoLegacy.length) {
                carrito = carritoLegacy.map((item) => ({
                    id: item.id_producto,
                    title: item.titulo,
                    price: Number(item.precio || 0),
                    quantity: Number(item.cantidad || 1),
                    image: item.imagen_url || `/Imagenes/Libros/${item.id_producto}.jpg`
                }));
                localStorage.setItem('laLechuzaLectoraCart', JSON.stringify(carrito));
            }

            if(!usuario) {
                localStorage.setItem('postLoginRedirect', '/html/Logeado/compra/Confirmar_Compra.html');
                window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html';
                return;
            }
            
            if(carrito.length === 0) {
                alert("El carrito está vacío. Redirigiendo...");
                window.location.href = "/html/Logeado/carrito.html";
                return;
            }

            if(!idDireccion) {
                alert("Falta seleccionar dirección de envío.");
                window.location.href = "/html/Logeado/compra/domicilio.html";
                return;
            }

            // Calcular total real basado en el carrito actual
            const total = carrito.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            // Mostrar datos en pantalla
            document.getElementById('display-total').textContent = `$${total.toFixed(2)}`;
            document.getElementById('display-payment').textContent = metodoPago;
            document.getElementById('display-address').textContent = direccionEnvio
                ? `${direccionEnvio.calle_numero || ''}, C.P. ${direccionEnvio.codigo_postal || ''}, ${direccionEnvio.ciudad_estado || ''}`
                : (idDireccion ? `Dirección seleccionada (ID: ${idDireccion})` : "Confirmada en paso anterior");
        });

        async function ejecutarCompraFinal() {
            const btn = document.getElementById('btn-finalizar-compra');
            
            // Evitar múltiples clics
            btn.disabled = true;
            btn.classList.add('btn-disabled');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> PROCESANDO...';

            // Obtener datos para la API
            let usuario = null;
            const idDireccion = localStorage.getItem('id_direccion_pedido');
            const idMetodoPago = Number(localStorage.getItem('id_metodo_pago_pedido') || 0) || null;
            const metodoCheckout = (localStorage.getItem('metodo_pago_checkout') || 'mercadopago').toLowerCase();
            const carrito = JSON.parse(localStorage.getItem('laLechuzaLectoraCart') || '[]');
            const total = carrito.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            if (window.API?.requireSession) {
                usuario = await window.API.requireSession({
                    redirectToLogin: false,
                    rememberCurrentPath: true
                });
            } else {
                try {
                    usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
                } catch {
                    usuario = null;
                }
            }

            // Validaciones de último segundo
            if(!usuario || !idDireccion) {
                alert("Faltan datos de sesión o envío. Por favor, vuelve a intentar.");
                window.location.href = "/html/Logeado/carrito.html";
                return;
            }

            try {
                const endpoint = metodoCheckout === 'paypal'
                    ? '/payments/paypal/create-order'
                    : '/payments/mercadopago';

                const checkoutResult = await API.post(endpoint, {
                    items: carrito.map(p => ({
                        id_producto: p.id,
                        cantidad: p.quantity,
                        precio: p.price,
                        titulo: p.title || 'Libro'
                    })),
                    id_direccion: parseInt(idDireccion, 10),
                    id_metodo_pago: idMetodoPago
                });

                const initPoint = checkoutResult?.data?.init_point || checkoutResult?.init_point;
                const approveUrl = checkoutResult?.data?.approve_url || checkoutResult?.approve_url;
                const redirectUrl = metodoCheckout === 'paypal' ? approveUrl : initPoint;

                if (!redirectUrl) {
                    throw new Error(`No se pudo generar el enlace de pago para ${metodoCheckout === 'paypal' ? 'PayPal' : 'Mercado Pago'}`);
                }

                localStorage.setItem('compra_en_progreso', '1');
                window.location.href = redirectUrl;
            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un problema: " + error.message);
                btn.disabled = false;
                btn.classList.remove('btn-disabled');
                btn.innerHTML = 'PAGAR Y FINALIZAR PEDIDO <i class="fas fa-lock" style="margin-left: 10px;"></i>';
            }
        }
    </script>
</body>
</html>
