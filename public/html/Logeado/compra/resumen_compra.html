<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Compra - Paso 1</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de responsividad específicos */
        @media (max-width: 768px) {
            .checkout-container {
                width: 95% !important;
                padding: 15px !important;
                margin: 20px auto !important;
            }

            .checkout-grid {
                grid-template-columns: 1fr !important; /* Una sola columna en móvil */
                gap: 20px !important;
            }

            .checkout-summary-card {
                order: 2; /* Los totales bajan después de la lista en móvil */
            }

            .product-list-wrapper {
                order: 1;
            }

            .btn-next-step, .btn-cancel-checkout {
                width: 100% !important; /* Botones a lo ancho para mejor toque */
                padding: 12px !important;
                margin-top: 10px !important;
            }
        }

        /* Estabilización del fondo */
        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="form-page">

    <header class="navbar user-navbar">
        </header>

    <main class="main-content cart-main">
        <div class="background-overlay"></div>

        <div class="checkout-container" style="background: rgba(245, 245, 245, 0.95); border-radius: 10px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
            <h1 class="checkout-title" style="color: #5d4037; text-align: center; margin-bottom: 30px;">1. Resumen de tu Pedido</h1>
            
            <div class="checkout-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                
                <div class="product-list-wrapper">
                    <h2 style="font-size: 1.3rem; color: #5d4037; margin-bottom: 20px; border-bottom: 2px solid #fbc02d; padding-bottom: 5px;">Artículos en tu Carrito</h2>
                    <div id="checkout-product-list" style="background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                        </div>
                </div>

                <div class="checkout-summary-card" style="background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); height: fit-content;">
                    <h2 style="font-size: 1.3rem; color: #5d4037; margin-bottom: 20px;">Totales</h2>
                    <div class="summary-details" style="color: #333;">
                        <div class="summary-line" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <p>Subtotal de productos:</p>
                            <span id="subtotal-display">$0.00</span>
                        </div>
                        <div class="summary-line" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <p>Costo de Envío:</p>
                            <span id="shipping-display">Gratis</span>
                        </div>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                        <div class="summary-line total-line" style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                            <p>Total Final:</p>
                            <strong id="total-display" style="color: #d32f2f;">$0.00</strong>
                        </div>
                    </div>
                    
                    <button class="btn-primary btn-next-step" onclick="continuarADomicilio()" style="width: 100%; background: #5d4037; color: white; border: none; padding: 12px; margin-top: 25px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                        Continuar a Dirección
                    </button>
                    <button class="btn-secondary btn-cancel-checkout" onclick="window.location.href='/html/Logeado/Catalogo_Logeado.html'" style="width: 100%; background: transparent; color: #555; border: 1px solid #555; padding: 10px; margin-top: 10px; border-radius: 5px; cursor: pointer;">
                        Cancelar Compra
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; background: rgba(44, 44, 44, 0.9); color: white; margin-top: auto;">
        <div class="social-links" style="margin-bottom: 10px;">
            <a href="#" style="color: white; margin: 0 10px;"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" style="color: white; margin: 0 10px;"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" style="color: white; margin: 0 10px;"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="copyright">
            © 2026 La Lechuza Lectora ©
        </div>
    </footer>
    

<script src="/JS/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    let usuario = null;
    if (window.API?.requireSession) {
        usuario = await window.API.requireSession({
            redirectToLogin: false,
            rememberCurrentPath: true
        });
    } else {
        try {
            usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
        } catch {
            usuario = null;
        }
    }

    if (!usuario) {
        localStorage.setItem('postLoginRedirect', '/html/Logeado/compra/resumen_compra.html');
        window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html';
        return;
    }

    renderizarResumen();
});

function renderizarResumen() {
    const container = document.getElementById('checkout-product-list');
    const subtotalDisplay = document.getElementById('subtotal-display');
    const totalDisplay = document.getElementById('total-display');
    
    let carrito = JSON.parse(localStorage.getItem('laLechuzaLectoraCart')) || [];
    if (!carrito.length) {
        const legacyCart = JSON.parse(localStorage.getItem('carrito') || '[]');
        carrito = legacyCart.map((item) => ({
            id: item.id_producto,
            title: item.titulo,
            price: Number(item.precio || 0),
            quantity: Number(item.cantidad || 1),
            image: item.imagen_url || `/Imagenes/Libros/${item.id_producto}.jpg`
        }));
        localStorage.setItem('laLechuzaLectoraCart', JSON.stringify(carrito));
    }

    if (carrito.length === 0) {
        container.innerHTML = `
            <div style="text-align: center; padding: 20px;">
                <i class="fa-solid fa-cart-shopping" style="font-size: 3rem; color: #ccc;"></i>
                <p style="margin-top: 10px; color: #666;">Tu carrito está vacío.</p>
                <a href="/html/Logeado/Catalogo_Logeado.html" style="color: #5d4037; font-weight: bold;">Volver al catálogo</a>
            </div>`;
        return;
    }

    let subtotal = 0;
    container.innerHTML = '';

    carrito.forEach(item => {
        const itemTotal = parseFloat(item.price) * item.quantity;
        subtotal += itemTotal;

        container.innerHTML += `
            <div class="checkout-item" style="display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #eee;">
                <img src="${item.image}" alt="${item.title}" style="width: 60px; height: 80px; object-fit: cover; border-radius: 4px;">
                <div style="flex-grow: 1;">
                    <h3 style="font-size: 1rem; color: #5d4037; margin: 0;">${item.title}</h3>
                    <p style="font-size: 0.9rem; color: #777; margin: 5px 0;">Cantidad: ${item.quantity}</p>
                </div>
                <div style="text-align: right;">
                    <span style="font-weight: bold; color: #333;">$${itemTotal.toFixed(2)}</span>
                </div>
            </div>
        `;
    });

    subtotalDisplay.innerText = `$${subtotal.toFixed(2)}`;
    totalDisplay.innerText = `$${subtotal.toFixed(2)}`;
    localStorage.setItem('total_compra_actual', subtotal.toFixed(2));
}

function continuarADomicilio() {
    localStorage.setItem('compra_en_progreso', '1');
    window.location.href = '/html/Logeado/compra/domicilio.html';
}
</script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
