<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Contacto</title>
    <link rel="icon" type="image/x-icon" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <script src="/JS/cartManager.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* --- ESTILOS MENÚ HAMBURGUESA --- */
        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: space-between;
                height: auto !important;
                padding: 10px 20px !important;
            }
            .hamburger-btn { display: block; }
            .logo-container { order: 1; }
            .auth-actions { order: 3; margin-left: 0; display: flex; align-items: center; gap: 10px; }

            .nav-links {
                display: none; 
                flex-direction: column;
                width: 100%;
                order: 4;
                background: rgba(244, 236, 226, 0.98);
                padding: 15px 0;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                margin-top: 10px;
                border-radius: 0 0 10px 10px;
            }
            .nav-links.active { display: flex !important; }
            .nav-links a { padding: 12px; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.05); }

            .contact-container { width: 95% !important; padding: 25px 15px !important; margin: 20px auto !important; }
            .contact-grid { grid-template-columns: 1fr !important; gap: 30px !important; }
        }

        /* --- DROPDOWN AVATAR --- */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 180px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 10000; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #eee;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: 600;
        }
        .dropdown-menu a:hover { background-color: #f9f9f9; }

        .avatar {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #5d4037;
        }

        .btn-send:hover { background: #4b342c !important; transition: 0.3s; }
    </style>
</head>
<body>

    <header class="navbar detail-navbar">
        <div class="logo-container" onclick="window.location.href='/html/Logeado/Catalogo_Logeado.html'" style="cursor: pointer;">
            <img src="../../Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <button class="hamburger-btn" id="hamburger-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <nav class="nav-links" id="mobile-nav">
            <a href="/html/Logeado/Acerca%20de.html">Acerca de</a>
            <a href="#" class="active-link">Contacto</a>
            <a href="/html/Logeado/Ayuda.html">Ayuda</a>
            <a href="/html/Logeado/Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='/html/Logeado/Catalogo_Logeado.html'"><i class="fa-solid fa-house"></i></button>

            <a href="/html/Logeado/carrito.html" class="icon-link cart-button" style="position: relative;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </a>
            
            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="../../Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="/html/Logeado/perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="/index.html" onclick="localStorage.clear()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content contact-main">
        <div class="background-overlay contact-bg" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed; background-size: cover; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>

        <div class="contact-container" style="background: rgba(240, 231, 203, 0.96); border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin: 60px auto; max-width: 1000px; position: relative; z-index: 5;">
            <h1 style="color: #5d4037; text-align: center; margin-bottom: 10px; font-size: 2.2rem;">Contáctanos</h1>
            <p style="text-align: center; color: #5d4037; margin-bottom: 40px; font-weight: 500;">Estamos aquí para escucharte. Tu opinión nos ayuda a mejorar.</p>

            <div class="contact-grid" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px;">
                <div style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                    <form id="contact-form">
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 8px;">Nombre Completo</label>
                            <input type="text" required placeholder="Ej. Juan Pérez" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                        </div>
                        
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 8px;">Correo Electrónico</label>
                            <input type="email" required placeholder="tu@correo.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 8px;">Mensaje</label>
                            <textarea required rows="5" placeholder="Escribe tus dudas o comentarios aquí..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; resize: none; box-sizing: border-box;"></textarea>
                        </div>

                        <button type="submit" class="btn-send" style="background: #5d4037; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem;">
                            Enviar Mensaje <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>
                        </button>
                    </form>
                </div>

                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="background: white; padding: 25px; border-radius: 10px; border-left: 5px solid #5d4037;">
                        <h2 style="color: #5d4037; font-size: 1.2rem; margin-bottom: 15px;">Nuestras Redes</h2>
                        <div style="display: flex; gap: 20px; font-size: 1.6rem;">
                            <a href="#" style="color: #1DA1F2;"><i class="fa-brands fa-x-twitter"></i></a>
                            <a href="#" style="color: #E1306C;"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#" style="color: #FF0000;"><i class="fa-brands fa-youtube"></i></a>
                        </div>
                    </div>

                    <div style="background: white; padding: 25px; border-radius: 10px; border-left: 5px solid #8d6e63;">
                        <h2 style="color: #5d4037; font-size: 1.2rem; margin-bottom: 15px;">Ubicación y Teléfono</h2>
                        <p style="color: #666; font-size: 0.95rem; line-height: 1.6;">
                            <i class="fa-solid fa-location-dot" style="color: #5d4037; margin-right: 8px;"></i> Av Telecomunicaciones, Iztapalapa, 09208 CDMX.<br><br>
                            <i class="fa-solid fa-phone" style="color: #5d4037; margin-right: 8px;"></i> 55-24-01-43-82
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 30px; color: #5d4037; font-weight: bold;">
        © 2026 La Lechuza Lectora ©
    </footer>

    <script>
        // TOGGLE MENÚ MÓVIL
        const hamburger = document.getElementById('hamburger-btn');
        const mobileNav = document.getElementById('mobile-nav');
        
        hamburger.addEventListener('click', () => {
            mobileNav.classList.toggle('active');
        });

        // TOGGLE DROPDOWN AVATAR
        const avatarBtn = document.getElementById('avatar-btn');
        const dropdown = document.getElementById('avatar-dropdown');

        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        // CERRAR AL CLICAR FUERA
        window.addEventListener('click', (e) => {
            if (!avatarBtn.contains(e.target)) dropdown.classList.remove('show');
            if (!hamburger.contains(e.target) && !mobileNav.contains(e.target)) {
                mobileNav.classList.remove('active');
            }
        });

        // SIMULACIÓN DE ENVÍO
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("¡Gracias por contactarnos! Recibirás una respuesta en tu correo muy pronto.");
            this.reset();
        });
    </script>
    <script src="/JS/nav-toggle-global.js"></script>
</body>
</html>
