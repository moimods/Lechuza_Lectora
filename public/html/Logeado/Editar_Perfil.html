<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - La Lechuza Lectora</title>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <style>
        /* AJUSTES RESPONSIVOS */
        @media (max-width: 768px) {
            .edit-profile-container { width: 90% !important; padding: 25px 20px !important; margin: 20px auto !important; }
            .form-actions { flex-direction: column !important; gap: 10px; }
            .form-actions button { width: 100% !important; }
            .nav-links { display: none; } /* Ocultar links en móvil para simplificar */
        }

        /* Dropdown Avatar */
        .dropdown-menu {
            display: none; 
            position: absolute;
            right: 0;
            top: 55px; 
            background: white;
            min-width: 170px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            z-index: 9999; 
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #ddd;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a {
            color: #5d4037 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
        }

        .avatar { border-radius: 50%; width: 40px; height: 40px; object-fit: cover; cursor: pointer; border: 2px solid #5d4037; }
        
        /* Efecto hover en botones */
        .btn-save:hover { background: #4b342c !important; }
        .btn-cancel:hover { background: #bbb !important; }
    </style>
</head>
<body class="form-page">
    
    <header class="navbar detail-navbar">
        <div class="logo-container" onclick="window.location.href='/html/Logeado/Catalogo_Logeado.html'" style="cursor:pointer;">
            <img src="/Imagenes/logo.png" alt="Logo La Lechuza Lectora" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <a href="/html/Logeado/Acerca%20de.html">Acerca de</a>
            <a href="/html/Logeado/Contacto.html">Contacto</a>
            <a href="/html/Logeado/Ayuda.html">Ayuda</a>
            <a href="/html/Logeado/Catalogo_Logeado.html">Catálogo</a>
        </nav>
        
        <div class="auth-actions user-actions">
            <button class="icon-button" onclick="window.location.href='/html/Logeado/perfil.html'"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            <div class="avatar-dropdown-container" style="position: relative;">
                <img src="/Imagenes/miku.png.jpg" alt="Avatar Usuario" class="avatar" id="avatar-btn">
                <div class="dropdown-menu" id="avatar-dropdown">
                    <a href="/html/Logeado/perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a>
                    <a href="/index.html" onclick="return appLogout(event)"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        <div class="background-overlay" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed; background-size: cover; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div> 
        
        <div class="profile-main-wrapper" style="position: relative; z-index: 5; margin-top: 40px; padding-bottom: 50px;">
            <h1 style="color: #ffffff; text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Editar Perfil</h1>

            <div class="edit-profile-container" style="background: rgba(240, 231, 203, 0.98); padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 500px; margin: 0 auto;">
                <form id="edit-profile-form">
                    <div class="edit-photo-section" style="text-align: center; margin-bottom: 25px;">
                        <div style="position: relative; display: inline-block;">
                            <img src="/Imagenes/miku.png.jpg" alt="Avatar actual" id="preview-avatar" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #5d4037; background: white;">
                            <label for="file-upload" style="position: absolute; bottom: 5px; right: 5px; background: #5d4037; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white;">
                                <i class="fas fa-camera"></i>
                            </label>
                            <input id="file-upload" type="file" style="display:none;" accept="image/*">
                        </div>
                        <p style="font-size: 0.8rem; color: #5d4037; margin-top: 10px;">Haz clic en la cámara para subir una nueva imagen</p>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="display: block; color: #5d4037; font-weight: bold; margin-bottom: 8px;">Nombre Completo</label>
                        <input type="text" id="edit-nombre" placeholder="Tu nombre" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label style="display: block; color: #5d4037; font-weight: bold; margin-bottom: 8px;">Correo Electrónico</label>
                        <input type="email" id="edit-email" readonly style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #eee; color: #777; cursor: not-allowed; box-sizing: border-box;">
                    </div>

                    <div class="form-actions" style="display: flex; gap: 15px; justify-content: center;">
                        <button type="button" class="btn-cancel" onclick="window.location.href='/html/Logeado/perfil.html'" style="background: #ccc; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #333; flex: 1;">Cancelar</button>
                        <button type="submit" class="btn-save" style="background: #5d4037; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1;">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px; color: #ffffff; font-weight: bold;">
        <div class="copyright">© 2026 La Lechuza Lectora ©</div>
    </footer>

    <script>
        // Lógica de carga y guardado local (simulada)
        const userEmail = localStorage.getItem('userEmail') || "usuario@ejemplo.com";
        const userName = localStorage.getItem('userName') || "Nombre de Usuario";

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('edit-nombre').value = userName;
            document.getElementById('edit-email').value = userEmail;
        });

        // Guardar cambios
        document.getElementById('edit-profile-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const nuevoNombre = document.getElementById('edit-nombre').value;
            
            // Simulamos guardado en LocalStorage
            localStorage.setItem('userName', nuevoNombre);
            
            alert('¡Perfil actualizado con éxito!');
            window.location.href = '/html/Logeado/perfil.html';
        });

        // Previsualización de imagen REAL
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('preview-avatar').src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Menú Avatar Refinado
        const avatarBtn = document.getElementById('avatar-btn');
        const dropdown = document.getElementById('avatar-dropdown');

        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        window.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });
    </script>
<script src="/JS/api.js" defer></script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
