<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayuda - Mis Compras</title>
  <link rel="stylesheet" href="/Estilos/Estilo1.css" />
  <style>
    @media (max-width: 768px) {
      .compras-shell {
        padding: 20px 14px !important;
      }
      .compra-item {
        padding: 12px !important;
      }
      .compra-item a {
        width: 100%;
        text-align: center;
        padding: 10px 0;
        border: 1px solid #5d4037;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="main-content compras-shell" style="padding:40px;max-width:900px;margin:0 auto;">
    <h1 style="color:#5d4037;">Mis Compras</h1>
    <p>Aquí puedes revisar el estado de tus pedidos, historial de compras y seguimiento.</p>
    <div id="compras-resumen" style="margin:20px 0;padding:15px;border-radius:8px;background:#f4ece2;color:#5d4037;"></div>
    <div id="compras-lista" style="display:grid;gap:12px;"></div>
    <a href="/html/Ayuda.html" class="btn-primary" style="display:inline-block;margin-top:20px;">Volver a Ayuda</a>
  </main>
  <script src="/JS/api.js" defer></script>
  <script>
    function estadoTexto(estado) {
      const key = String(estado || "").toLowerCase();
      if (key === "completado") return "Completado";
      if (key === "enviado") return "En camino";
      if (key === "entregado") return "Entregado";
      if (key === "cancelado") return "Cancelado";
      return "Pendiente";
    }

    function fechaTexto(raw) {
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return "Fecha no disponible";
      return d.toLocaleDateString("es-MX", { day: "2-digit", month: "short", year: "numeric" });
    }

    async function cargarHistorial() {
      const resumen = document.getElementById("compras-resumen");
      const lista = document.getElementById("compras-lista");

      if (window.API?.requireSession) {
        const usuario = await window.API.requireSession({
          redirectToLogin: false,
          rememberCurrentPath: true,
          loginPath: "/html/Inicio_de_sesion/Inicio_sesion.html"
        });

        if (!usuario) {
          localStorage.setItem("postLoginRedirect", "/html/Ayuda/mis-compras.html");
          window.location.href = "/html/Inicio_de_sesion/Inicio_sesion.html";
          return;
        }
      }

      try {
        const response = await API.get('/ventas/usuario?page=1&limit=50');
        const compras = Array.isArray(response.data) ? response.data : [];

        if (compras.length === 0) {
          resumen.textContent = "No hay compras registradas todavía.";
          lista.innerHTML = "";
          return;
        }

        const totalGastado = compras.reduce((acc, c) => acc + Number(c.total || 0), 0);
        resumen.textContent = `Total de compras: ${compras.length} | Monto acumulado: $${totalGastado.toFixed(2)} MXN`;

        lista.innerHTML = compras.map((c) => `
          <article class="compra-item" style="background:#fff;padding:14px;border-radius:10px;border-left:4px solid #5d4037;">
            <strong>Pedido #LL-${c.id_venta}</strong>
            <div style="color:#555;margin-top:6px;">Fecha: ${fechaTexto(c.fecha_venta)}</div>
            <div style="color:#555;">Estado: ${estadoTexto(c.estado)}</div>
            <div style="color:#5d4037;font-weight:bold;">Total: $${Number(c.total || 0).toFixed(2)} MXN</div>
            <a href="/html/Logeado/perfil.html" style="display:inline-block;margin-top:8px;color:#5d4037;font-weight:bold;text-decoration:none;">Ver detalle en mi perfil</a>
          </article>
        `).join("");
      } catch (error) {
        resumen.textContent = "No se pudo cargar tu historial. Verifica tu sesión.";
        lista.innerHTML = "";
      }
    }

    cargarHistorial();
  </script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
