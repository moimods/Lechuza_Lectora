<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Reporte de Ventas</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .report-container {
            padding: clamp(16px, 2vw, 30px);
            width: min(100% - 2rem, 1680px);
            margin: auto;
            position: relative;
            z-index: 10;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #5d4037;
        }
        .stat-card h3 { font-size: 0.9rem; color: #777; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: #5d4037; margin: 0; }

        .charts-section {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
            gap: 20px;
        }

        .chart-box, .top-products-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .top-products-box {
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .ventas-table { min-width: 420px; }
        th { text-align: left; color: #5d4037; border-bottom: 2px solid #eee; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f5f5f5; font-size: 0.9rem; }

        .menu-items.show-menu {
            display: flex !important;
            flex-direction: column;
            position: absolute;
            top: 70px;
            right: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
            z-index: 1000;
        }

        @media (max-width: 900px) { .charts-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="dashboard-page">
    <div class="background-overlay dashboard-bg" style="filter: brightness(0.4); background: url('/Imagenes/Carrusel/5.jpg') center/cover;"></div>

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="/Imagenes/logo.png" alt="Logo" class="logo">
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
                <div class="burger-icon"><span></span><span></span><span></span></div>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="/html/Admin/Gestion_de_inventario.html">Inventario</a>
                <a href="/html/Admin/Reporte_de_ventas.html">Ventas</a>
                <a href="/html/Admin/Reporte_de_compras.html">Pedidos</a>
                <a href="/index.html" onclick="return appLogout(event)">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <a href="/html/Admin/panel_de_admin.html" class="icon-button"><i class="fa-solid fa-house"></i></a>
            <span class="admin-label" id="admin-display-name">Admin</span>
            <a href="/html/Admin/panel_de_admin.html" title="Mi perfil de administrador">
                <img src="/Imagenes/miku.png.jpg" alt="Avatar" class="avatar" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
            </a>
        </div>
    </header>

    <main class="report-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Ingresos Totales</h3>
                <p id="total-ingresos">$0.00</p>
            </div>
            <div class="stat-card">
                <h3>Ventas Realizadas</h3>
                <p id="conteo-ventas">0</p>
            </div>
            <div class="stat-card">
                <h3>Promedio por Venta</h3>
                <p id="ticket-promedio">$0.00</p>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-box">
                <h2 style="color: #5d4037;"><i class="fa-solid fa-chart-line"></i> Tendencia Mensual</h2>
                <div style="height: 300px; margin-top: 20px;">
                    <canvas id="ventasChart"></canvas>
                </div>
            </div>

            <div class="top-products-box">
                <h2 style="color: #5d4037;"><i class="fa-solid fa-trophy"></i> Más Vendidos</h2>
                <table class="ventas-table">
                    <thead>
                        <tr>
                            <th>Libro</th>
                            <th>Cant.</th>
                        </tr>
                    </thead>
                    <tbody id="top-libros-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function initMenu() {
            const btn = document.getElementById('hamburger-btn');
            const menu = document.getElementById('menu-items');
            btn?.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('show-menu');
            });
            document.addEventListener('click', () => menu?.classList.remove('show-menu'));
            menu?.addEventListener('click', (e) => e.stopPropagation());
        }

        function renderReporte(data) {
            const resumen = data?.resumen || {};
            const top = Array.isArray(data?.top) ? data.top : [];
            const grafica = Array.isArray(data?.grafica) ? data.grafica : [];

            document.getElementById("total-ingresos").innerText = `$${Number(resumen.total_ganancias || 0).toLocaleString()}`;
            document.getElementById("conteo-ventas").innerText = Number(resumen.total_pedidos || 0);
            document.getElementById("ticket-promedio").innerText = `$${Number(resumen.promedio || 0).toFixed(2)}`;

            const tbody = document.getElementById("top-libros-body");
            if (top.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2">Sin ventas registradas</td></tr>';
            } else {
                tbody.innerHTML = top.map((libro) => `
                    <tr>
                        <td>${libro.titulo}</td>
                        <td><strong>${Number(libro.total_vendido || 0)}</strong></td>
                    </tr>
                `).join("");
            }

            const ctx = document.getElementById("ventasChart").getContext("2d");
            new Chart(ctx, {
                type: "line",
                data: {
                    labels: grafica.map((g) => g.mes),
                    datasets: [{
                        label: "Ventas Mensuales ($)",
                        data: grafica.map((g) => Number(g.monto || 0)),
                        borderColor: "#5d4037",
                        backgroundColor: "rgba(93, 64, 55, 0.1)",
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: "#5d4037"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        async function inicializarReporte() {
            const user = JSON.parse(localStorage.getItem('usuario') || 'null');

            if (!user || user.rol !== 'admin') {
                window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html';
                return;
            }

            const nameLabel = document.getElementById('admin-display-name');
            if (nameLabel) nameLabel.textContent = user.nombre || 'Admin';
            initMenu();

            try {
                const data = await API.get("/reportes/ventas");
                renderReporte(data);
            } catch (error) {
                console.error("No se pudo cargar el reporte de ventas:", error);
                alert("No se pudo cargar el reporte. Verifica tu sesión y vuelve a intentar.");
            }
        }

        window.onload = inicializarReporte;
    </script>
<script src="/JS/nav-toggle-global.js" defer></script>
<script src="/JS/api.js" defer></script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
