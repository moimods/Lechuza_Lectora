<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Reporte de Ventas</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .report-container { padding: 30px; max-width: 1200px; margin: auto; position: relative; z-index: 10; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #5d4037;
        }
        .stat-card h3 { font-size: 0.9rem; color: #777; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: #5d4037; margin: 0; }

        .charts-section {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .chart-box, .top-products-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #5d4037; border-bottom: 2px solid #eee; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f5f5f5; font-size: 0.9rem; }

        @media (max-width: 900px) { .charts-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="dashboard-page">
    <div class="background-overlay dashboard-bg" style="filter: brightness(0.4); background: url('../../Imagenes/Carrusel/5.jpg') center/cover;"></div>

    <header class="navbar">
        <div class="logo">🦉 Análisis de Ventas</div>
        <div class="menu-items">
            <a href="panel_de_admin.html"><i class="fa-solid fa-house"></i> Panel</a>
            <a href="Reporte_de_compras.html"><i class="fa-solid fa-cart-flatbed"></i> Pedidos</a>
        </div>
    </header>

    <main class="report-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Ingresos Totales</h3>
                <p id="total-ingresos">$0.00</p>
            </div>
            <div class="stat-card">
                <h3>Ventas Realizadas</h3>
                <p id="conteo-ventas">0</p>
            </div>
            <div class="stat-card">
                <h3>Promedio por Venta</h3>
                <p id="ticket-promedio">$0.00</p>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-box">
                <h2 style="color: #5d4037;"><i class="fa-solid fa-chart-line"></i> Tendencia Mensual</h2>
                <div style="height: 300px; margin-top: 20px;">
                    <canvas id="ventasChart"></canvas>
                </div>
            </div>

            <div class="top-products-box">
                <h2 style="color: #5d4037;"><i class="fa-solid fa-trophy"></i> Más Vendidos</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Libro</th>
                            <th>Cant.</th>
                        </tr>
                    </thead>
                    <tbody id="top-libros-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function inicializarReporte() {
            let data;
            
            try {
                // Intento de conexión con el backend
                const respuesta = await fetch('/api/reportes/ventas');
                if (!respuesta.ok) throw new Error("Endpoint no encontrado, usando datos locales.");
                data = await respuesta.json();
            } catch (error) {
                console.warn(error.message);
                // DATOS DE PRUEBA (Para que la gráfica funcione mientras creas el endpoint)
                data = {
                    resumen: { total_ganancias: 15420.50, total_pedidos: 84, promedio: 183.57 },
                    top: [
                        { titulo: "El Quijote", total_vendido: 25 },
                        { titulo: "Cien Años de Soledad", total_vendido: 18 },
                        { titulo: "Rayuela", total_vendido: 12 }
                    ],
                    grafica: [
                        { mes: 'Ene', monto: 1200 }, { mes: 'Feb', monto: 1900 },
                        { mes: 'Mar', monto: 3000 }, { mes: 'Abr', monto: 2500 }
                    ]
                };
            }

            // 1. Actualizar Tarjetas KPI
            document.getElementById('total-ingresos').innerText = `$${parseFloat(data.resumen.total_ganancias).toLocaleString()}`;
            document.getElementById('conteo-ventas').innerText = data.resumen.total_pedidos;
            document.getElementById('ticket-promedio').innerText = `$${parseFloat(data.resumen.promedio).toFixed(2)}`;

            // 2. Llenar Tabla de Libros Más Vendidos
            const tbody = document.getElementById('top-libros-body');
            tbody.innerHTML = data.top.map(l => `
                <tr>
                    <td>${l.titulo}</td>
                    <td><strong>${l.total_vendido}</strong></td>
                </tr>
            `).join('');

            // 3. Crear Gráfica de Tendencia
            const ctx = document.getElementById('ventasChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.grafica.map(g => g.mes),
                    datasets: [{
                        label: 'Ventas Mensuales ($)',
                        data: data.grafica.map(g => g.monto),
                        borderColor: '#5d4037',
                        backgroundColor: 'rgba(93, 64, 55, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#5d4037'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        window.onload = inicializarReporte;
    </script>
</body>
</html>
