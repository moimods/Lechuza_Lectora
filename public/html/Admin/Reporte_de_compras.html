<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Gestión de Pedidos</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .orders-container { padding: 30px; max-width: 1200px; margin: auto; position: relative; z-index: 10; }
        
        .table-wrapper {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow-x: auto;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-pagado { background: #e8f5e9; color: #2e7d32; }
        .status-enviado { background: #e3f2fd; color: #1565c0; }
        .status-pendiente { background: #fff3e0; color: #ef6c00; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #5d4037; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #ddd; color: #333; }
        tr:hover { background-color: #f9f4f2; }

        .btn-view { background: #5d4037; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-view:hover { background: #795548; }

        .dashboard-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; filter: brightness(0.5); }
    </style>
</head>
<body class="dashboard-page">
    <div class="background-overlay dashboard-bg"></div>

    <header class="navbar">
        <div class="logo">🦉 Reporte de Compras</div>
        <div class="menu-items">
            <a href="panel_de_admin.html"><i class="fa-solid fa-arrow-left"></i> Volver</a>
        </div>
    </header>

    <main class="orders-container">
        <h1 style="color: white; margin-bottom: 25px;"><i class="fa-solid fa-boxes-packing"></i> Pedidos Recientes</h1>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Orden</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-pedidos">
                    <tr><td colspan="6" style="text-align:center;">Cargando pedidos...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function cargarPedidos() {
            try {
                // Nota: Asegúrate de que el server.js tenga el endpoint /api/admin/pedidos
                const response = await fetch('/api/admin/pedidos');
                const pedidos = await response.json();
                
                const tbody = document.getElementById('tabla-pedidos');
                tbody.innerHTML = '';

                if (pedidos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay compras registradas.</td></tr>';
                    return;
                }

                pedidos.forEach(p => {
                    const fecha = new Date(p.fecha_pedido).toLocaleDateString('es-MX');
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>#${p.id_venta}</strong></td>
                            <td>${p.nombre_cliente}</td>
                            <td>${fecha}</td>
                            <td>$${parseFloat(p.total).toFixed(2)}</td>
                            <td><span class="status-badge status-${p.estado}">${p.estado}</span></td>
                            <td>
                                <button class="btn-view" onclick="verDetalle(${p.id_venta})">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('tabla-pedidos').innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Error al conectar con el servidor.</td></tr>';
            }
        }

        function verDetalle(idVenta) {
            alert("Detalle de la venta #" + idVenta + "\nPróximamente: Lista de libros comprados.");
        }

        document.addEventListener('DOMContentLoaded', cargarPedidos);
    </script>
</body>
</html>
