<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Gestión de Pedidos</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .orders-container {
            padding: clamp(16px, 2vw, 30px);
            width: min(100% - 2rem, 1680px);
            margin: auto;
            position: relative;
            z-index: 10;
        }
        
        .table-wrapper {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow-x: auto;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-pagado { background: #e8f5e9; color: #2e7d32; }
        .status-enviado { background: #e3f2fd; color: #1565c0; }
        .status-pendiente { background: #fff3e0; color: #ef6c00; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .orders-table { min-width: 980px; }
        th { background-color: #5d4037; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #ddd; color: #333; }
        tr:hover { background-color: #f9f4f2; }

        .btn-view { background: #5d4037; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-view:hover { background: #795548; }

        .dashboard-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; filter: brightness(0.5); }

        .menu-items.show-menu {
            display: flex !important;
            flex-direction: column;
            position: absolute;
            top: 70px;
            right: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body class="dashboard-page">
    <div class="background-overlay dashboard-bg"></div>

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="/Imagenes/logo.png" alt="Logo" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>

        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
                <div class="burger-icon"><span></span><span></span><span></span></div>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="/html/Admin/Gestion_de_inventario.html">Inventario</a>
                <a href="/html/Admin/Reporte_de_ventas.html">Ventas</a>
                <a href="/html/Admin/Reporte_de_compras.html">Pedidos</a>
                <a href="/index.html" onclick="return appLogout(event)">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <a href="/html/Admin/panel_de_admin.html" class="icon-button"><i class="fa-solid fa-house"></i></a>
            <span class="admin-label" id="admin-display-name">Admin</span>
            <img src="/Imagenes/miku.png.jpg" alt="Avatar" class="avatar" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
        </div>
    </header>

    <main class="orders-container">
        <h1 style="color: white; margin-bottom: 25px;"><i class="fa-solid fa-boxes-packing"></i> Pedidos Recientes</h1>
        
        <div class="table-wrapper">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Orden</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-pedidos">
                    <tr><td colspan="6" style="text-align:center;">Cargando pedidos...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function estadoBadgeClass(estado) {
            const value = String(estado || '').toLowerCase();
            if (value === 'completado' || value === 'pagado') return 'status-pagado';
            if (value === 'enviado' || value === 'entregado') return 'status-enviado';
            return 'status-pendiente';
        }

        function fechaTexto(raw) {
            const d = new Date(raw);
            if (Number.isNaN(d.getTime())) return 'Sin fecha';
            return d.toLocaleDateString('es-MX');
        }

        async function cargarPedidos() {
            try {
                const response = await API.get('/admin/pedidos?page=1&limit=100');
                const pedidos = Array.isArray(response?.data?.data)
                    ? response.data.data
                    : (Array.isArray(response?.data) ? response.data : []);
                
                const tbody = document.getElementById('tabla-pedidos');
                tbody.innerHTML = '';

                if (pedidos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay compras registradas.</td></tr>';
                    return;
                }

                pedidos.forEach(p => {
                    const fecha = fechaTexto(p.fecha_venta || p.fecha_pedido);
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>#${p.id_venta}</strong></td>
                            <td>${p.nombre_completo || 'Cliente'}</td>
                            <td>${fecha}</td>
                            <td>$${parseFloat(p.total).toFixed(2)}</td>
                            <td><span class="status-badge ${estadoBadgeClass(p.estado)}">${p.estado || 'pendiente'}</span></td>
                            <td>
                                <button class="btn-view" onclick="verDetalle(${p.id_venta})">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('tabla-pedidos').innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Error al conectar con el servidor.</td></tr>';
            }
        }

        async function verDetalle(idVenta) {
            try {
                const response = await API.get(`/ventas/${idVenta}`);
                const venta = response?.data || null;
                const items = Array.isArray(venta?.items) ? venta.items : [];

                const resumenItems = items.length
                    ? items.map((item) => `${item.titulo || 'Libro'} x${item.cantidad}`).join('\n')
                    : 'Sin detalles de productos';

                alert(`Venta #${idVenta}\nEstado: ${venta?.estado || 'pendiente'}\nTotal: $${Number(venta?.total || 0).toFixed(2)}\n\nProductos:\n${resumenItems}`);
            } catch (error) {
                alert('No se pudo cargar el detalle de la venta.');
            }
        }

        function initMenu() {
            const btn = document.getElementById('hamburger-btn');
            const menu = document.getElementById('menu-items');
            btn?.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('show-menu');
            });
            document.addEventListener('click', () => menu?.classList.remove('show-menu'));
            menu?.addEventListener('click', (e) => e.stopPropagation());
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await (window.API?.requireSession
                ? window.API.requireSession({ redirectToLogin: false, rememberCurrentPath: true })
                : JSON.parse(localStorage.getItem('usuario') || 'null'));

            if (!user || String(user.rol || '').toLowerCase() !== 'admin') {
                alert('Debes iniciar sesión como administrador.');
                window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html';
                return;
            }

            const nameLabel = document.getElementById('admin-display-name');
            if (nameLabel) nameLabel.textContent = user.nombre || 'Admin';

            initMenu();
            cargarPedidos();
        });
    </script>
    <script src="/JS/nav-toggle-global.js" defer></script>
<script src="/JS/api.js" defer></script>
</body>
</html>
