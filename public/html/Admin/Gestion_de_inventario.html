<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Gestión de Inventario</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>

        .status-tag {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .available { background-color: #e8f5e9; color: #2e7d32; }
        .low-stock { background-color: #fff3e0; color: #ef6c00; }
        .sold-out { background-color: #ffedee; color: #c62828; }

        .btn-edit, .btn-delete {
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin: 2px;
        }
        .btn-edit { background: #5d4037; color: white; }
        .btn-edit:hover { background: #3e2723; }
        .btn-delete { background: #e53935; color: white; }
        .btn-delete:hover { background: #b71c1c; }

        /* Estilos del Buscador */
        .search-container input:focus {
            border-color: #5d4037 !important;
            box-shadow: 0 0 8px rgba(93, 64, 55, 0.2);
        }

        @media print {
            .navbar, .hamburger-btn, .inventory-footer, .btn-edit, .btn-delete, .search-container { display: none !important; }
            .inventory-container { width: 100%; box-shadow: none; margin: 0; }
        }
    </style>
</head>
<body class="dashboard-page">
    <h2>Inventario</h2>

<form id="formAgregarProducto">
    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="autor" placeholder="Autor">
    <input type="number" id="precio" placeholder="Precio">
    <input type="number" id="stock" placeholder="Stock">

    <select id="categoria">
        <option>Novela</option>
        <option>Ciencia</option>
        <option>Historia</option>
    </select>

    <input type="text" id="imagen_url" placeholder="URL Imagen">

    <button type="submit">Agregar</button>
</form>

<script src="/JS/inventario.js" defer></script>

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="/Imagenes/logo.png" alt="Logo" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
                <div class="burger-icon"><span></span><span></span><span></span></div>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="/html/Admin/panel_de_admin.html">Panel Principal</a>
                <a href="/html/Admin/Gestion_de_inventario.html">Inventario</a>
                <a href="/html/Admin/Reporte_de_ventas.html">Ventas</a>
                <a href="/html/Admin/Reporte_de_compras.html">Pedidos</a>
                <a href="/index.html" onclick="return appLogout(event)">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <a href="/html/Admin/panel_de_admin.html" class="home-icon"><i class="fa-solid fa-house"></i></a>
            <span class="admin-label" id="admin-name">Admin</span>
            <img src="/Imagenes/miku.png.jpg" alt="Avatar" class="avatar" style="object-fit: cover; border-radius: 50%; width: 40px; height: 40px;">
        </div>
    </header>

    <main class="main-content inventory-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.6);"></div>

        <div class="inventory-container">
            <div class="inventory-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <a href="/html/Admin/panel_de_admin.html" style="color: white; margin-right: 15px;"><i class="fa-solid fa-circle-left fa-2x"></i></a>
                    <h1 class="dashboard-title" style="color: white; margin: 0;">Control de Existencias</h1>
                </div>
            </div>

            <div class="search-container" style="margin-bottom: 20px; display: flex; gap: 15px; align-items: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px;">
                <div style="position: relative; flex: 1;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #5d4037;"></i>
                    <input type="text" id="inventory-search" placeholder="Buscar por título, autor o ID..." 
                        style="width: 100%; padding: 12px 12px 12px 45px; border-radius: 8px; border: none; outline: none; font-size: 1rem;">
                </div>
                <div style="color: white; font-weight: bold; min-width: 150px; text-align: right;">
                    <span id="results-count">0</span> productos
                </div>
            </div>

            <div class="inventory-table-wrapper" style="overflow-x: auto; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <table class="inventory-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #5d4037; color: white;">
                            <th style="padding: 15px;">ID</th>
                            <th>Libro / Producto</th>
                            <th>Autor</th>
                            <th>Género</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px;">
                                <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: #5d4037;"></i><br>Conectando al servidor...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="inventory-footer" style="margin-top: 20px; text-align: right;">
                <button class="btn-print" onclick="window.print()" style="padding: 12px 20px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    <i class="fa-solid fa-file-pdf"></i> Generar Reporte de Almacén
                </button>
            </div>
        </div>
    </main>

    <script>
        let todosLosProductos = []; // Almacén local para búsqueda rápida
        let indiceBusqueda = [];

        document.addEventListener('DOMContentLoaded', () => {
            const usuario = JSON.parse(
                localStorage.getItem('usuario') ||
                localStorage.getItem('usuario_logeado') ||
                localStorage.getItem('usuarioCompleto') ||
                'null'
            );
            
            if (!usuario || usuario.rol !== 'admin') {
                window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html'; 
                return;
            }

            document.getElementById('admin-name').innerText = usuario.nombre || 'Administrador';
            
            cargarCategorias();
            cargarInventario();
            initMenu();
            initSearch();
        });

        async function cargarCategorias() {
            const selector = document.getElementById('categoria');
            if (!selector) return;

            try {
                const response = await fetch('/api/productos/categorias');
                const payload = await response.json();
                const categorias = Array.isArray(payload) ? payload : (payload.data || []);

                if (!categorias.length) return;

                selector.innerHTML = categorias
                    .map(c => `<option value="${c.nombre}">${c.nombre}</option>`)
                    .join('');
            } catch (error) {
                console.warn('No se pudieron cargar categorías', error);
            }
        }

        async function cargarInventario() {
            try {
                const token = localStorage.getItem('laLechuza_jwt_token');
                const response = await fetch('/api/productos', {
                    headers: {
                        ...(token ? { Authorization: `Bearer ${token}` } : {})
                    }
                });
                if (!response.ok) throw new Error('Error en servidor');
                
                const payload = await response.json();
                todosLosProductos = Array.isArray(payload) ? payload : (payload.data || []);
                indiceBusqueda = todosLosProductos.map((p) => ({
                    id: p.id_producto,
                    source: `${p.id_producto} ${p.titulo || ''} ${p.autor || ''} ${p.categoria || ''}`.toLowerCase()
                }));
                renderizarTabla(todosLosProductos);

            } catch (error) {
                console.error("Error de carga:", error);
                document.getElementById('tabla-inventario').innerHTML = `
                    <tr><td colspan="8" style="color:red; text-align:center; padding: 30px;">
                    <i class="fa-solid fa-triangle-exclamation"></i> Error al conectar con la base de datos.</td></tr>`;
            }
        }

        function renderizarTabla(lista) {
            const tablaBody = document.getElementById('tabla-inventario');
            const countLabel = document.getElementById('results-count');
            
            if (lista.length === 0) {
                tablaBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">No se encontraron resultados.</td></tr>';
                countLabel.innerText = "0";
                return;
            }

            let htmlRows = '';
            lista.forEach(prod => {
                const stockVal = parseInt(prod.stock, 10) || 0;
                const claseE = stockVal <= 0 ? 'sold-out' : (stockVal <= 5 ? 'low-stock' : 'available');

                const precioMXN = new Intl.NumberFormat('es-MX', {
                    style: 'currency', currency: 'MXN'
                }).format(prod.precio);

                htmlRows += `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="text-align:center; padding: 12px;">#${prod.id_producto}</td>
                        <td style="font-weight: bold; color: #5d4037;">${prod.titulo}</td>
                        <td>${prod.autor || 'N/A'}</td>
                        <td>${prod.categoria || 'Sin género'}</td>
                        <td style="text-align:center;">${stockVal}</td>
                        <td style="text-align:center; font-weight: 600;">${precioMXN}</td>
                        <td style="text-align:center;"><span class="status-tag ${claseE}">${stockVal}</span></td>
                        <td style="text-align:center;">
                            <button class="btn-edit" onclick="editarProducto(${prod.id_producto})" title="Editar">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button class="btn-delete" onclick="eliminarProducto(${prod.id_producto}, '${prod.titulo}')" title="Eliminar">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            tablaBody.innerHTML = htmlRows;
            countLabel.innerText = lista.length;
        }

        function initSearch() {
            const searchInput = document.getElementById('inventory-search');
            let debounce = null;

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();

                clearTimeout(debounce);
                debounce = setTimeout(() => {
                    if (!term) {
                        renderizarTabla(todosLosProductos);
                        return;
                    }

                    const ids = new Set(
                        indiceBusqueda
                            .filter((item) => item.source.includes(term))
                            .map((item) => item.id)
                    );

                    const filtrados = todosLosProductos.filter((p) => ids.has(p.id_producto));
                    renderizarTabla(filtrados);
                }, 150);
            });
        }

        async function eliminarProducto(id, nombre) {
            if (!confirm(`¿Eliminar permanentemente "${nombre}"?`)) return;

            try {
                const token = localStorage.getItem('laLechuza_jwt_token');
                const response = await fetch(`/api/productos/${id}`, {
                    method: 'DELETE',
                    headers: {
                        ...(token ? { Authorization: `Bearer ${token}` } : {})
                    }
                });

                if (response.ok) {
                    alert("Eliminado correctamente.");
                    cargarInventario(); 
                } else {
                    const err = await response.json().catch(() => ({}));
                    const mensaje = err.error || "No se puede eliminar este libro.";

                    if (!confirm(`No se puede eliminar: ${mensaje}\n\n¿Deseas marcarlo como agotado (stock = 0) en lugar de eliminarlo?`)) {
                        return;
                    }

                    const fallback = await fetch(`/api/productos/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            ...(token ? { Authorization: `Bearer ${token}` } : {})
                        },
                        body: JSON.stringify({ stock: 0 })
                    });

                    if (!fallback.ok) {
                        const errFallback = await fallback.json().catch(() => ({}));
                        alert("No fue posible actualizar el estado del producto: " + (errFallback.error || 'Error desconocido'));
                        return;
                    }

                    alert("Producto marcado como agotado.");
                    cargarInventario();
                }
            } catch (error) {
                alert("Error de conexión.");
            }
        }

        function editarProducto(id) {
            window.location.href = `/html/Admin/Gestion_productos.html?id=${id}`;
        }

        function initMenu() {
            const btn = document.getElementById('hamburger-btn');
            const menu = document.getElementById('menu-items');
            btn?.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('show-menu');
            });
        }
    </script>
    <script src="/JS/nav-toggle-global.js" defer></script>
<script src="/JS/api.js" defer></script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
