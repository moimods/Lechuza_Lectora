<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Registro de Libros</title>
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .form-container-admin {
            max-width: 650px;
            background-color: #fdf5e6; 
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            margin: 30px auto;
            position: relative;
            z-index: 5;
            border-top: 6px solid #5d4037;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 700; color: #5d4037; margin-bottom: 8px; font-size: 0.9rem; }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #d7ccc8; border-radius: 6px; 
            font-size: 1rem; box-sizing: border-box; transition: border 0.3s;
        }

        .form-group input:focus { border-color: #5d4037; outline: none; }

        .btn-save-product {
            background-color: #5d4037; color: white; border: none; padding: 16px;
            border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%;
            transition: all 0.3s; font-size: 1.1rem; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-save-product:hover { background-color: #3e2723; transform: translateY(-2px); }
        .btn-save-product:disabled { background-color: #a1887f; cursor: not-allowed; }

        .preview-box {
            width: 140px; height: 190px; border: 2px dashed #d7ccc8; margin: 10px 0;
            display: flex; align-items: center; justify-content: center;
            color: #8d6e63; border-radius: 8px; background: #fff; overflow: hidden;
        }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .inventory-header { display: flex; align-items: center; margin-bottom: 25px; color: #5d4037; }
        
        @media (max-width: 600px) {
            .form-container-admin { width: 92%; padding: 20px; }
            .responsive-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body class="dashboard-page">

    <header class="navbar dashboard-navbar">
        <div class="logo-container">
            <img src="/Imagenes/logo.png" alt="Logo" class="logo"> 
            <span class="site-name">LA LECHUZA LECTORA</span>
        </div>
        
        <nav class="nav-links">
            <button class="hamburger-btn" id="hamburger-btn">
                <div class="burger-icon"><span></span><span></span><span></span></div>
            </button>
            <div class="menu-items" id="menu-items">
                <a href="/html/Admin/Gestion_de_inventario.html">Inventario</a>
                <a href="/html/Admin/Reporte_de_ventas.html">Ventas</a>
                <a href="/html/Admin/Reporte_de_compras.html">Pedidos</a>
                <a href="/index.html" onclick="return appLogout(event)">Cerrar Sesión</a>
            </div>
        </nav>

        <div class="auth-actions user-actions">
            <a href="/html/Admin/panel_de_admin.html" class="icon-button"><i class="fa-solid fa-house"></i></a>
            <span class="admin-label" id="admin-display-name">Admin</span>
            <img src="/Imagenes/miku.png.jpg" alt="Avatar" class="avatar" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
        </div>
    </header>

    <main class="main-content inventory-main">
        <div class="background-overlay dashboard-bg" style="filter: brightness(0.5);"></div>

        <div class="form-container-admin">
            <div class="inventory-header">
                <a href="/html/Admin/panel_de_admin.html" style="color: inherit; text-decoration: none;">
                    <i class="fa-solid fa-circle-chevron-left fa-2xl" style="margin-right: 15px; cursor: pointer;"></i>
                </a>
                <h2 style="margin: 0;" id="product-form-title">Registrar Nuevo Libro</h2>
            </div>

            <form id="productForm">
                <div class="form-group">
                    <label for="titulo">Título del Libro:</label>
                    <input type="text" id="titulo" placeholder="Ej: Las Crónicas de Narnia" required>
                </div>

                <div class="form-group">
                    <label for="autor">Autor / Escritor:</label>
                    <input type="text" id="autor" placeholder="Ej: C.S. Lewis" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoría del Catálogo:</label>
                    <select id="categoria" required>
                        <option value="" disabled selected>Selecciona una categoría</option>
                    </select>
                </div>

                <div class="form-group responsive-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label for="precio">Precio Unitario ($):</label>
                        <input type="number" id="precio" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div>
                        <label for="stock">Stock Inicial (Uds):</label>
                        <input type="number" id="stock" placeholder="0" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Imagen de Portada (URL o Nombre de archivo):</label>
                    <input type="text" id="imagen_url" placeholder="/Imagenes/Libros/libro_nuevo.jpg">
                    <div class="preview-box" id="imagePreview">
                        <i class="fa-solid fa-image fa-2x"></i>
                    </div>
                    <small style="color: #888;">Por ahora, ingresa la ruta del archivo que subiste a tu carpeta Imagenes.</small>
                </div>

                <button type="submit" class="btn-save-product" id="btnGuardar">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Registrar Libro en DB
                </button>
            </form>
        </div>
    </main>

    <div id="listaProductos"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');

        function getToken() {
            return localStorage.getItem('laLechuza_jwt_token');
        }

        async function apiCall(url, options = {}) {
            const token = getToken();
            const response = await fetch(url, {
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { Authorization: `Bearer ${token}` } : {})
                },
                ...options
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error || 'Error en la operación');
            }

            return data;
        }

        async function initAdminPage() {
            let user = null;
            if (window.API?.requireSession) {
                user = await window.API.requireSession({
                    redirectToLogin: false,
                    rememberCurrentPath: true
                });
            } else {
                user = JSON.parse(localStorage.getItem('usuario') || 'null');
            }

            if (!user || String(user.rol || '').toLowerCase() !== 'admin') {
                window.location.href = '/html/Inicio_de_sesion/Inicio_sesion.html';
                return;
            }

            document.getElementById('admin-display-name').innerText = user.nombre_completo || user.nombre || 'Admin';
            await cargarCategorias();

            if (editId) {
                await activarModoEdicion(editId);
            }
        }

        document.addEventListener('DOMContentLoaded', initAdminPage);

        async function cargarCategorias() {
            const selector = document.getElementById('categoria');
            if (!selector) return;

            try {
                const response = await fetch('/api/productos/categorias');
                const payload = await response.json();
                const categorias = Array.isArray(payload) ? payload : (payload.data || []);

                if (!categorias.length) {
                    selector.innerHTML += '<option value="General">General</option>';
                    return;
                }

                selector.innerHTML += categorias
                    .map(c => `<option value="${c.nombre}">${c.nombre}</option>`)
                    .join('');
            } catch (error) {
                selector.innerHTML += '<option value="General">General</option>';
            }
        }

        async function activarModoEdicion(id) {
            document.getElementById('product-form-title').innerText = `Editar Libro #${id}`;
            document.getElementById('btnGuardar').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar Cambios';

            try {
                const payload = await apiCall(`/api/productos/${id}`);
                const producto = payload.data || payload;

                document.getElementById('titulo').value = producto.titulo || '';
                document.getElementById('autor').value = producto.autor || '';
                document.getElementById('precio').value = producto.precio ?? '';
                document.getElementById('stock').value = producto.stock ?? '';
                document.getElementById('imagen_url').value = producto.imagen_url || '';

                const categoriaSel = document.getElementById('categoria');
                if (producto.categoria) {
                    categoriaSel.value = producto.categoria;
                } else if (producto.id_categoria) {
                    categoriaSel.value = String(producto.id_categoria);
                }
            } catch (error) {
                alert('No se pudo cargar el producto para edición: ' + error.message);
            }
        }

        // 2. Lógica de Envío a la API
        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';

            // Mapeo exacto para index.js
            const datosLibro = {
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria: document.getElementById('categoria').value,
                imagen_url: document.getElementById('imagen_url').value || "/Imagenes/Libros/default.jpg"
            };

            try {
                if (editId) {
                    await apiCall(`/api/productos/${editId}`, {
                        method: 'PUT',
                        body: JSON.stringify(datosLibro)
                    });
                    alert(`Cambios guardados para "${datosLibro.titulo}".`);
                } else {
                    await apiCall('/api/productos', {
                        method: 'POST',
                        body: JSON.stringify(datosLibro)
                    });
                    alert(`Exito: el libro "${datosLibro.titulo}" se guardo correctamente.`);
                }

                window.location.href = '/html/Admin/Gestion_de_inventario.html';
            } catch (error) {
                console.error("Error API:", error);
                alert("❌ Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Registrar Libro en DB';
            }
        });

        // Menú Hamburguesa
        const btnHamburguesa = document.getElementById('hamburger-btn');
        const menuDesplegable = document.getElementById('menu-items');
        btnHamburguesa?.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDesplegable.classList.toggle('show-menu');
        });
    </script>
    <script src="/JS/nav-toggle-global.js" defer></script>
<script src="/JS/api.js" defer></script>
</body>
</html>
