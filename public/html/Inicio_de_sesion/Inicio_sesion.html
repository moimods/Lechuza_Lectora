<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>La Lechuza Lectora - Iniciar Sesión</title>

    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* RESPONSIVE LOGIN */
@media (max-width: 768px) {

    .form-card.login-card {
        width: 90% !important;
        padding: 30px 20px !important;
        margin: 20px auto;
    }

    .main-logo {
        width: 80px !important;
    }

    .login-action-buttons {
        flex-direction: column;
        gap: 10px;
    }

    .login-action-buttons button {
        width: 100% !important;
    }

    .login-actions {
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
}

.background-overlay {
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
    background-size: cover;

    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    z-index: -1;
}
</style>
</head>

<body class="form-page">

<main class="main-content form-main">

<div class="background-overlay"></div>

<div class="form-card login-card"
style="max-width:450px;margin:50px auto;background:white;padding:40px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.2);">

    <div style="display:flex;justify-content:flex-end;">
        <button type="button" onclick="window.location.href='../../index.html'" title="Volver al inicio" style="background:none;border:none;color:#5d4037;cursor:pointer;font-size:1.2rem;">
            <i class="fa-solid fa-house"></i>
        </button>
    </div>

    <div style="text-align:center;">
        <img src="../../Imagenes/logo.png" class="main-logo" style="width:100px;">
    </div>

    <h2 style="text-align:center;color:#5d4037;margin-top:10px;">
        Iniciar Sesión
    </h2>

    <!-- FORM LOGIN -->
    <form id="form-login-usuario" style="margin-top:20px;">

        <label style="font-weight:bold;color:#5d4037;">
            Correo:
        </label>

        <input
            type="email"
            id="correo"
            placeholder="ejemplo@correo.com"
            required
            style="width:100%;padding:12px;margin-bottom:15px;border-radius:5px;border:1px solid #ccc;"
        >

        <label style="font-weight:bold;color:#5d4037;">
            Contraseña:
        </label>

        <input
            type="password"
            id="contrasena"
            placeholder="********"
            required
            style="width:100%;padding:12px;margin-bottom:10px;border-radius:5px;border:1px solid #ccc;"
        >

        <div class="login-action-buttons"
             style="display:flex;gap:10px;margin-top:20px;">

            <button type="submit"
                style="flex:1;padding:12px;border:none;border-radius:5px;background:#5d4037;color:white;font-weight:bold;cursor:pointer;">
                Iniciar sesión
            </button>

            <button type="button"
                onclick="window.location.href='../../index.html'"
                style="flex:1;padding:12px;border:none;border-radius:5px;background:#555;color:white;font-weight:bold;cursor:pointer;">
                Cancelar
            </button>

        </div>

    </form>

    <a href="Inicio_sesion_admin.html"
       style="display:block;text-align:center;margin-top:15px;color:#5d4037;font-weight:bold;text-decoration:underline;">
        Acceso Administrativo
    </a>

    <div class="login-actions"
         style="display:flex;justify-content:space-between;margin-top:25px;">

        <button type="button"
            onclick="window.location.href='Registro.html'"
            style="background:none;border:none;color:#5d4037;font-weight:bold;cursor:pointer;">
            Crear cuenta
        </button>

        <button type="button"
            onclick="window.location.href='Recuperacion.html'"
            style="background:none;border:none;color:#5d4037;font-weight:bold;cursor:pointer;">
            ¿Olvidó la contraseña?
        </button>

    </div>

</div>
</main>

<footer class="site-footer"
style="text-align:center;padding:20px;color:#5d4037;font-size:.85em;">

    <div style="margin-bottom:10px;">
        <i class="fa-brands fa-x-twitter"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
    </div>

    © Todos los derechos reservados 2026. La Lechuza Lectora ©

</footer>

<script src="/JS/api.js"></script>
<!-- ================= LOGIN SCRIPT ================= -->
<script>

document.getElementById('form-login-usuario')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const email = document.getElementById('correo').value.trim();
    const password = document.getElementById('contrasena').value.trim();

    if(!email || !password){
        alert("⚠️ Completa todos los campos");
        return;
    }

    try{
        const data = await API.login(email, password);
        const ok = data.ok ?? data.success;
        const user = data.usuario || data.user || data.data?.usuario || data.data?.user;

        if(ok && user){

            // Guardar sesión
            localStorage.setItem('userId', String(user.id_usuario || ''));
            localStorage.setItem('userName', user.nombre_completo || user.nombre || 'Usuario');
            localStorage.setItem('userRole', user.rol || 'cliente');
            localStorage.setItem('usuarioCompleto', JSON.stringify(user));
            localStorage.setItem('usuario', JSON.stringify(user));
            localStorage.setItem('usuario_logeado', JSON.stringify(user));

            const redirectTo = localStorage.getItem('postLoginRedirect') || '/html/Logeado/Catalogo_Logeado.html';
            localStorage.removeItem('postLoginRedirect');

            // Redirigir
            window.location.href = redirectTo;

        }else{
            alert("❌ " + (data.error || "Credenciales incorrectas"));
        }

    }catch(error){
        console.error(error);
        alert("⚠️ No se pudo conectar con el servidor");
    }

});

 </script>
<script src="/JS/limpiar-cache-formularios.js" defer></script>

</body>
</html>
