<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Login Administrador</title>
    <link rel="icon" type="image/x-icon" href="../../Imagenes/logo.png">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes específicos para dispositivos móviles */
        @media (max-width: 768px) {
            .form-card.admin-login-card {
                width: 90% !important;
                padding: 25px 20px !important;
                margin: 20px auto;
            }

            .main-logo {
                width: 80px !important;
                height: 80px !important;
            }

            .form-card h2 {
                font-size: 1.3rem !important;
            }

            .btn-primary {
                padding: 12px !important;
                font-size: 1rem;
            }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="form-page">
    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card login-card admin-login-card" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <div class="center-logo-box" style="text-align: center;">
                <img src="../../Imagenes/logo.png" alt="Logo Central" class="main-logo" style="width: 100px; height: 100px; object-fit: contain;">
                <h2 style="color: #5d4037; margin-top: 10px; font-weight: bold;">Acceso Panel Control</h2>
            </div>
            
            <form class="login-form" id="adminLoginForm" style="margin-top: 20px;">
                <label for="correo" style="display: block; text-align: left; font-weight: bold; color: #5d4037;">Administrador:</label>
                <input type="email" id="correo" placeholder="correo@admin.com" required 
                       style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">

                <label for="contrasena" style="display: block; text-align: left; font-weight: bold; color: #5d4037;">Contraseña:</label>
                <input type="password" id="contrasena" placeholder="********" required 
                       style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">

                <button type="submit" class="btn-primary" 
                        style="width: 100%; padding: 12px; border-radius: 5px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer;">
                    Entrar al Panel
                </button>
            </form>

            <button class="btn-forgot-password admin-forgot" onclick="window.location.href='Recuperacion.html'" style="background: none; border: none; color: #5d4037; text-decoration: underline; margin-top: 15px; cursor: pointer; font-size: 0.9em; width: 100%;">
                ¿Olvidó la contraseña?
            </button>
            
            <a href="../../index.html" style="display: block; text-align: center; margin-top: 15px; font-size: 0.9em; color: #5d4037; font-weight: bold; text-decoration: none;">
                <i class="fa-solid fa-house"></i> Volver al Inicio
            </a>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037; font-size: 0.85em;">
        <div class="copyright">
            © Todos los derechos reservados 2026. La Lechuza Lectora ©
        </div>
    </footer>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('correo').value;
    const password = document.getElementById('contrasena').value;

    try {
        // Petición al mismo endpoint de login
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
            // --- VERIFICACIÓN DE ROL ---
            // Solo permitimos el paso si el campo 'rol' en la DB es 'admin'
            if (data.user.rol === 'admin') {
                
                // Guardamos la sesión siguiendo el estándar de los otros archivos
                localStorage.setItem('userId', data.user.id_usuario);
                localStorage.setItem('userName', data.user.nombre);
                localStorage.setItem('userRole', data.user.rol);
                localStorage.setItem('admin_session', 'true'); // Flag extra para paneles admin

                alert("🔓 Acceso administrativo concedido. Bienvenido, " + data.user.nombre);
                
                // Redirigir al panel (ajusta la ruta según tu estructura)
                window.location.href = 'Panel_Administrador.html'; 

            } else {
                // Si el usuario existe pero es un cliente normal
                alert("🚫 Acceso denegado: Esta cuenta no tiene permisos de administrador.");
                // Opcional: Cerrar sesión por seguridad
                localStorage.clear();
            }
        } else {
            // Error de credenciales (correo o contraseña mal)
            alert("❌ " + data.error);
        }
    } catch (error) {
        console.error("Error de conexión:", error);
        alert("⚠️ No se pudo conectar con el servidor. Verifica que Node.js esté activo.");
    }
});
</script>
</body>
</html>
