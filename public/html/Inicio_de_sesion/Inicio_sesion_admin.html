<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Login Administrador</title>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes específicos para dispositivos móviles */
        @media (max-width: 768px) {
            .form-card.admin-login-card {
                width: 90% !important;
                padding: 25px 20px !important;
                margin: 20px auto;
            }

            .main-logo {
                width: 80px !important;
                height: 80px !important;
            }

            .form-card h2 {
                font-size: 1.3rem !important;
            }

            .btn-primary {
                padding: 12px !important;
                font-size: 1rem;
            }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="form-page">
    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card login-card admin-login-card" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <div class="center-logo-box" style="text-align: center;">
                <img src="/Imagenes/logo.png" alt="Logo Central" class="main-logo" style="width: 100px; height: 100px; object-fit: contain;">
                <h2 style="color: #5d4037; margin-top: 10px; font-weight: bold;">Acceso Panel Control</h2>
            </div>
            
                 <form class="login-form" id="adminLoginForm" style="margin-top: 20px;" autocomplete="off">
                <label for="correo" style="display: block; text-align: left; font-weight: bold; color: #5d4037;">Administrador:</label>
                <input type="email" id="correo" placeholder="correo@admin.com" required 
                      autocomplete="off"
                       style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">

                <label for="contrasena" style="display: block; text-align: left; font-weight: bold; color: #5d4037;">Contraseña:</label>
                <input type="password" id="contrasena" placeholder="********" required 
                      autocomplete="new-password"
                       style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">

                <button type="submit" class="btn-primary" 
                        style="width: 100%; padding: 12px; border-radius: 5px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer;">
                    Entrar al Panel
                </button>
            </form>

            <button class="btn-forgot-password admin-forgot" onclick="window.location.href='Recuperacion.html'" style="background: none; border: none; color: #5d4037; text-decoration: underline; margin-top: 15px; cursor: pointer; font-size: 0.9em; width: 100%;">
                ¿Olvidó la contraseña?
            </button>
            
            <div style="text-align:center;margin-top:15px;">
                <button type="button" onclick="window.location.href='../../index.html'" title="Volver al inicio" style="background:none;border:none;color:#5d4037;cursor:pointer;font-size:1.2rem;">
                    <i class="fa-solid fa-house"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="text-align: center; padding: 20px; color: #5d4037; font-size: 0.85em;">
        <div class="copyright">
            © Todos los derechos reservados 2026. La Lechuza Lectora ©
        </div>
    </footer>

<script src="/JS/api.js" defer></script>
<script src="/JS/limpiar-cache-formularios.js" defer></script>
<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('correo').value;
    const password = document.getElementById('contrasena').value;

    try {
        const data = await API.login(email, password);
        const ok = data.ok ?? data.success;
        const user = data.usuario || data.user || data.data?.usuario || data.data?.user;

        if (ok && user) {
            // --- VERIFICACIÓN DE ROL ---
            // Solo permitimos el paso si el campo 'rol' en la DB es 'admin'
            if (user.rol === 'admin') {
                
                // Guardamos la sesión siguiendo el estándar de los otros archivos
                localStorage.setItem('userId', String(user.id_usuario || ''));
                localStorage.setItem('userName', user.nombre_completo || user.nombre || 'Admin');
                localStorage.setItem('userRole', user.rol);
                localStorage.setItem('usuario', JSON.stringify(user));
                localStorage.setItem('usuario_logeado', JSON.stringify(user));
                localStorage.setItem('usuarioCompleto', JSON.stringify(user));
                localStorage.setItem('admin_session', 'true'); // Flag extra para paneles admin

                alert("ðŸ”“ Acceso administrativo concedido. Bienvenido, " + (user.nombre_completo || user.nombre || 'Admin'));
                
                // Redirigir al panel admin real
                window.location.href = '/html/Admin/panel_de_admin.html'; 

            } else {
                // Si el usuario existe pero es un cliente normal
                alert("ðŸš« Acceso denegado: Esta cuenta no tiene permisos de administrador.");
                // Opcional: Cerrar sesión por seguridad
                localStorage.clear();
            }
        } else {
            // Error de credenciales (correo o contraseña mal)
            alert("❌ " + (data.error || 'Credenciales incorrectas'));
        }
    } catch (error) {
        console.error("Error de conexión:", error);
        alert("⚠️ " + (error.message || "No se pudo conectar con el servidor. Verifica que Node.js esté activo."));
    }
});

document.addEventListener('DOMContentLoaded', () => {
    const correo = document.getElementById('correo');
    const contrasena = document.getElementById('contrasena');
    if (correo) correo.value = '';
    if (contrasena) contrasena.value = '';
});
</script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
