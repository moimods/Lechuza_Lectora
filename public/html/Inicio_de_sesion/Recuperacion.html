<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Recuperar Contraseña</title>
    <link rel="icon" type="image/png" href="/Imagenes/logo.png">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de responsividad */
        @media (max-width: 768px) {
            .form-card.recovery-card {
                width: 90% !important;
                padding: 20px !important;
            }
            .action-buttons-group {
                flex-direction: column !important;
            }
            .btn-dark-action {
                width: 100% !important;
            }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('/Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .btn-disabled {
            background-color: #999 !important;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body class="form-page">

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card recovery-card" style="max-width: 450px; margin: 80px auto; background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fa-solid fa-lock-rotate" style="font-size: 3rem; color: #5d4037;"></i>
            </div>
            <h1 class="form-title" style="color: #5d4037; text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 1.8rem;">¿Olvidaste tu contraseña?</h1>
            <p style="text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9rem;">No te preocupes, dinos tu correo y te enviaremos un código de verificación.</p>
            
            <form id="recoveryForm">
                <div class="input-group" style="margin-bottom: 20px;">
                    <label for="correo" style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 8px;">Correo electrónico:</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-envelope" style="position: absolute; left: 12px; top: 15px; color: #5d4037;"></i>
                        <input type="email" id="correo" placeholder="ejemplo@correo.com" required 
                               style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 30px;">
                    <label for="codigo" style="display: block; font-weight: bold; color: #5d4037; margin-bottom: 8px;">Código de verificación:</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-key" style="position: absolute; left: 12px; top: 15px; color: #5d4037;"></i>
                           <input type="text" id="codigo" placeholder="Ingresa el código de 6 dígitos" 
                               style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
                    </div>
                </div>

                <div class="action-buttons-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button type="button" id="btn-enviar-codigo" class="btn-dark-action" 
                            style="flex: 1.5; padding: 12px; border-radius: 6px; border: none; background-color: #5d4037; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;">
                        Enviar código
                    </button>
                    <button type="button" id="btn-siguiente" class="btn-dark-action" 
                            style="flex: 1; padding: 12px; border-radius: 6px; border: none; background-color: #fbc02d; color: #333; font-weight: bold; cursor: pointer; transition: 0.3s;">
                        Siguiente
                    </button>
                </div>
                
                <button type="button" onclick="window.location.href='Inicio_sesion.html'" 
                        style="width: 100%; margin-top: 15px; background: transparent; border: none; color: #5d4037; text-decoration: underline; cursor: pointer; font-size: 0.9rem;">
                    Regresar al inicio de sesión
                </button>
            </form>
        </div>
    </main>

    

    <script src="/JS/api.js" defer></script>
    <script>
        const btnEnviar = document.getElementById('btn-enviar-codigo');
        const btnSiguiente = document.getElementById('btn-siguiente');
        const inputCorreo = document.getElementById('correo');
        const inputCodigo = document.getElementById('codigo');

        // 1. Envío real de código (backend)
        btnEnviar.addEventListener('click', async () => {
            const email = inputCorreo.value.trim();
            if(!email) return alert("Necesito tu correo para enviar el código.");

            // Feedback visual de carga
            btnEnviar.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enviando...';
            btnEnviar.classList.add('btn-disabled');
            btnEnviar.disabled = true;

            try {
                const response = await API.post('/auth/enviar-codigo', {
                    email,
                    purpose: 'password-recovery'
                });

                localStorage.setItem('email_recuperacion', email);

                const debugSuffix = response?.data?.devCode
                    ? `\n(Código de desarrollo: ${response.data.devCode})`
                    : '';

                alert(`Mensaje enviado. Revisa tu bandeja de entrada.${debugSuffix}`);
            } catch (error) {
                alert(`No se pudo enviar el código: ${error.message || 'intenta de nuevo.'}`);
            } finally {
                btnEnviar.innerHTML = 'Reenviar código';
                btnEnviar.classList.remove('btn-disabled');
                btnEnviar.disabled = false;
            }
        });

        // 2. Validación de código para avanzar
        btnSiguiente.addEventListener('click', async () => {
            const email = inputCorreo.value.trim();
            const codigo = inputCodigo.value.trim();
            if(!codigo) return alert("Por favor, ingresa el código de 6 dígitos.");
            if(!/^\d{6}$/.test(codigo)) return alert("El código debe tener exactamente 6 dígitos.");
            if(!email) return alert("Por favor, ingresa tu correo.");

            try {
                await API.post('/auth/verificar-codigo', {
                    email,
                    code: codigo,
                    purpose: 'password-recovery'
                });

                localStorage.setItem('email_recuperacion', email);
                sessionStorage.setItem('codigo_recuperacion_validado', codigo);

                alert("Código correcto. Redirigiendo al cambio de contraseña...");
                window.location.href = 'Cambio_Contraseña.html'; 
            } catch (error) {
                alert("El código es incorrecto o expiró. Solicita uno nuevo.");
                inputCodigo.value = "";
                inputCodigo.focus();
            }
        });
    </script>
    <script src="/JS/limpiar-cache-formularios.js" defer></script>
<script src="/JS/lechubot-widget.js" defer></script>
</body>
</html>
