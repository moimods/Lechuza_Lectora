<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>La Lechuza Lectora - Registro</title>
    <link rel="icon" type="image/x-icon" href="../../Imagenes/logo.png">
    <link rel="stylesheet" href="../../Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajustes de diseño y fondo */
        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #5d4037; }
        
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .registration-grid { grid-template-columns: 1fr !important; }
            .form-card { width: 95% !important; padding: 20px !important; }
        }
    </style>
</head>
<body class="form-page">

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card" style="max-width: 1100px; background: rgba(245, 245, 245, 0.95); border-radius: 10px; padding: 40px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <h1 style="color: #5d4037; text-align: center; margin-bottom: 30px;">Formulario de Registro</h1>

            <form class="registration-grid" id="registrationForm" action="/api/registro" method="POST" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;"> 
                <div class="section-group" style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
                    <h2 style="font-size: 1.2em; color: #5d4037; border-bottom: 2px solid #fbc02d; padding-bottom: 5px; margin-bottom: 15px;">Datos Personales</h2>
                    <div class="input-group"><label>Nombres:</label><input type="text" id="nombres" name="nombres" required style="width:100%; padding:8px; margin-bottom:10px;"></div>
                    <div class="input-group"><label>Primer apellido:</label><input type="text" id="apellido1" name="apellido1" required style="width:100%; padding:8px; margin-bottom:10px;"></div>
                    <div class="input-group"><label>Segundo apellido:</label><input type="text" id="apellido2" name="apellido2" style="width:100%; padding:8px; margin-bottom:10px;"></div>
                    <div class="input-group"><label>Fecha de nacimiento:</label><input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required style="width:100%; padding:8px;"></div>
                </div>

                <div class="section-group" style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
                    <h2 style="font-size: 1.2em; color: #5d4037; border-bottom: 2px solid #fbc02d; padding-bottom: 5px; margin-bottom: 15px;">Información de Cuenta</h2>
                    <div class="input-group"><label>Apodo:</label><input type="text" id="nickname" name="nickname" style="width:100%; padding:8px; margin-bottom:10px;"></div>
                    <div class="input-group"><label>Teléfono:</label><input type="tel" id="telefono" name="telefono" required style="width:100%; padding:8px; margin-bottom:10px;"></div>
                    <div class="input-group"><label>Domicilio:</label><input type="text" id="domicilio" name="domicilio" required style="width:100%; padding:8px; margin-bottom:10px;"></div>
                    <div class="input-group"><label>Email:</label><input type="email" id="email" name="email" required style="width:100%; padding:8px;"></div>
                </div>
                
                <div class="section-group" style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
                    <h2 style="font-size: 1.2em; color: #5d4037; border-bottom: 2px solid #fbc02d; padding-bottom: 5px; margin-bottom: 15px;">Seguridad</h2>
                    <div class="input-group">
                        <label>Contraseña:</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" maxlength="10" required style="width:100%; padding:8px; margin-bottom:10px;">
                            <i class="fa-solid fa-eye password-toggle" onclick="togglePass('password')"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Confirmar:</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm_password" maxlength="10" required style="width:100%; padding:8px; margin-bottom:10px;">
                            <i class="fa-solid fa-eye password-toggle" onclick="togglePass('confirm_password')"></i>
                        </div>
                    </div>
                    
                    <div class="captcha-group" style="text-align: center; margin-top: 10px;">
                        <div class="captcha-display-wrapper" style="margin-bottom: 10px;">
                            <span id="captcha-display" style="background: #eee; padding: 5px 15px; font-weight: bold; letter-spacing: 5px; border: 1px dashed #999;">JUPRO</span> 
                        </div>
                        <input type="text" id="captcha-input" placeholder="Escribe JUPRO" required style="width:100%; padding:8px;"> 
                    </div>
                </div>
            </form>

            <div class="form-actions-bottom" style="display: flex; justify-content: space-between; margin-top: 30px;">
                <button type="submit" form="registrationForm" class="btn-primary" style="background: #5d4037; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Registrarse</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='Inicio_sesion.html'" style="background: #555; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Cancelar</button>
            </div>
        </div>
    </main>

    <div id="success-modal" class="modal-backdrop">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px;">
            <i class="fa-solid fa-circle-check" style="font-size: 60px; color: #388e3c; margin-bottom: 15px;"></i>
            <h2 style="color: #5d4037;">¡Registro Exitoso!</h2>
            <p>Tu cuenta ha sido guardada en la base de datos.</p>
            <button id="btn-modal-accept" style="background: #5d4037; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;">Aceptar</button>
        </div>
    </div>

<script>
    // 1. Función para mostrar/ocultar contraseña
    function togglePass(id) {
        const input = document.getElementById(id);
        const icon = event.target;
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // 2. Referencias a campos críticos
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        const captchaInput = document.getElementById('captcha-input').value.trim().toUpperCase();
        const captchaReal = "JUPRO"; 

        // 3. Validaciones de Frontend antes de molestar al servidor
        if (pass.length < 6) {
            alert("🦉 La lechuza dice que tu contraseña es muy corta (mínimo 6 caracteres).");
            return;
        }

        if (pass !== confirm) { 
            alert("⚠️ Las contraseñas no coinciden. Revisa con el icono del ojo."); 
            return; 
        }

        if (captchaInput !== captchaReal) { 
            alert("⚠️ El código de verificación JUPRO es incorrecto."); 
            return; 
        }

        // 4. Preparación de datos (Mapeo limpio)
        // Usamos filter(Boolean) para ignorar campos vacíos (como el segundo apellido)
        const partesNombre = [
            document.getElementById('nombres').value.trim(),
            document.getElementById('apellido1').value.trim(),
            document.getElementById('apellido2').value.trim()
        ];
        const nombreCompleto = partesNombre.filter(Boolean).join(' ');

        const datosUsuario = {
            nombre: nombreCompleto,
            email: document.getElementById('email').value.trim(),
            password: pass,
            telefono: document.getElementById('telefono').value.trim(),
            domicilio: document.getElementById('domicilio').value.trim(),
            fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
            nickname: document.getElementById('nickname').value.trim() || "Lector Anónimo"
        };

        // 5. Envío al Backend
        try {
            // Cambiamos el texto del botón para dar feedback
            const btnSubmit = document.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerText;
            btnSubmit.innerText = "Registrando...";
            btnSubmit.disabled = true;

            const response = await fetch('/api/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosUsuario)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // Mostrar modal de éxito
                document.getElementById('success-modal').style.display = 'flex';
                this.reset(); // Limpiar el formulario
            } else {
                alert("❌ Error: " + (result.message || "Ese correo ya está registrado."));
                btnSubmit.innerText = originalText;
                btnSubmit.disabled = false;
            }
        } catch (error) {
            console.error("Error en la petición:", error);
            alert("⚠️ No pudimos conectar con el servidor de la librería. Intenta más tarde.");
            document.querySelector('button[type="submit"]').disabled = false;
        }
    });

    // Acción del botón Aceptar en el Modal
    document.getElementById('btn-modal-accept').onclick = function() {
        window.location.href = 'Inicio_sesion.html';
    };
</script>
</body>
</html>
