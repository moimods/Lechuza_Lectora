<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Lechuza Lectora - Nueva Contraseña</title>
    <link rel="icon" type="image/x-icon" href="../../Imagenes/logo.png">
    <link rel="stylesheet" href="/Estilos/Estilo1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @media (max-width: 768px) {
            .form-card.change-password-card { width: 90% !important; padding: 20px !important; }
            .action-buttons-group { flex-direction: column; }
        }

        .background-overlay {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('../../Imagenes/Carrusel/5.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        /* Colores de validación más legibles */
        .valid { color: #2e7d32 !important; font-weight: bold; } 
        .invalid { color: #d32f2f !important; opacity: 0.7; }
        
        .valid i { color: #2e7d32; }
        .invalid i { color: #d32f2f; }

        input { box-sizing: border-box; transition: border 0.3s; }
        input:focus { border-color: #5d4037; outline: none; box-shadow: 0 0 5px rgba(93, 64, 55, 0.3); }
    </style>
</head>
<body class="form-page">

    <main class="main-content form-main">
        <div class="background-overlay"></div>

        <div class="form-card change-password-card" style="max-width: 420px; margin: 60px auto; background: rgba(255, 255, 255, 0.98); padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <h1 class="form-title" style="color: #5d4037; text-align: center; font-weight: bold; margin-bottom: 20px;">Restablecer Contraseña</h1>
            
            <form id="password-form">
                <div class="input-group">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #5d4037;">Nueva Contraseña:</label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="new-password" maxlength="10" required placeholder="Mínimo 6 caracteres"
                               style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('new-password', this)"
                           style="position: absolute; right: 12px; top: 15px; cursor: pointer; color: #666;"></i>
                    </div>
                </div>

                <div id="password-requirements" style="margin-top: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 0.85em;">
                    <ul style="list-style: none; padding: 0; margin: 0;">
                        <li id="req-length" class="invalid"><i class="fa-solid fa-circle-xmark"></i> 6 a 10 caracteres</li>
                        <li id="req-number" class="invalid"><i class="fa-solid fa-circle-xmark"></i> Al menos 1 número</li>
                        <li id="req-special" class="invalid"><i class="fa-solid fa-circle-xmark"></i> 1 caracter especial (@$!%*?)</li>
                    </ul>
                </div>

                <div class="input-group" style="margin-top: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #5d4037;">Confirmar Contraseña:</label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="confirm-password" maxlength="10" required placeholder="Repite tu contraseña"
                               style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('confirm-password', this)"
                           style="position: absolute; right: 12px; top: 15px; cursor: pointer; color: #666;"></i>
                    </div>
                </div>

                <div id="match-validation" style="margin-top: 10px; font-size: 0.85em;">
                    <p id="req-match" class="invalid" style="margin: 0;"><i class="fa-solid fa-circle-xmark"></i> Las contraseñas coinciden</p>
                </div>

                <div class="action-buttons-group" style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" id="btn-aceptar" class="btn-primary" 
                            style="flex: 1; padding: 14px; cursor: pointer; border-radius: 8px; border: none; background-color: #5d4037; color: white; font-weight: bold; transition: 0.3s;">
                        Actualizar
                    </button>
                    <button type="button" class="btn-cancel" onclick="window.history.back()" 
                            style="flex: 1; padding: 14px; cursor: pointer; border-radius: 8px; border: none; background-color: #777; color: white; font-weight: bold;">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </main>

    

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        const newPass = document.getElementById('new-password');
        const confPass = document.getElementById('confirm-password');

        function updateUI(id, isValid) {
            const el = document.getElementById(id);
            const icon = el.querySelector('i');
            if (isValid) {
                el.className = 'valid';
                icon.className = 'fa-solid fa-circle-check';
            } else {
                el.className = 'invalid';
                icon.className = 'fa-solid fa-circle-xmark';
            }
        }

        function validate() {
            const val = newPass.value;
            const cVal = confPass.value;
            
            const isLengthValid = val.length >= 6 && val.length <= 10;
            const hasNumber = /\d/.test(val);
            const hasSpecial = /[@$!%*?&]/.test(val);
            const matches = val === cVal && val !== "";

            updateUI('req-length', isLengthValid);
            updateUI('req-number', hasNumber);
            updateUI('req-special', hasSpecial);
            updateUI('req-match', matches);

            return isLengthValid && hasNumber && hasSpecial && matches;
        }

        newPass.addEventListener('input', validate);
        confPass.addEventListener('input', validate);

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validate()) {
                alert("🦉 ¡Oye! Debes cumplir todos los requisitos de seguridad antes de continuar.");
                return;
            }

            const email = localStorage.getItem('email_recuperacion');
            const password = newPass.value;

            if (!email) {
                alert("❌ No encontramos tu correo. Por seguridad, reinicia el proceso de recuperación.");
                window.location.href = 'Recuperacion.html';
                return;
            }

            try {
                const response = await fetch('/api/actualizar-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    alert("✨ ¡Contraseña actualizada! La lechuza ha guardado tus nuevos datos.");
                    localStorage.removeItem('email_recuperacion'); 
                    window.location.href = 'Inicio_sesion.html';
                } else {
                    alert("❌ Error del servidor: " + data.error);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("⚠️ Simulación: En un entorno real esto se guardaría en la BD. ¡Contraseña lista!");
                window.location.href = 'Inicio_sesion.html';
            }
        });
    </script>
    <script src="/JS/limpiar-cache-formularios.js" defer></script>
</body>
</html>
